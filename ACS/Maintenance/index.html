        const SignaturePad = () => {
          const canvasRef = useRef(null);
          const [isDrawing, setIsDrawing] = useState(false);

          useEffect(() => {
            const canvas = canvasRef.current;
            const ctx = canvas.getContext('2d');
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.strokeStyle = '#1e3a8a'; // Dark blue ink
          }, []);

          const getCoordinates = (e, canvas) => {
            const rect = canvas.getBoundingClientRect();
            if (e.touches && e.touches.length > 0) {
              return {
                x: e.touches[0].clientX - rect.left,
                y: e.touches[0].clientY - rect.top
              };
            }
            return {
              x: e.clientX - rect.left,
              y: e.clientY - rect.top
            };
          };

          const startDrawing = (e) => {
            const canvas = canvasRef.current;
            const { x, y } = getCoordinates(e, canvas);
            const ctx = canvas.getContext('2d');
            ctx.beginPath();
            ctx.moveTo(x, y);
            setIsDrawing(true);
          };

          const draw = (e) => {
            if (!isDrawing) return;
            const canvas = canvasRef.current;
            const { x, y } = getCoordinates(e, canvas);
            const ctx = canvas.getContext('2d');
            ctx.lineTo(x, y);
            ctx.stroke();
          };

          const stopDrawing = () => setIsDrawing(false);

          const clear = (e) => {
            e.preventDefault();
            const canvas = canvasRef.current;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
          };

          return (
            <div className="relative border border-gray-400 rounded-md bg-white print:border-none print:bg-transparent h-24">
              <canvas
                ref={canvasRef}
                width={400}
                height={94}
                className="w-full h-full cursor-crosshair touch-none"
                onMouseDown={startDrawing}
                onMouseMove={draw}
                onMouseUp={stopDrawing}
                onMouseLeave={stopDrawing}
                onTouchStart={startDrawing}
                onTouchMove={draw}
                onTouchEnd={stopDrawing}
              />
              <button 
                onClick={clear} 
                className="absolute top-1 right-1 text-xs bg-gray-100 text-gray-600 border border-gray-300 hover:bg-gray-200 px-3 py-1.5 rounded shadow-sm transition-colors print-hidden font-medium"
              >
                Clear
              </button>
              <div className="absolute bottom-1 right-2 text-[10px] text-gray-400 font-medium pointer-events-none print:hidden uppercase tracking-wider">
                Draw signature here
              </div>
            </div>
          );
        };

                         <div>
                           <label className="text-xs font-bold text-gray-600 uppercase tracking-wider mb-1 block print:text-black">Date</label>
                           <input type="date" className="w-full border border-gray-400 bg-white rounded p-2 text-sm shadow-sm focus:ring-2 focus:ring-blue-500 outline-none print:p-0 print:border-b print:shadow-none font-medium" value={data.header.date} onChange={e => updateHeader('date', e.target.value)} />
                         </div>
                       </div>
                       <div>
                         <label className="text-xs font-bold text-gray-600 uppercase tracking-wider mb-1 block print:text-black">Job Code / Ref</label>
                         <input className="w-full border border-gray-400 bg-white rounded p-2 text-sm shadow-sm focus:ring-2 focus:ring-blue-500 outline-none print:p-0 print:border-b print:shadow-none font-medium" value={data.header.jobCode} onChange={e => updateHeader('jobCode', e.target.value)} />
                       </div>
                       <div>
                         <label className="text-xs font-bold text-gray-600 uppercase tracking-wider mb-1 block print:text-black">Engineer</label>
                         <input className="w-full border border-gray-400 bg-white rounded p-2 text-sm shadow-sm focus:ring-2 focus:ring-blue-500 outline-none print:p-0 print:border-b print:shadow-none font-medium" value={data.header.engineer} onChange={e => updateHeader('engineer', e.target.value)} />
                       </div>
                    </div>
                  </div>

                  {/* Job Type Checkboxes */}
                  <div className="flex flex-wrap gap-4 md:gap-8 mb-8 p-4 bg-gray-50 border border-gray-300 rounded-lg print:bg-transparent print:border-none print:p-0 print:mb-4">
                    {Object.keys(data.jobType).map(key => (
                       <label key={key} className="flex items-center gap-2 cursor-pointer group">
                         <input 
                            type="checkbox" 
                            className="w-5 h-5 text-blue-600 rounded border-gray-400 focus:ring-blue-500 cursor-pointer print:border-black print:rounded-none" 
                            checked={data.jobType[key]} 
                            onChange={e => updateJobType(key, e.target.checked)} 
                         />
                         <span className="font-semibold text-gray-800 group-hover:text-blue-800 uppercase text-xs sm:text-sm print:text-black">
                           {key === 'major' ? 'Major Maintenance' : key === 'minor' ? 'Minor Maintenance Only' : key === 'commissioning' ? 'Commissioning Cert' : 'F-gas/ODS Cert'}
                         </span>
                       </label>
                    ))}
                  </div>

                  {/* Circuits High-Level Info */}
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6 print:grid-cols-2">
                    {[1, 2].map(num => {
                      const cName = `circuit${num}`;
                      const isC1 = num === 1;
                      return (
                        <div key={cName} className={`border-2 ${isC1 ? 'border-blue-300 bg-blue-50/40' : 'border-slate-300 bg-slate-50'} rounded-lg p-4 shadow-sm print:border-none print:p-0 print:shadow-none break-inside-avoid`}>
                           <h3 className={`font-bold text-center border-b-2 ${isC1 ? 'border-blue-200 text-blue-900' : 'border-slate-200 text-slate-800'} pb-2 mb-3 tracking-wider print:border-b print:border-black print:mb-2 print:pb-1`}>CIRCUIT {num}</h3>
                           <div className="space-y-3">
                             <div className="flex flex-col sm:flex-row sm:items-center gap-1 sm:gap-3">
                                <label className="text-xs font-bold text-gray-600 uppercase w-20 print:text-black">Item</label>
                                <input className="flex-1 border border-gray-400 bg-white shadow-sm focus:ring-2 focus:ring-blue-500 outline-none rounded p-2 text-sm print:p-0 print:border-b" value={data[cName].item} onChange={e => updateCircuit(cName, 'item', e.target.value)} />
                             </div>
                             <div className="flex flex-col sm:flex-row sm:items-center gap-1 sm:gap-3">
                                <label className="text-xs font-bold text-gray-600 uppercase w-20 print:text-black">Model No.</label>
                                <input className="flex-1 border border-gray-400 bg-white shadow-sm focus:ring-2 focus:ring-blue-500 outline-none rounded p-2 text-sm print:p-0 print:border-b" value={data[cName].modelNo} onChange={e => updateCircuit(cName, 'modelNo', e.target.value)} />
                             </div>
                             <div className="flex flex-col sm:flex-row sm:items-center gap-1 sm:gap-3">
                                <label className="text-xs font-bold text-gray-600 uppercase w-20 print:text-black">Serial No.</label>
                                <input className="flex-1 border border-gray-400 bg-white shadow-sm focus:ring-2 focus:ring-blue-500 outline-none rounded p-2 text-sm print:p-0 print:border-b" value={data[cName].serialNo} onChange={e => updateCircuit(cName, 'serialNo', e.target.value)} />
                             </div>
                             <div className="flex flex-col sm:flex-row sm:items-center gap-1 sm:gap-3 mt-2">
                                <label className="text-xs font-bold text-gray-700 uppercase w-32 print:text-black">Work Complete?</label>
                                <select 
                                  className="flex-1 border border-gray-400 shadow-sm focus:ring-2 focus:ring-blue-500 outline-none rounded p-2 text-sm bg-white font-medium print:bg-transparent print:p-0 print:border-none print:font-bold"
                                  value={data[cName].workComplete}
                                  onChange={e => updateCircuit(cName, 'workComplete', e.target.value)}
                                >
                                  <option value=""></option>
                                  <option value="Yes">Yes</option>
                                  <option value="No">No</option>
                                </select>
                             </div>
                           </div>
                        </div>
                      );
                    })}
                  </div>

                  <hr className="my-8 border-gray-300 print:my-4 print:border-black" />

                  {/* Mobile Tab Toggle for Circuit Details */}
                  <div className="md:hidden flex rounded-md shadow-sm mb-6 print-hidden">
                    <button
                      onClick={() => setMobileTab(0)}
                      className={`flex-1 py-3 text-sm font-bold tracking-wide rounded-l-md border transition-colors ${mobileTab === 0 ? 'bg-blue-800 text-white border-blue-800' : 'bg-white text-gray-600 border-gray-400 hover:bg-gray-50'}`}
                    >
                      Check Circuit 1
                    </button>
                    <button
                      onClick={() => setMobileTab(1)}
                      className={`flex-1 py-3 text-sm font-bold tracking-wide rounded-r-md border-t border-b border-r transition-colors ${mobileTab === 1 ? 'bg-slate-800 text-white border-slate-800' : 'bg-white text-gray-600 border-gray-400 hover:bg-gray-50'}`}
                    >
                      Check Circuit 2
                    </button>
                  </div>

                  {/* Desktop Checklists Header */}
                  <div className="hidden md:grid md:grid-cols-12 gap-4 mb-4 px-2 print:grid-cols-12 print-grid-cols items-center">
                    <div className="col-span-4 font-black text-gray-500 text-xs uppercase tracking-wider print:text-black">System Checklists</div>
                    <div className="col-span-4 font-bold text-center text-blue-900 bg-blue-100 border border-blue-200 rounded py-2 shadow-sm print:bg-transparent print:text-black print:border-none print:p-0">Circuit 1</div>
                    <div className="col-span-4 font-bold text-center text-slate-800 bg-slate-200 border border-slate-300 rounded py-2 shadow-sm print:bg-transparent print:text-black print:border-none print:p-0">Circuit 2</div>
                  </div>

                  {/* Checklist Sections */}
                  {SECTIONS.map(section => (
                    <div key={section.title} className="mb-8 break-inside-avoid print:mb-4">
                      <h4 className="font-bold text-lg text-white bg-slate-700 px-4 py-2 mb-3 rounded-md shadow-sm print:text-black print:bg-gray-200 print:border-b print:border-black uppercase tracking-wider print:text-sm">
                        {section.title}
                      </h4>
                      
                      <div className="space-y-0 border-2 border-gray-300 rounded-md bg-white overflow-hidden print:border-none shadow-sm">
                        {section.fields.map((field, idx) => (
                           <div key={field.key} className={`grid grid-cols-1 md:grid-cols-12 gap-2 md:gap-4 items-center p-3 hover:bg-blue-50 transition-colors print:p-1 print:py-0 print:border-b-0 ${idx !== section.fields.length - 1 ? 'border-b border-gray-200 print:border-b print:border-gray-300' : ''}`}>
                             
                             {/* Label */}
                             <div className="col-span-1 md:col-span-4 text-sm font-semibold text-gray-700 print:text-xs print:font-medium">
                               {field.label}
                             </div>
                             
                             {/* Circuit 1 */}
                             <div className={`col-span-1 md:col-span-4 ${mobileTab === 0 ? 'block' : 'hidden md:block'} print-block md:bg-blue-50/40 md:p-1.5 md:rounded md:border md:border-blue-100 print:border-none print:p-0 print:bg-transparent`}>
                               <InputComponent 
                                 field={field} 
                                 value={data.circuit1[field.key]} 
                                 onChange={(val) => updateCircuit('circuit1', field.key, val)} 
                               />
                             </div>
                             
                             {/* Circuit 2 */}
                             <div className={`col-span-1 md:col-span-4 ${mobileTab === 1 ? 'block' : 'hidden md:block'} print-block md:bg-slate-100/60 md:p-1.5 md:rounded md:border md:border-slate-200 print:border-none print:p-0 print:bg-transparent`}>
                               <InputComponent 
                                 field={field} 
                                 value={data.circuit2[field.key]} 
                                 onChange={(val) => updateCircuit('circuit2', field.key, val)} 
                               />
                             </div>

                           </div>
                        ))}
                      </div>
                    </div>
                  ))}

                  {/* Footer / Sign-off Section */}
                  <div className="mt-12 pt-6 border-t-2 border-slate-200 print:mt-6 print:pt-4 print:border-t-2 print:border-black break-inside-avoid">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8 print:gap-4">
                      
                      <div className="space-y-6 print:space-y-4">
                        <div>
                          <label className="block text-sm font-bold text-gray-700 mb-2 uppercase tracking-wide print:text-xs print:mb-0">Materials Used:</label>
                          <textarea 
                            className="w-full rounded-md border border-gray-400 bg-white shadow-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-500 p-3 text-sm outline-none print:border-0 print:border-b print:p-0" 
                            rows={3}
                            value={data.footer.materialsUsed}
                            onChange={e => updateFooter('materialsUsed', e.target.value)}
                          />
                        </div>
                        <div>
                          <label className="block text-sm font-bold text-gray-700 mb-2 uppercase tracking-wide print:text-xs print:mb-0">Materials Required:</label>
                          <textarea 
                            className="w-full rounded-md border border-gray-400 bg-white shadow-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-500 p-3 text-sm outline-none print:border-0 print:border-b print:p-0" 
                            rows={3}
                            value={data.footer.materialsRequired}
                            onChange={e => updateFooter('materialsRequired', e.target.value)}
                          />
                        </div>
                      </div>
                      
                      <div className="space-y-6 print:space-y-4">
                        <div>
                          <label className="block text-sm font-bold text-gray-700 mb-2 uppercase tracking-wide print:text-xs print:mb-0">Remarks & Comments:</label>
                          <textarea 
                            className="w-full rounded-md border border-gray-400 bg-white shadow-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-500 p-3 text-sm outline-none print:border-0 print:border-b print:p-0" 
                            rows={2}
                            value={data.footer.remarks}
                            onChange={e => updateFooter('remarks', e.target.value)}
                          />
                        </div>

                        <div>
                          <label className="block text-sm font-bold text-gray-700 mb-2 uppercase tracking-wide print:text-xs print:mb-0">Customer Print Name:</label>
                          <input 
                            type="text"
                            className="w-full rounded-md border border-gray-400 bg-white shadow-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-500 p-3 text-sm outline-none print:border-0 print:border-b print:p-0"
                            value={data.footer.customerName}
                            onChange={e => updateFooter('customerName', e.target.value)}
                          />
                        </div>

                        <div>
                          <label className="block text-sm font-bold text-gray-700 mb-2 uppercase tracking-wide flex justify-between items-center print:text-xs print:mb-1">
                            <span>Customer Signature:</span>
                          </label>
                          <SignaturePad />
                        </div>
                      </div>

                    </div>
                  </div>

                </div>

                {/* Action Buttons Footer */}
                <div className="p-6 bg-gray-50 border-t border-gray-300 flex justify-end gap-4 print-hidden mt-6">
                   <button 
                     onClick={() => window.print()} 
                     className="bg-slate-700 text-white px-6 py-3 rounded-lg shadow-sm hover:bg-slate-600 hover:shadow-md flex items-center justify-center gap-2 transition-all font-semibold tracking-wide"
                   >
                     <Printer className="w-5 h-5" />
                     <span>Print / Save PDF</span>
                   </button>
                   
                   <button 
                     onClick={handleSubmit} 
                     className="bg-blue-600 text-white px-8 py-3 rounded-lg shadow-md hover:bg-blue-500 hover:shadow-lg flex items-center justify-center gap-2 transition-all font-bold tracking-wide"
                   >
                     <Send className="w-5 h-5" />
                     <span>Submit to Jotform</span>
                   </button>
                </div>

              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
