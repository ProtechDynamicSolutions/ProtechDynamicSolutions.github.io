<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACS Timesheet Portal</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Babel for in-browser JSX transpilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Import Map for React and Lucide Icons -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.292.0"
        }
    }
    </script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useMemo, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
          Clock, Calendar, MapPin, Plus, Trash2, User, FileText, 
          Receipt, LayoutList, CheckCircle2, Upload, Paperclip, 
          X, Image as ImageIcon, CopyPlus, AlertCircle
        } from 'lucide-react';

        function App() {
          const [activeTab, setActiveTab] = useState('log');
          const [submitAction, setSubmitAction] = useState('next');
          const [overlapError, setOverlapError] = useState('');

          // Persisted States
          const [entries, setEntries] = useState(() => {
            const saved = localStorage.getItem('acs_timesheet_entries_v4');
            return saved ? JSON.parse(saved) : [];
          });

          const [uploads, setUploads] = useState(() => {
            const saved = localStorage.getItem('acs_timesheet_uploads_v4');
            return saved ? JSON.parse(saved) : {};
          });

          const [weeklyExpenses, setWeeklyExpenses] = useState(() => {
            const saved = localStorage.getItem('acs_timesheet_expenses_v4');
            return saved ? JSON.parse(saved) : {};
          });

          // Helper to get the Monday of the current week
          const getInitialMonday = () => {
            const today = new Date();
            const day = today.getDay();
            // If today is Sunday (0), go back 6 days to Monday. Otherwise, go back (day - 1) days.
            const diffToMonday = day === 0 ? -6 : 1 - day;
            const monday = new Date(today.getFullYear(), today.getMonth(), today.getDate() + diffToMonday);
            return `${monday.getFullYear()}-${String(monday.getMonth() + 1).padStart(2, '0')}-${String(monday.getDate()).padStart(2, '0')}`;
          };

          const [formData, setFormData] = useState({
            name: localStorage.getItem('acs_worker_name') || '',
            date: getInitialMonday(),
            site: '',
            startTime: '08:00',
            endTime: '17:00',
            notes: ''
          });

          // Save to Local Storage
          useEffect(() => localStorage.setItem('acs_timesheet_entries_v4', JSON.stringify(entries)), [entries]);
          useEffect(() => localStorage.setItem('acs_timesheet_uploads_v4', JSON.stringify(uploads)), [uploads]);
          useEffect(() => localStorage.setItem('acs_timesheet_expenses_v4', JSON.stringify(weeklyExpenses)), [weeklyExpenses]);

          const handleInputChange = (e) => {
            const { name, value } = e.target;
            setFormData(prev => ({ ...prev, [name]: value }));
            setOverlapError(''); // Clear error when user changes inputs
            if (name === 'name') {
              localStorage.setItem('acs_worker_name', value);
            }
          };

          const handleExpenseChange = (weekEndKey, value) => {
            setWeeklyExpenses(prev => ({ ...prev, [weekEndKey]: value }));
          };

          // Change the entire week context
          const handleWeekChange = (e) => {
            const selectedDateStr = e.target.value;
            if (!selectedDateStr) return;
            
            const [year, month, dayStr] = selectedDateStr.split('-');
            const dateObj = new Date(year, month - 1, dayStr);
            const day = dateObj.getDay();
            
            // Find the Monday of whatever week was selected
            const diffToMonday = day === 0 ? -6 : 1 - day;
            const monday = new Date(year, month - 1, dateObj.getDate() + diffToMonday);
            const mondayStr = `${monday.getFullYear()}-${String(monday.getMonth() + 1).padStart(2, '0')}-${String(monday.getDate()).padStart(2, '0')}`;
            
            setFormData(prev => ({ ...prev, date: mondayStr }));
            setOverlapError('');
          };

          // Automatic break calculation (deduct 30 mins if 5+ hours)
          const calculateHours = (start, end) => {
            const startDate = new Date(`1970-01-01T${start}:00`);
            let endDate = new Date(`1970-01-01T${end}:00`);
            
            if (endDate < startDate) endDate.setDate(endDate.getDate() + 1);
            
            const diffHours = (endDate - startDate) / (1000 * 60 * 60);
            
            // Unpaid breaks in background: after 5 hours work, take 30 mins (0.5 hrs)
            return diffHours >= 5 ? diffHours - 0.5 : diffHours;
          };

          const checkOverlap = (date, start, end) => {
            const newStart = new Date(`1970-01-01T${start}:00`).getTime();
            let newEnd = new Date(`1970-01-01T${end}:00`).getTime();
            if (newEnd < newStart) newEnd += 24 * 60 * 60 * 1000;

            const dayEntries = entries.filter(e => e.date === date);
            for (let e of dayEntries) {
              const eStart = new Date(`1970-01-01T${e.startTime}:00`).getTime();
              let eEnd = new Date(`1970-01-01T${e.endTime}:00`).getTime();
              if (eEnd < eStart) eEnd += 24 * 60 * 60 * 1000;

              // Overlap logic: one starts before the other ends, and ends after the other starts
              if (newStart < eEnd && newEnd > eStart) {
                return true;
              }
            }
            return false;
          };

          // Always returns the Sunday of the given date string
          const getWeekEnding = (dateStr) => {
            const [year, month, dayStr] = dateStr.split('-');
            const dateObj = new Date(year, month - 1, dayStr);
            const day = dateObj.getDay();
            
            // Sunday is 0. If it's 0, diff is 0. If it's Monday (1), diff to Sunday is 6.
            const diff = day === 0 ? 0 : 7 - day; 
            const weekEnd = new Date(year, month - 1, dateObj.getDate() + diff);
            
            return {
              dateObj: weekEnd,
              key: `${weekEnd.getFullYear()}-${String(weekEnd.getMonth() + 1).padStart(2, '0')}-${String(weekEnd.getDate()).padStart(2, '0')}`
            };
          };

          const handleSubmit = (e) => {
            e.preventDefault();
            
            if (checkOverlap(formData.date, formData.startTime, formData.endTime)) {
              setOverlapError(`Time overlap detected! You already have labour logged between these times on ${formatDateLabel(formData.date)}.`);
              return;
            }

            const hoursWorked = calculateHours(formData.startTime, formData.endTime);
            const newEntry = { id: crypto.randomUUID(), ...formData, hoursWorked };

            setEntries(prev => [...prev, newEntry]);
            
            if (submitAction === 'next') {
              const [year, month, day] = formData.date.split('-');
              const nextDate = new Date(year, month - 1, day);
              nextDate.setDate(nextDate.getDate() + 1);
              const nextDateString = `${nextDate.getFullYear()}-${String(nextDate.getMonth() + 1).padStart(2, '0')}-${String(nextDate.getDate()).padStart(2, '0')}`;
              
              setFormData(prev => ({
                ...prev,
                date: nextDateString,
                site: '',
                notes: '',
                startTime: '08:00',
                endTime: '17:00'
              }));
            } else {
              setFormData(prev => ({
                ...prev,
                site: '',
                notes: '',
                startTime: prev.endTime, 
                endTime: '18:00'
              }));
            }
          };

          const deleteEntry = (id) => setEntries(prev => prev.filter(entry => entry.id !== id));

          // Image Upload Logic
          const compressImage = (file) => {
            return new Promise((resolve) => {
              const reader = new FileReader();
              reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                  const canvas = document.createElement('canvas');
                  const MAX_WIDTH = 1000;
                  const MAX_HEIGHT = 1000;
                  let width = img.width;
                  let height = img.height;

                  if (width > height) {
                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                  } else {
                    if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                  }
                  canvas.width = width; canvas.height = height;
                  const ctx = canvas.getContext('2d');
                  ctx.drawImage(img, 0, 0, width, height);
                  resolve(canvas.toDataURL('image/jpeg', 0.7));
                };
                img.src = event.target.result;
              };
              reader.readAsDataURL(file);
            });
          };

          const handleFileUpload = async (e, weekEndKey) => {
            const file = e.target.files[0];
            if (!file) return;
            const compressedBase64 = await compressImage(file);
            setUploads(prev => ({
              ...prev,
              [weekEndKey]: [...(prev[weekEndKey] || []), { id: crypto.randomUUID(), name: file.name, data: compressedBase64 }]
            }));
          };

          const removeUpload = (weekEndKey, uploadId) => {
            setUploads(prev => ({ ...prev, [weekEndKey]: prev[weekEndKey].filter(u => u.id !== uploadId) }));
          };

          // Grouped Entries for Review
          const groupedEntries = useMemo(() => {
            const groups = {};
            entries.forEach(entry => {
              const { key: weekEndKey, dateObj: weekEnd } = getWeekEnding(entry.date);
              if (!groups[weekEndKey]) {
                groups[weekEndKey] = { weekEndKey, weekEndDate: weekEnd, entries: [], totalHours: 0 };
              }
              groups[weekEndKey].entries.push(entry);
              groups[weekEndKey].totalHours += entry.hoursWorked;
            });
            
            const sortedGroups = Object.values(groups).sort((a, b) => b.weekEndDate - a.weekEndDate);
            sortedGroups.forEach(group => {
              group.entries.sort((a, b) => {
                const dateA = new Date(a.date.split('-')[0], a.date.split('-')[1] - 1, a.date.split('-')[2]);
                const dateB = new Date(b.date.split('-')[0], b.date.split('-')[1] - 1, b.date.split('-')[2]);
                return dateA - dateB;
              });
            });
            return sortedGroups;
          }, [entries]);

          const sameDayEntries = useMemo(() => {
            return entries.filter(e => e.date === formData.date).sort((a, b) => a.startTime.localeCompare(b.startTime));
          }, [entries, formData.date]);

          const formatEuro = (amount) => new Intl.NumberFormat('en-IE', { style: 'currency', currency: 'EUR' }).format(amount || 0);
          const formatDateLabel = (dateStr) => {
            const [year, month, day] = dateStr.split('-');
            return new Date(year, month - 1, day).toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
          };
          
          const currentWeekEndingObj = getWeekEnding(formData.date);

          return (
            <div className="min-h-screen bg-slate-50 text-slate-800 font-sans selection:bg-blue-500/30">
              <header className="bg-[#171e29] border-b border-slate-800 shadow-md sticky top-0 z-20">
                <div className="max-w-5xl mx-auto px-4 py-4 flex flex-col sm:flex-row items-center justify-between gap-4">
                  <div className="flex items-center gap-4">
                    <img 
                      src="https://raw.githubusercontent.com/ProtechDynamicSolutions/ProtechDynamicSolutions.github.io/refs/heads/main/ACS/copilot_image_1775887042404.jpeg" 
                      alt="ACS Logo" 
                      className="h-10 sm:h-14 rounded-md shadow-md object-contain bg-[#171e29]"
                    />
                    <div>
                      <h1 className="text-xl font-bold text-white leading-tight">ACS Timesheet</h1>
                      <p className="text-xs text-cyan-400 font-medium tracking-wider uppercase">Portal</p>
                    </div>
                  </div>

                  <div className="flex bg-slate-800 p-1 rounded-lg w-full sm:w-auto">
                    <button 
                      onClick={() => setActiveTab('log')}
                      className={`flex-1 sm:flex-none flex items-center justify-center gap-2 px-4 py-2 rounded-md text-sm font-semibold transition-all ${activeTab === 'log' ? 'bg-blue-600 text-white shadow-sm' : 'text-slate-300 hover:text-white hover:bg-slate-700'}`}
                    >
                      <Plus className="w-4 h-4" /> Log Labour
                    </button>
                    <button 
                      onClick={() => setActiveTab('review')}
                      className={`flex-1 sm:flex-none flex items-center justify-center gap-2 px-4 py-2 rounded-md text-sm font-semibold transition-all ${activeTab === 'review' ? 'bg-blue-600 text-white shadow-sm' : 'text-slate-300 hover:text-white hover:bg-slate-700'}`}
                    >
                      <LayoutList className="w-4 h-4" /> Review
                    </button>
                  </div>
                </div>
              </header>

              <main className="max-w-5xl mx-auto px-4 py-8">
                
                {/* === TAB 1: LOG LABOUR === */}
                {activeTab === 'log' && (
                  <div className="max-w-2xl mx-auto space-y-6">
                    <div className="bg-gradient-to-r from-blue-50 to-white rounded-xl shadow-sm border border-blue-100 p-6 flex flex-col sm:flex-row gap-6 items-start sm:items-center justify-between relative overflow-hidden">
                      <div className="w-full sm:w-auto flex-1 z-10">
                        <label className="block text-sm font-bold text-blue-900 mb-1 flex items-center gap-2">
                          <User className="w-4 h-4" /> Worker Name
                        </label>
                        <input 
                          type="text" 
                          name="name"
                          placeholder="Enter your full name"
                          value={formData.name}
                          onChange={handleInputChange}
                          className="w-full bg-transparent border-b-2 border-blue-200 px-0 py-2 text-xl font-semibold text-slate-800 focus:outline-none focus:border-blue-600 transition-all placeholder:text-slate-400 placeholder:font-normal"
                        />
                      </div>
                      
                      <div className="bg-blue-600 text-white p-3 rounded-lg shadow-sm text-center min-w-[170px] z-10">
                        <div className="flex flex-col items-center justify-center gap-1.5">
                          <p className="text-[10px] text-blue-200 font-bold uppercase tracking-wider">Week Ending (Sunday)</p>
                          <input 
                            type="date" 
                            value={currentWeekEndingObj.key} 
                            onChange={handleWeekChange}
                            className="bg-blue-700 text-white text-sm font-bold rounded border border-blue-500 p-1.5 focus:outline-none focus:ring-1 focus:ring-white cursor-pointer w-full text-center"
                            title="Change week to log past/future timesheets"
                          />
                        </div>
                      </div>
                    </div>

                    {overlapError && (
                      <div className="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg flex items-start gap-3 shadow-sm">
                        <AlertCircle className="w-5 h-5 shrink-0 mt-0.5" />
                        <p className="text-sm font-medium">{overlapError}</p>
                      </div>
                    )}

                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                      <div className="bg-slate-100 px-6 py-4 border-b border-slate-200 flex items-center justify-between">
                        <div className="flex items-center gap-2">
                          <Calendar className="w-5 h-5 text-slate-600" />
                          <h2 className="text-lg font-semibold text-slate-800">Daily Record</h2>
                        </div>
                        <span className="text-xs font-medium text-slate-500 bg-slate-200 px-2 py-1 rounded">
                          Breaks auto-deducted after 5hrs
                        </span>
                      </div>
                      
                      <form onSubmit={handleSubmit} className="p-6 space-y-5">
                        <div>
                          <label className="block text-sm font-medium text-slate-600 mb-1">Date of Work</label>
                          <input 
                            type="date" 
                            name="date"
                            value={formData.date}
                            onChange={handleInputChange}
                            required
                            className="w-full bg-white border border-slate-300 rounded-lg px-4 py-2.5 text-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all font-medium"
                          />
                        </div>

                        <div>
                          <label className="block text-sm font-medium text-slate-600 mb-1 flex items-center gap-2">
                            <MapPin className="w-4 h-4" /> Site / Project Location
                          </label>
                          <input 
                            type="text" 
                            name="site"
                            placeholder="e.g. Dublin Office Park Unit 4"
                            value={formData.site}
                            onChange={handleInputChange}
                            required
                            className="w-full bg-white border border-slate-300 rounded-lg px-4 py-2.5 text-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all placeholder:text-slate-400"
                          />
                        </div>

                        <div className="grid grid-cols-2 gap-4">
                          <div>
                            <label className="block text-sm font-medium text-slate-600 mb-1 flex items-center gap-2">
                              <Clock className="w-4 h-4" /> Start Time
                            </label>
                            <input 
                              type="time" 
                              name="startTime"
                              value={formData.startTime}
                              onChange={handleInputChange}
                              required
                              className="w-full bg-white border border-slate-300 rounded-lg px-4 py-2.5 text-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all"
                            />
                          </div>
                          <div>
                            <label className="block text-sm font-medium text-slate-600 mb-1 flex items-center gap-2">
                              <Clock className="w-4 h-4" /> End Time
                            </label>
                            <input 
                              type="time" 
                              name="endTime"
                              value={formData.endTime}
                              onChange={handleInputChange}
                              required
                              className="w-full bg-white border border-slate-300 rounded-lg px-4 py-2.5 text-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all"
                            />
                          </div>
                        </div>

                        <div>
                          <label className="block text-sm font-medium text-slate-600 mb-1 flex items-center gap-2">
                            <FileText className="w-4 h-4" /> Work Details
                          </label>
                          <textarea 
                            name="notes"
                            rows="2"
                            placeholder="Details of installation, maintenance, etc."
                            value={formData.notes}
                            onChange={handleInputChange}
                            className="w-full bg-white border border-slate-300 rounded-lg px-4 py-2.5 text-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all placeholder:text-slate-400 resize-none"
                          ></textarea>
                        </div>

                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 pt-2">
                          <button 
                            type="submit"
                            onClick={() => setSubmitAction('same')}
                            className="w-full bg-white border-2 border-blue-600 text-blue-700 hover:bg-blue-50 font-semibold py-3 px-4 rounded-lg flex items-center justify-center gap-2 transition-colors active:scale-[0.98]"
                          >
                            <CopyPlus className="w-5 h-5" /> Save & Add Job (Same Day)
                          </button>
                          <button 
                            type="submit"
                            onClick={() => setSubmitAction('next')}
                            className="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg shadow-sm flex items-center justify-center gap-2 transition-colors active:scale-[0.98]"
                          >
                            <CheckCircle2 className="w-5 h-5" /> Save & Next Day
                          </button>
                        </div>
                      </form>
                    </div>

                    {/* Same Day Labour Preview */}
                    {sameDayEntries.length > 0 && (
                      <div className="bg-slate-100 rounded-xl border border-slate-200 p-5 shadow-inner">
                        <h3 className="text-sm font-bold text-slate-600 uppercase tracking-wider mb-3 flex items-center gap-2">
                          <Clock className="w-4 h-4" /> Already Logged for {formatDateLabel(formData.date)}
                        </h3>
                        <div className="space-y-2">
                          {sameDayEntries.map(entry => (
                            <div key={entry.id} className="bg-white border border-slate-200 rounded-lg p-3 flex items-center justify-between shadow-sm">
                              <div>
                                <p className="font-semibold text-slate-800 text-sm">{entry.site}</p>
                                <p className="text-xs text-slate-500 font-medium">{entry.startTime} - {entry.endTime}</p>
                              </div>
                              <div className="flex items-center gap-4">
                                <span className="text-blue-600 font-bold text-sm">{entry.hoursWorked.toFixed(2)} hrs</span>
                                <button onClick={() => deleteEntry(entry.id)} className="text-slate-400 hover:text-red-500" title="Remove">
                                  <Trash2 className="w-4 h-4" />
                                </button>
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                )}

                {/* === TAB 2: REVIEW & UPLOADS PAGE === */}
                {activeTab === 'review' && (
                  <div className="space-y-6">
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden min-h-[500px]">
                      <div className="bg-slate-100 px-6 py-4 border-b border-slate-200 flex items-center gap-2">
                        <LayoutList className="w-5 h-5 text-blue-600" />
                        <h2 className="text-lg font-semibold text-slate-800">Weekly Review & Expenses</h2>
                      </div>

                      <div className="p-4 sm:p-6 bg-slate-50 min-h-[400px]">
                        {groupedEntries.length === 0 ? (
                          <div className="h-full flex flex-col items-center justify-center text-slate-400 p-12 text-center space-y-4">
                            <div className="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center border border-slate-200">
                              <Calendar className="w-10 h-10 text-slate-300" />
                            </div>
                            <p className="text-lg font-medium text-slate-600">No entries recorded yet.</p>
                          </div>
                        ) : (
                          <div className="space-y-8">
                            {groupedEntries.map((weekGroup) => (
                              <div key={weekGroup.weekEndKey} className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                                
                                {/* Week Header with Weekly Expenses Input */}
                                <div className="bg-slate-800 border-b border-slate-700 px-5 py-4 flex flex-col md:flex-row md:items-center justify-between gap-4">
                                  <div>
                                    <p className="text-blue-300 text-xs font-bold uppercase tracking-wider mb-1">Week Ending</p>
                                    <h3 className="font-bold text-white text-lg">
                                      {weekGroup.weekEndDate.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })}
                                    </h3>
                                  </div>
                                  
                                  <div className="flex flex-col sm:flex-row items-stretch sm:items-center gap-3">
                                    <div className="bg-slate-700/80 text-slate-200 px-4 py-2.5 rounded-lg border border-slate-600 flex items-center justify-between sm:justify-start gap-3">
                                      <span className="text-sm font-semibold">Total Labour:</span>
                                      <span className="text-cyan-400 text-lg font-bold">{weekGroup.totalHours.toFixed(2)} hrs</span>
                                    </div>
                                    
                                    {/* Editable Weekly Expenses */}
                                    <div className="bg-slate-700/80 px-4 py-2.5 rounded-lg border border-slate-600 flex items-center justify-between sm:justify-start gap-3 focus-within:border-cyan-400 focus-within:ring-1 focus-within:ring-cyan-400 transition-all">
                                      <span className="text-sm font-semibold text-slate-200 flex items-center gap-1.5"><Receipt className="w-4 h-4" /> Expenses:</span>
                                      <div className="flex items-center text-cyan-400 font-bold text-lg">
                                        <span>€</span>
                                        <input 
                                          type="number" 
                                          step="0.01"
                                          placeholder="0.00"
                                          value={weeklyExpenses[weekGroup.weekEndKey] || ''}
                                          onChange={(e) => handleExpenseChange(weekGroup.weekEndKey, e.target.value)}
                                          className="bg-transparent border-none text-cyan-400 focus:ring-0 w-24 p-0 text-right font-bold placeholder:text-slate-500 focus:outline-none"
                                        />
                                      </div>
                                    </div>
                                  </div>
                                </div>

                                {/* Daily Entries */}
                                <div className="divide-y divide-slate-100">
                                  {weekGroup.entries.map((entry) => (
                                    <div key={entry.id} className="p-4 sm:p-5 hover:bg-slate-50 transition-colors flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                                      <div className="flex-1">
                                        <div className="flex items-center gap-3 mb-1">
                                          <span className="bg-blue-50 text-blue-700 px-3 py-1.5 rounded text-xs font-bold border border-blue-100 uppercase tracking-wide w-28 text-center shadow-sm">
                                            {formatDateLabel(entry.date)}
                                          </span>
                                          <h4 className="font-semibold text-slate-800 text-base">{entry.site}</h4>
                                        </div>
                                        <div className="flex items-center gap-2 text-sm text-slate-600 mt-2 pl-32 sm:pl-0 font-medium">
                                          <Clock className="w-4 h-4 text-slate-400" />
                                          {entry.startTime} - {entry.endTime}
                                        </div>
                                        {entry.notes && (
                                          <p className="text-sm text-slate-600 mt-3 border-l-2 border-slate-300 pl-3 italic">{entry.notes}</p>
                                        )}
                                      </div>
                                      <div className="flex items-center justify-between sm:flex-col sm:items-end gap-2 border-t sm:border-t-0 sm:border-l border-slate-200 pt-3 sm:pt-0 sm:pl-5 min-w-[100px]">
                                        <p className="text-xl font-bold text-slate-800">{entry.hoursWorked.toFixed(2)}<span className="text-sm font-medium text-slate-500 ml-1">hrs</span></p>
                                        <button onClick={() => deleteEntry(entry.id)} className="text-slate-400 hover:text-red-500 p-1.5 rounded-md hover:bg-red-50" title="Delete entry">
                                          <Trash2 className="w-4 h-4" />
                                        </button>
                                      </div>
                                    </div>
                                  ))}
                                </div>

                                {/* Upload Section */}
                                <div className="bg-slate-50 border-t border-slate-200 p-4 sm:p-5">
                                  <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-4">
                                    <h4 className="font-semibold text-slate-700 flex items-center gap-2 text-sm uppercase tracking-wider">
                                      <Paperclip className="w-4 h-4" /> Receipts & Documents
                                    </h4>
                                    <div className="relative">
                                      <input 
                                        type="file" 
                                        id={`file-upload-${weekGroup.weekEndKey}`}
                                        accept="image/*,application/pdf"
                                        onChange={(e) => handleFileUpload(e, weekGroup.weekEndKey)}
                                        className="hidden"
                                      />
                                      <label htmlFor={`file-upload-${weekGroup.weekEndKey}`} className="cursor-pointer bg-white border border-slate-300 text-slate-700 hover:bg-slate-100 px-4 py-2 rounded-lg text-sm font-semibold flex items-center gap-2 shadow-sm inline-flex">
                                        <Upload className="w-4 h-4" /> Add File
                                      </label>
                                    </div>
                                  </div>

                                  {(uploads[weekGroup.weekEndKey] && uploads[weekGroup.weekEndKey].length > 0) ? (
                                    <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
                                      {uploads[weekGroup.weekEndKey].map((file) => (
                                        <div key={file.id} className="relative group bg-white border border-slate-200 rounded-lg p-2 shadow-sm">
                                          <div className="aspect-square bg-slate-100 rounded flex items-center justify-center overflow-hidden mb-2">
                                            {file.data.startsWith('data:image') ? <img src={file.data} alt="Receipt" className="w-full h-full object-cover" /> : <ImageIcon className="w-8 h-8 text-slate-400" />}
                                          </div>
                                          <p className="text-xs text-slate-500 truncate px-1" title={file.name}>{file.name}</p>
                                          <button onClick={() => removeUpload(weekGroup.weekEndKey, file.id)} className="absolute -top-2 -right-2 bg-red-100 text-red-600 rounded-full p-1 opacity-0 group-hover:opacity-100 transition-opacity border border-red-200 shadow-sm hover:bg-red-500 hover:text-white">
                                            <X className="w-3.5 h-3.5" />
                                          </button>
                                        </div>
                                      ))}
                                    </div>
                                  ) : (
                                    <div className="bg-white border border-dashed border-slate-300 rounded-lg p-6 text-center text-sm text-slate-500">
                                      No receipts uploaded for this week.
                                    </div>
                                  )}
                                </div>

                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                )}
              </main>
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
