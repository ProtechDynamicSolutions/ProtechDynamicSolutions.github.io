<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cork Grocers Club - Admin Analytics</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .animate-fadeIn { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICONS ---
        const Icon = ({ name, className }) => {
            const svgs = {
                ShieldCheck: <><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></>,
                Users: <><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>,
                Euro: <><path d="M4 10h12"/><path d="M4 14h9"/><path d="M19 6a7.7 7.7 0 0 0-5.2-2A7.9 7.9 0 0 0 6 12c0 4.4 3.5 8 7.8 8 2 0 3.8-.8 5.2-2"/></>,
                Activity: <><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></>,
                AlertTriangle: <><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></>,
                LogOut: <><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></>,
                TrendingUp: <><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {svgs[name]}
                </svg>
            );
        };

        // --- MOCK ANALYTICS DATA ---
        const ANALYTICS = {
            totalMembers: 156,
            activeMembers: 132,
            expiredMembers: 24,
            revenueYTD: 33000,
            revenueThisMonth: 4250,
            recentPayments: [
                { id: 101, memberNo: "1890", name: "Jim Duggan", amount: 120, date: "2026-05-06", method: "Credit Card" },
                { id: 102, memberNo: "1842", name: "Sarah O'Connor", amount: 120, date: "2026-05-05", method: "Bank Transfer" },
                { id: 103, memberNo: "1905", name: "Liam Murphy", amount: 120, date: "2026-05-03", method: "Credit Card" },
                { id: 104, memberNo: "1776", name: "Fiona Gallagher", amount: 120, date: "2026-05-01", method: "Direct Debit" },
                { id: 105, memberNo: "1920", name: "Dave Maher", amount: 120, date: "2026-04-28", method: "Credit Card" },
            ],
            membershipTrends: [
                { month: "Jan", active: 110, expired: 45 },
                { month: "Feb", active: 118, expired: 38 },
                { month: "Mar", active: 125, expired: 31 },
                { month: "Apr", active: 129, expired: 27 },
                { month: "May", active: 132, expired: 24 },
            ]
        };

        function App() {
            const Navbar = () => (
                <nav className="bg-[#0F3D2E] text-[#F4F1EC] sticky top-0 z-50 border-b-4 border-[#C6A75E]">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex justify-between h-20">
                            <div className="flex items-center">
                                {/* Fixed: Using Icon component instead of undefined ShieldCheck */}
                                <Icon name="ShieldCheck" className="h-8 w-8 text-[#C6A75E] mr-3" />
                                <div>
                                    <h1 className="font-['Playfair_Display'] text-xl font-bold tracking-wider uppercase">Cork Grocers Club</h1>
                                    <p className="font-['Inter'] text-xs text-[#C6A75E] tracking-widest">Committee Analytics Portal</p>
                                </div>
                            </div>
                            <div className="flex items-center space-x-6">
                                <span className="font-['Inter'] text-sm hidden sm:block">Welcome, Committee Secretary</span>
                                <button className="font-['Inter'] text-sm border border-[#C6A75E] text-[#C6A75E] px-4 py-1.5 rounded-sm hover:bg-[#C6A75E] hover:text-[#0F3D2E] transition-colors flex items-center">
                                    <Icon name="LogOut" className="w-4 h-4 mr-1" /> Exit
                                </button>
                            </div>
                        </div>
                    </div>
                </nav>
            );

            const KpiCard = ({ title, value, icon, subtext, colorClass }) => (
                <div className="bg-white p-6 shadow-sm border border-gray-200 rounded-sm">
                    <div className="flex justify-between items-start">
                        <div>
                            <h3 className="font-['Inter'] text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">{title}</h3>
                            <p className={`font-['Playfair_Display'] text-3xl font-bold ${colorClass}`}>{value}</p>
                        </div>
                        <div className="p-3 bg-gray-50 rounded-full text-gray-400">
                            {icon}
                        </div>
                    </div>
                    <div className="mt-4 pt-4 border-t border-gray-100">
                        <p className="font-['Inter'] text-xs text-gray-500">{subtext}</p>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-[#F4F1EC] text-[#2B2B2B] font-['Inter'] selection:bg-[#C6A75E] selection:text-[#0F3D2E]">
                    <Navbar />
                    
                    <main className="max-w-7xl mx-auto py-10 px-4 sm:px-6 lg:px-8 animate-fadeIn">
                        <div className="mb-8 flex flex-col sm:flex-row sm:items-center sm:justify-between">
                            <div>
                                <h2 className="font-['Playfair_Display'] text-3xl text-[#0F3D2E] font-bold">Membership Overview</h2>
                                <p className="font-['Inter'] text-gray-600 mt-1">Real-time statistics and financial reporting programmes.</p>
                            </div>
                            <div className="mt-4 sm:mt-0 flex space-x-3">
                                <button className="bg-white border border-gray-300 text-[#2B2B2B] px-4 py-2 rounded-sm text-sm font-medium hover:bg-gray-50 transition-colors">
                                    Export CSV
                                </button>
                                <button className="bg-[#0F3D2E] text-[#C6A75E] px-4 py-2 rounded-sm text-sm font-bold hover:bg-[#1a5743] transition-colors">
                                    Generate Report
                                </button>
                            </div>
                        </div>

                        {/* KPI Grid */}
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                            <KpiCard 
                                title="Total Members" 
                                value={ANALYTICS.totalMembers} 
                                icon={<Icon name="Users" className="w-6 h-6" />}
                                subtext="+4 from last month"
                                colorClass="text-[#0F3D2E]"
                            />
                            <KpiCard 
                                title="Active Members" 
                                value={ANALYTICS.activeMembers} 
                                icon={<Icon name="Activity" className="w-6 h-6" />}
                                subtext="84.6% retention rate"
                                colorClass="text-green-700"
                            />
                            <KpiCard 
                                title="Pending Renewals" 
                                value={ANALYTICS.expiredMembers} 
                                icon={<Icon name="AlertTriangle" className="w-6 h-6" />}
                                subtext="Reminders sent 01/05"
                                colorClass="text-[#5B1E2D]"
                            />
                            <KpiCard 
                                title="Revenue This Month" 
                                value={`€${ANALYTICS.revenueThisMonth.toLocaleString()}`} 
                                icon={<Icon name="Euro" className="w-6 h-6" />}
                                subtext="€33,000 YTD Total"
                                colorClass="text-[#C6A75E]"
                            />
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            {/* Table Section */}
                            <div className="lg:col-span-2 bg-white shadow-sm border border-gray-200 rounded-sm">
                                <div className="px-6 py-5 border-b border-gray-200 flex justify-between items-center">
                                    <h3 className="font-['Playfair_Display'] text-xl font-bold text-[#0F3D2E]">Recent Membership Payments</h3>
                                    <a href="#" className="text-sm text-[#C6A75E] hover:text-[#0F3D2E] font-medium transition-colors">View All &rarr;</a>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left border-collapse">
                                        <thead>
                                            <tr className="bg-gray-50 border-b border-gray-200 text-xs uppercase tracking-wider text-gray-500 font-bold">
                                                <th className="px-6 py-4">Member</th>
                                                <th className="px-6 py-4">Date</th>
                                                <th className="px-6 py-4">Method</th>
                                                <th className="px-6 py-4 text-right">Amount</th>
                                                <th className="px-6 py-4 text-center">Status</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-gray-100">
                                            {ANALYTICS.recentPayments.map((payment) => (
                                                <tr key={payment.id} className="hover:bg-gray-50 transition-colors">
                                                    <td className="px-6 py-4">
                                                        <p className="font-medium text-[#2B2B2B]">{payment.name}</p>
                                                        <p className="text-xs text-gray-500">#{payment.memberNo}</p>
                                                    </td>
                                                    <td className="px-6 py-4 text-sm text-gray-600">
                                                        {new Date(payment.date).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' })}
                                                    </td>
                                                    <td className="px-6 py-4 text-sm text-gray-600">{payment.method}</td>
                                                    <td className="px-6 py-4 text-sm font-semibold text-[#0F3D2E] text-right">
                                                        €{payment.amount.toFixed(2)}
                                                    </td>
                                                    <td className="px-6 py-4 text-center">
                                                        <span className="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">
                                                            Processed
                                                        </span>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                            {/* Status Visualizer */}
                            <div className="bg-[#0F3D2E] text-[#F4F1EC] shadow-sm rounded-sm relative overflow-hidden flex flex-col border-t-4 border-[#C6A75E]">
                                <div className="absolute inset-0 opacity-5" style={{ backgroundImage: 'radial-gradient(#C6A75E 1px, transparent 1px)', backgroundSize: '20px 20px' }}></div>
                                <div className="relative z-10 p-6 flex-grow">
                                    <h3 className="font-['Playfair_Display'] text-xl font-bold text-white mb-6 flex items-center">
                                        <Icon name="TrendingUp" className="w-5 h-5 mr-2 text-[#C6A75E]" />
                                        Membership Health
                                    </h3>
                                    
                                    <div className="space-y-6">
                                        <div>
                                            <div className="flex justify-between text-sm mb-2">
                                                <span className="text-gray-300">Active Members</span>
                                                <span className="font-bold text-white">{ANALYTICS.activeMembers}</span>
                                            </div>
                                            <div className="w-full bg-[#1a5743] rounded-full h-2.5">
                                                <div className="bg-[#C6A75E] h-2.5 rounded-full" style={{ width: `${(ANALYTICS.activeMembers / ANALYTICS.totalMembers) * 100}%` }}></div>
                                            </div>
                                        </div>
                                        
                                        <div>
                                            <div className="flex justify-between text-sm mb-2">
                                                <span className="text-gray-300">Pending Renewals</span>
                                                <span className="font-bold text-white">{ANALYTICS.expiredMembers}</span>
                                            </div>
                                            <div className="w-full bg-[#1a5743] rounded-full h-2.5">
                                                <div className="bg-[#5B1E2D] h-2.5 rounded-full" style={{ width: `${(ANALYTICS.expiredMembers / ANALYTICS.totalMembers) * 100}%` }}></div>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="mt-8 p-4 bg-[#154a3a] border border-[#1a5743] rounded-sm text-sm text-gray-300 leading-relaxed">
                                        <p>The club has seen a steady increase in renewals this month. Total active members represent <strong>{Math.round((ANALYTICS.activeMembers / ANALYTICS.totalMembers) * 100)}%</strong> of the total registered base.</p>
                                        <button className="mt-4 w-full border border-[#C6A75E] text-[#C6A75E] py-2 rounded-sm hover:bg-[#C6A75E] hover:text-[#0F3D2E] transition-colors font-semibold">
                                            Send Reminder Emails
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
