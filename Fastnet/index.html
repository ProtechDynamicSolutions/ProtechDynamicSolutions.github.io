<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Fastnet Quote Generator</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.292.0"
        }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'fastnet-dark': '#111827',
                        'fastnet-gray': '#4B5563',
                        'fastnet-accent': '#0284c7', 
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.2s ease-out',
                        'slide-up': 'slideUp 0.3s ease-out',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(10px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f4f4f5; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        body { 
            background-color: #f8fafc; 
            color: #1e293b; 
            font-family: system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        /* Prevent zooming on iOS inputs */
        input[type="text"], input[type="number"], select, textarea {
            font-size: 16px !important;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, Component, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
            FileText, Share, Calendar, MapPin, User, Phone, 
            Mail, Plus, Trash2, Settings, Download, Euro, Home, FileCheck, Percent, X, ChevronDown
        } from 'lucide-react';

        const ADVISERS = [
            { name: "Peter Kelleher", phone: "087 627 9456", email: "info@fastnetblinds.ie" },
            { name: "Kieran Kelleher", phone: "087 627 9456", email: "info@fastnetblinds.ie" },
            { name: "Kimberley McGorry", phone: "087 627 9456", email: "info@fastnetblinds.ie" }
        ];

        const BLIND_TYPES = [
            "Roller Blinds", "Roman Blinds", "Vertical Blinds",
            "Venetian Blinds", "Wooden Venetian Blinds", "Pleated Blinds",
            "Perfect Fit Blinds", "Plantation Shutters", "Motorised Blinds",
            "Awnings", "Outdoor Blinds", "Skylight Blinds"
        ];

        const LOGO_URL = "https://raw.githubusercontent.com/ProtechDynamicSolutions/ProtechDynamicSolutions.github.io/refs/heads/main/Fastnet/1772185373414.png";

        const getInitials = (name) => name.split(/[ ']/).filter(Boolean).map(p => p[0]).join('').toUpperCase();
        const formatCurrency = (num) => parseFloat(num || 0).toLocaleString('en-IE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

        // --- ERROR BOUNDARY ---
        class ErrorBoundary extends Component {
            constructor(props) { super(props); this.state = { hasError: false }; }
            static getDerivedStateFromError() { return { hasError: true }; }
            render() {
                if (this.state.hasError) return <div className="p-8 text-center text-red-500 font-bold">An error occurred. Please refresh the page.</div>;
                return this.props.children;
            }
        }

        const InputGroup = ({ label, icon: Icon, children, className = '' }) => (
            <div className={`bg-white p-3.5 rounded-xl border border-slate-200 shadow-sm focus-within:ring-2 focus-within:ring-sky-400 transition-all group hover:border-slate-300 ${className}`}>
                <label className="flex items-center gap-2 text-[10px] font-bold text-slate-500 mb-1.5 uppercase tracking-widest group-focus-within:text-sky-600 transition-colors">
                    {Icon && <Icon size={12} />} {label}
                </label>
                {children}
            </div>
        );

        const TextInput = ({ ...props }) => (
            <input {...props} className="w-full bg-transparent outline-none text-slate-800 font-semibold placeholder-slate-400 text-sm" />
        );

        function AppContent() {
            const [isGenerating, setIsGenerating] = useState(false);
            const [statusMsg, setStatusMsg] = useState('');
            const [quoteRef, setQuoteRef] = useState('Draft');
            const [activeDropdown, setActiveDropdown] = useState(null);

            const [formData, setFormData] = useState({
                adviserName: ADVISERS[0].name,
                date: new Date().toISOString().split('T')[0],
                clientName: '',
                clientEmail: '',
                clientPhone: '',
                siteAddress: '',
                discount: '',
                includeVat: true
            });

            const [items, setItems] = useState([
                { id: 1, description: '', qty: 1, unitPrice: '' }
            ]);

            useEffect(() => {
                const generateRef = () => {
                    const initials = getInitials(formData.adviserName);
                    const now = new Date();
                    const yy = String(now.getFullYear()).slice(-2);
                    const mm = String(now.getMonth() + 1).padStart(2, '0');
                    const dd = String(now.getDate()).padStart(2, '0');
                    const hh = String(now.getHours()).padStart(2, '0');
                    const min = String(now.getMinutes()).padStart(2, '0');
                    
                    setQuoteRef(`FB-${initials}-${yy}${mm}${dd}-${hh}${min}`);
                };
                generateRef();
            }, [formData.adviserName]);

            const handleFormChange = (e) => {
                const { name, value, type, checked } = e.target;
                setFormData(prev => ({ ...prev, [name]: type === 'checkbox' ? checked : value }));
            };

            const handleItemChange = (id, field, value) => {
                setItems(prev => prev.map(item => item.id === id ? { ...item, [field]: value } : item));
            };

            const addItem = () => {
                const newId = Date.now();
                setItems(prev => [...prev, { id: newId, description: '', qty: 1, unitPrice: '' }]);
                // Small delay to allow React to render then scroll
                setTimeout(() => {
                    const el = document.getElementById(`item-${newId}`);
                    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 100);
            };

            const removeItem = (id) => {
                if (items.length > 1) setItems(prev => prev.filter(item => item.id !== id));
            };

            // Calculations
            const subtotal = items.reduce((sum, item) => sum + (parseFloat(item.qty || 0) * parseFloat(item.unitPrice || 0)), 0);
            const discountPerc = parseFloat(formData.discount || 0);
            const discountAmt = subtotal * (discountPerc / 100);
            const netTotal = Math.max(0, subtotal - discountAmt);
            const vatAmount = formData.includeVat ? netTotal * 0.135 : 0; 
            const grossTotal = netTotal + vatAmount;

            const getBase64ImageFromURL = (url) => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.setAttribute("crossOrigin", "anonymous");
                    img.onload = () => {
                        const c = document.createElement("canvas");
                        c.width = img.width; c.height = img.height;
                        const ctx = c.getContext("2d");
                        ctx.drawImage(img, 0, 0);
                        resolve({ data: c.toDataURL("image/png"), w: img.width, h: img.height });
                    };
                    img.onerror = () => resolve(null);
                    img.src = url;
                });
            };

            const generatePDF = async () => {
                if (!window.jspdf) return;
                setIsGenerating(true);
                setStatusMsg('Formatting document...');

                try {
                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF();
                    
                    const brandBlack = [17, 24, 39];
                    const brandGray = [75, 85, 99];
                    const lightGray = [243, 244, 246];
                    const borderGray = [229, 231, 235];
                    const brandAccent = [2, 132, 199]; 
                    
                    const logoObj = await getBase64ImageFromURL(LOGO_URL);

                    let y = 0;

                    const addHeader = (isFirstPage = false) => {
                        doc.setFillColor(...brandAccent);
                        doc.rect(0, 0, 210, 4, 'F');
                        
                        y = 15;
                        let currentLogoHeight = 20; 
                        
                        if (logoObj && logoObj.data) {
                            const targetWidth = 45; 
                            currentLogoHeight = (logoObj.h / logoObj.w) * targetWidth;
                            doc.addImage(logoObj.data, 'PNG', 15, y, targetWidth, currentLogoHeight);
                        } else {
                            doc.setFont("helvetica", "bold");
                            doc.setFontSize(22);
                            doc.setTextColor(...brandBlack);
                            doc.text("FASTNET BLINDS", 15, y + 10);
                        }

                        doc.setFont("helvetica", "bold");
                        doc.setFontSize(10);
                        doc.setTextColor(...brandBlack);
                        doc.text("Fastnet Awnings & Shutters Limited", 195, y + 4, { align: "right" });
                        
                        doc.setFont("helvetica", "normal");
                        doc.setFontSize(8.5);
                        doc.setTextColor(...brandGray);
                        const companyDetails = [
                            "Kilnagleary, Carrigaline",
                            "P43 HF59, Co Cork",
                            "Tel: +353 87 627 9456",
                            "Web: www.fastnetblinds.ie",
                            "VAT No: 3668036EH"
                        ];
                        
                        companyDetails.forEach((line, idx) => {
                            doc.text(line, 195, y + 9 + (idx * 4.5), { align: "right" });
                        });

                        y = y + Math.max(currentLogoHeight, 30) + 8;
                        
                        doc.setDrawColor(...borderGray);
                        doc.setLineWidth(0.5);
                        doc.line(15, y, 195, y);
                        y += 12;
                    };

                    addHeader(true);

                    doc.setFont("helvetica", "bold");
                    doc.setFontSize(18);
                    doc.setTextColor(...brandBlack);
                    doc.text("QUOTATION", 15, y);

                    doc.setFillColor(...lightGray);
                    doc.roundedRect(125, y - 8, 70, 28, 2, 2, 'F');
                    
                    doc.setFontSize(8.5);
                    const metaX = 130;
                    let metaY = y - 2;
                    
                    doc.setTextColor(...brandGray); doc.text("Quote Ref:", metaX, metaY);
                    doc.setTextColor(...brandBlack); doc.setFont("helvetica", "bold"); doc.text(quoteRef, metaX + 35, metaY);
                    
                    metaY += 6;
                    doc.setFont("helvetica", "normal");
                    doc.setTextColor(...brandGray); doc.text("Date:", metaX, metaY);
                    doc.setTextColor(...brandBlack); doc.setFont("helvetica", "bold"); doc.text(formData.date.split('-').reverse().join('/'), metaX + 35, metaY);
                    
                    metaY += 6;
                    doc.setFont("helvetica", "normal");
                    doc.setTextColor(...brandGray); doc.text("Account Mgr:", metaX, metaY);
                    doc.setTextColor(...brandBlack); doc.setFont("helvetica", "bold"); doc.text(formData.adviserName, metaX + 35, metaY);

                    metaY += 6;
                    doc.setFont("helvetica", "normal");
                    doc.setTextColor(...brandGray); doc.text("Valid For:", metaX, metaY);
                    doc.setTextColor(...brandBlack); doc.setFont("helvetica", "bold"); doc.text("30 Days", metaX + 35, metaY);

                    y += 15;

                    doc.setFontSize(9);
                    doc.setTextColor(...brandAccent);
                    doc.setFont("helvetica", "bold");
                    doc.text("PREPARED FOR:", 15, y);
                    y += 5;
                    
                    doc.setTextColor(...brandBlack);
                    doc.text(formData.clientName || "Valued Client", 15, y);
                    doc.setFont("helvetica", "normal");
                    doc.setTextColor(...brandGray);
                    
                    if (formData.siteAddress) {
                        const addrLines = doc.splitTextToSize(formData.siteAddress, 80);
                        addrLines.forEach(line => { y += 4.5; doc.text(line, 15, y); });
                    }
                    if (formData.clientPhone) { y += 4.5; doc.text(`Tel: ${formData.clientPhone}`, 15, y); }
                    if (formData.clientEmail) { y += 4.5; doc.text(`Email: ${formData.clientEmail}`, 15, y); }
                    
                    y += 15;

                    const tableCols = [
                        { label: "Description", x: 15, w: 100, align: "left" },
                        { label: "Qty", x: 125, w: 15, align: "center" },
                        { label: "Unit Price", x: 155, w: 20, align: "right" },
                        { label: "Total Net", x: 195, w: 20, align: "right" }
                    ];

                    doc.setFillColor(...brandBlack);
                    doc.rect(12, y, 186, 8, 'F');
                    doc.setTextColor(255, 255, 255);
                    doc.setFont("helvetica", "bold");
                    doc.setFontSize(8.5);
                    
                    tableCols.forEach(col => {
                        doc.text(col.label, col.x, y + 5.5, { align: col.align });
                    });
                    
                    y += 8;

                    doc.setFont("helvetica", "normal");
                    doc.setTextColor(...brandBlack);
                    let altRow = false;

                    items.forEach((item, index) => {
                        const itemTotal = parseFloat(item.qty || 0) * parseFloat(item.unitPrice || 0);
                        const descLines = doc.splitTextToSize(item.description || "Item", 95);
                        const rowH = Math.max(8, descLines.length * 5 + 3);

                        if (y + rowH > 240) {
                            doc.addPage();
                            addHeader();
                            doc.setFillColor(...brandBlack);
                            doc.rect(12, y, 186, 8, 'F');
                            doc.setTextColor(255, 255, 255);
                            doc.setFont("helvetica", "bold");
                            tableCols.forEach(col => { doc.text(col.label, col.x, y + 5.5, { align: col.align }); });
                            y += 8;
                            doc.setFont("helvetica", "normal");
                            doc.setTextColor(...brandBlack);
                        }

                        if (altRow) {
                            doc.setFillColor(...lightGray);
                            doc.rect(12, y, 186, rowH, 'F');
                        }

                        descLines.forEach((line, i) => {
                            doc.text(line, tableCols[0].x, y + 5.5 + (i * 4.5));
                        });
                        
                        doc.text(String(item.qty), tableCols[1].x, y + 5.5, { align: tableCols[1].align });
                        doc.text(`€${formatCurrency(item.unitPrice)}`, tableCols[2].x, y + 5.5, { align: tableCols[2].align });
                        doc.text(`€${formatCurrency(itemTotal)}`, tableCols[3].x, y + 5.5, { align: tableCols[3].align });

                        y += rowH;
                        altRow = !altRow;
                        
                        doc.setDrawColor(240, 240, 240);
                        doc.setLineWidth(0.1);
                        doc.line(12, y, 198, y);
                    });

                    y += 5;

                    const totalsX = 135;
                    const totalsW = 60;
                    
                    if (y > 210) { doc.addPage(); addHeader(); }

                    const drawTotalRow = (label, value, isBold = false, isHighlight = false) => {
                        if (isHighlight) {
                            doc.setFillColor(...brandBlack);
                            doc.rect(totalsX - 3, y, totalsW + 6, 9, 'F');
                            doc.setTextColor(255, 255, 255);
                        } else {
                            doc.setTextColor(...brandBlack);
                        }
                        
                        doc.setFont("helvetica", isBold ? "bold" : "normal");
                        doc.text(label, totalsX, y + 6);
                        doc.text(`€${formatCurrency(value)}`, totalsX + totalsW, y + 6, { align: "right" });
                        
                        if (!isHighlight) {
                            doc.setDrawColor(...borderGray);
                            doc.setLineWidth(0.2);
                            doc.line(totalsX - 3, y + 9, totalsX + totalsW + 3, y + 9);
                        }
                        y += 9;
                    };

                    drawTotalRow("Subtotal", subtotal);
                    if (discountAmt > 0) {
                        drawTotalRow(`Discount (${discountPerc}%)`, -discountAmt);
                        drawTotalRow("Total Net", netTotal);
                    }
                    
                    if (formData.includeVat) {
                        drawTotalRow("VAT Rate (13.5%)", vatAmount);
                    } else {
                        drawTotalRow("VAT Rate (0%)", vatAmount);
                    }
                    
                    y += 1;
                    drawTotalRow("TOTAL GROSS", grossTotal, true, true);

                    let footerY = Math.max(y + 15, 225); 
                    
                    doc.setFillColor(...lightGray);
                    doc.roundedRect(15, footerY, 180, 45, 2, 2, 'F');
                    
                    doc.setFont("helvetica", "bold");
                    doc.setFontSize(9);
                    doc.setTextColor(...brandAccent);
                    doc.text("PAYMENT ADVICE", 20, footerY + 8);
                    
                    doc.setFont("helvetica", "bold");
                    doc.setFontSize(8);
                    doc.setTextColor(...brandBlack);
                    doc.text("Fastnet Awnings & Shutters Ltd", 20, footerY + 13);
                    
                    doc.setFont("helvetica", "normal");
                    doc.setTextColor(...brandGray);
                    const bankInfo = [
                        "Bank Name: Bank of Ireland",
                        "Account No: 82982297",
                        "Sort Code: 902709",
                        "BIC/SWIFT: BOFIIE2D",
                        "IBAN: IE51BOFI90270982982297"
                    ];
                    bankInfo.forEach((line, i) => { doc.text(line, 20, footerY + 18 + (i * 4)); });

                    doc.setFont("helvetica", "bold");
                    doc.setFontSize(9);
                    doc.setTextColor(...brandAccent);
                    doc.text("TERMS & CONDITIONS", 110, footerY + 8);
                    
                    doc.setFont("helvetica", "normal");
                    doc.setFontSize(7.5);
                    doc.setTextColor(...brandGray);
                    const termsText = "Please note: This quotation is based on a single call-out and fit unless otherwise specified. Unless otherwise specified all invoices are due net 30 days from date of Shipment. PRICES INVOICED WILL BE THOSE IN EFFECT AT TIME OF SHIPMENT. All prices are f.o.b. point of manufacture. Seller reserves the right to place a service charge on past due accounts at the highest rate permitted by law.";
                    const termsLines = doc.splitTextToSize(termsText, 80);
                    doc.text(termsLines, 110, footerY + 13);

                    const blob = doc.output('blob');
                    const file = new File([blob], `${quoteRef}.pdf`, { type: 'application/pdf' });
                    
                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        await navigator.share({ files: [file], title: `Fastnet Quote ${quoteRef}` });
                        setStatusMsg('Quote Shared Successfully');
                    } else {
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a'); a.href = url; a.download = file.name; a.click();
                        setStatusMsg('Quote Downloaded Successfully');
                    }
                } catch (err) { 
                    console.error(err); 
                    setStatusMsg(`Error: ${err.message}`); 
                }
                
                setTimeout(() => { setIsGenerating(false); setStatusMsg(''); }, 3000);
            };

            return (
                <div className="min-h-screen pb-24 font-sans text-slate-800">
                    <nav className="sticky top-0 z-50 bg-white shadow-sm border-b border-slate-200">
                        <div className="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
                             <div className="flex items-center gap-3">
                                <img src={LOGO_URL} alt="Fastnet Blinds" className="h-8 w-auto object-contain" />
                             </div>
                             <div className="px-3 py-1 flex items-center gap-2 bg-slate-100 rounded-md border border-slate-200">
                                <FileText size={14} className="text-slate-500" />
                                <span className="text-xs font-mono font-bold text-slate-700 tracking-wide">
                                    {quoteRef}
                                </span>
                             </div>
                        </div>
                    </nav>

                    <main className="max-w-4xl mx-auto px-4 py-8 space-y-6">
                        
                        <div className="glass-panel p-6 rounded-2xl relative overflow-hidden bg-gradient-to-r from-sky-50 to-white">
                            <h1 className="text-2xl font-bold text-slate-900 mb-1">
                                Fastnet Quote Generator
                            </h1>
                            <p className="text-sm text-slate-500">Create and export PDF quotes for Blinds, Awnings & Shutters.</p>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            
                            <div className="space-y-4">
                                <div className="glass-panel p-5 rounded-2xl space-y-4">
                                    <h3 className="text-sm font-bold text-slate-800 flex items-center gap-2 mb-4 border-b border-slate-100 pb-2">
                                        <User size={16} className="text-sky-500"/> Client Information
                                    </h3>
                                    <InputGroup label="Client / Company Name">
                                        <TextInput name="clientName" placeholder="e.g. John Doe" value={formData.clientName} onChange={handleFormChange} />
                                    </InputGroup>
                                    <InputGroup label="Site Address" icon={MapPin}>
                                        <TextInput name="siteAddress" placeholder="e.g. Midleton, Co. Cork" value={formData.siteAddress} onChange={handleFormChange} />
                                    </InputGroup>
                                    <div className="grid grid-cols-2 gap-4">
                                        <InputGroup label="Email" icon={Mail}>
                                            <TextInput type="email" name="clientEmail" placeholder="john@email.com" value={formData.clientEmail} onChange={handleFormChange} />
                                        </InputGroup>
                                        <InputGroup label="Phone" icon={Phone}>
                                            <TextInput type="tel" name="clientPhone" placeholder="08x..." value={formData.clientPhone} onChange={handleFormChange} />
                                        </InputGroup>
                                    </div>
                                </div>

                                <div className="glass-panel p-5 rounded-2xl space-y-4">
                                    <h3 className="text-sm font-bold text-slate-800 flex items-center gap-2 mb-4 border-b border-slate-100 pb-2">
                                        <Settings size={16} className="text-sky-500"/> Quote Settings
                                    </h3>
                                    <div className="grid grid-cols-2 gap-4">
                                        <InputGroup label="Account Manager">
                                            <select name="adviserName" value={formData.adviserName} onChange={handleFormChange} className="w-full bg-transparent outline-none text-slate-800 font-semibold text-sm cursor-pointer">
                                                {ADVISERS.map(a => <option key={a.name} value={a.name}>{a.name}</option>)}
                                            </select>
                                        </InputGroup>
                                        <InputGroup label="Quote Date" icon={Calendar}>
                                            <TextInput type="date" name="date" value={formData.date} onChange={handleFormChange} />
                                        </InputGroup>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4 items-center">
                                        <InputGroup label="Discount Applied (%)" icon={Percent}>
                                            <TextInput type="number" min="0" max="100" name="discount" value={formData.discount} onChange={handleFormChange} placeholder="0" />
                                        </InputGroup>
                                        <div className="flex items-center justify-start pl-2">
                                            <label className="relative inline-flex items-center cursor-pointer">
                                                <input type="checkbox" name="includeVat" checked={formData.includeVat} onChange={handleFormChange} className="sr-only peer" />
                                                <div className="w-9 h-5 bg-gray-200 peer-focus:outline-none peer-focus:ring-2 peer-focus:ring-sky-300 rounded-full peer peer-checked:bg-sky-500 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:after:translate-x-full peer-checked:after:border-white"></div>
                                                <span className="ml-2 text-sm font-bold text-slate-600">Include VAT</span>
                                            </label>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="glass-panel p-5 rounded-2xl flex flex-col h-full overflow-visible">
                                <div className="flex justify-between items-center mb-4 border-b border-slate-100 pb-2">
                                    <h3 className="text-sm font-bold text-slate-800 flex items-center gap-2">
                                        <Home size={16} className="text-sky-500"/> Products & Services
                                    </h3>
                                    <button onClick={addItem} className="text-xs font-bold bg-sky-50 text-sky-600 px-3 py-1.5 rounded-lg hover:bg-sky-100 transition-colors flex items-center gap-1">
                                        <Plus size={14} /> Add Item
                                    </button>
                                </div>
                                
                                <div className="space-y-4 flex-grow overflow-y-auto max-h-[600px] pr-2 pb-10">
                                    {items.map((item, idx) => (
                                        <div key={item.id} id={`item-${item.id}`} className="bg-slate-50 border border-slate-200 rounded-xl p-3 animate-fade-in relative group overflow-visible">
                                            {items.length > 1 && (
                                                <button onClick={() => removeItem(item.id)} className="absolute -right-2 -top-2 bg-red-100 text-red-500 p-1.5 rounded-full opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-opacity shadow-sm hover:bg-red-200 z-50">
                                                    <X size={14} />
                                                </button>
                                            )}
                                            <div className="flex flex-col gap-2 overflow-visible">
                                                <div className="relative overflow-visible">
                                                    <div className="flex items-center gap-1 mb-1">
                                                        <span className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Description</span>
                                                        <ChevronDown size={10} className="text-slate-300" />
                                                    </div>
                                                    <input 
                                                        type="text" 
                                                        autoComplete="off"
                                                        placeholder="Select or type blind type..." 
                                                        value={item.description} 
                                                        onChange={(e) => {
                                                            handleItemChange(item.id, 'description', e.target.value);
                                                            setActiveDropdown(item.id);
                                                        }}
                                                        onFocus={() => setActiveDropdown(item.id)}
                                                        className="w-full bg-white border border-slate-200 rounded-lg p-3 text-sm font-semibold text-slate-800 outline-none focus:border-sky-400 shadow-sm"
                                                    />
                                                    
                                                    {activeDropdown === item.id && (
                                                        <div className="absolute z-[100] w-full bg-white border border-slate-200 shadow-2xl rounded-xl mt-1 max-h-56 overflow-y-auto animate-slide-up ring-4 ring-black/5">
                                                            <div className="sticky top-0 bg-slate-50 p-2 border-b border-slate-100 flex justify-between items-center">
                                                                <span className="text-[10px] font-bold text-slate-400 px-2 uppercase tracking-tighter">Suggestions</span>
                                                                <button onMouseDown={(e) => { e.preventDefault(); setActiveDropdown(null); }} className="p-1 hover:bg-slate-200 rounded-full"><X size={12}/></button>
                                                            </div>
                                                            {BLIND_TYPES
                                                                .filter(type => !item.description || type.toLowerCase().includes(item.description.toLowerCase()))
                                                                .map(type => (
                                                                <div 
                                                                    key={type}
                                                                    onMouseDown={(e) => {
                                                                        e.preventDefault(); 
                                                                        handleItemChange(item.id, 'description', type);
                                                                        setActiveDropdown(null);
                                                                    }}
                                                                    className="p-3.5 hover:bg-sky-50 border-b border-slate-100 last:border-0 cursor-pointer text-sm font-bold text-slate-700 active:bg-sky-100"
                                                                >
                                                                    {type}
                                                                </div>
                                                            ))}
                                                        </div>
                                                    )}
                                                </div>
                                                <div className="grid grid-cols-2 gap-3 mt-1">
                                                    <div className="flex flex-col gap-1">
                                                        <span className="text-[9px] font-bold text-slate-400 uppercase tracking-widest pl-1">Quantity</span>
                                                        <div className="flex items-center bg-white border border-slate-200 rounded-lg px-3 shadow-sm">
                                                            <input type="number" min="1" value={item.qty} onChange={(e) => handleItemChange(item.id, 'qty', e.target.value)} className="w-full py-2.5 text-sm outline-none font-bold text-slate-700"/>
                                                        </div>
                                                    </div>
                                                    <div className="flex flex-col gap-1">
                                                        <span className="text-[9px] font-bold text-slate-400 uppercase tracking-widest pl-1">Unit Price</span>
                                                        <div className="flex items-center bg-white border border-slate-200 rounded-lg px-3 shadow-sm">
                                                            <span className="text-xs text-slate-400 font-bold mr-2">€</span>
                                                            <input type="number" min="0" placeholder="0.00" value={item.unitPrice} onChange={(e) => handleItemChange(item.id, 'unitPrice', e.target.value)} className="w-full py-2.5 text-sm outline-none font-bold text-slate-700 text-right"/>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <div className="mt-auto pt-6 border-t border-slate-200 space-y-2.5">
                                    <div className="flex justify-between text-sm text-slate-500 font-bold">
                                        <span>Subtotal</span>
                                        <span>€{formatCurrency(subtotal)}</span>
                                    </div>
                                    {discountAmt > 0 && (
                                        <div className="flex justify-between text-sm text-emerald-600 font-bold">
                                            <span>Discount ({discountPerc}%)</span>
                                            <span>-€{formatCurrency(discountAmt)}</span>
                                        </div>
                                    )}
                                    <div className="flex justify-between text-sm text-slate-500 font-bold">
                                        <span>VAT {formData.includeVat ? '(13.5%)' : '(0%)'}</span>
                                        <span>€{formatCurrency(vatAmount)}</span>
                                    </div>
                                    <div className="flex justify-between text-xl font-black text-slate-900 pt-3 border-t border-slate-300">
                                        <span>Total Gross</span>
                                        <span>€{formatCurrency(grossTotal)}</span>
                                    </div>
                                </div>

                            </div>
                        </div>
                    </main>

                    <div className="fixed bottom-0 left-0 right-0 p-4 bg-white/95 backdrop-blur-md border-t border-slate-200 z-[200] shadow-[0_-4px_12px_-1px_rgba(0,0,0,0.1)]">
                        <div className="max-w-4xl mx-auto flex flex-col md:flex-row gap-4 items-center justify-between">
                            <div className="text-xs font-black text-sky-600 tracking-tighter uppercase animate-pulse">
                                {statusMsg}
                            </div>
                            <button 
                                onClick={generatePDF} 
                                disabled={isGenerating || !formData.clientName} 
                                className="w-full md:w-auto px-10 py-4 bg-slate-900 hover:bg-black text-white font-black text-sm uppercase tracking-widest rounded-2xl shadow-2xl active:scale-95 transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-3"
                            >
                                {isGenerating ? <span>Formatting...</span> : <><Download size={20} /> Generate & Export</>}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><AppContent /></ErrorBoundary>);
    </script>
</body>
</html>
