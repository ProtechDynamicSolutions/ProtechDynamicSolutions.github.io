<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memorial Booklet</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for JSX -->
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap');
    
    body {
      margin: 0;
      padding: 0;
      background-color: #1C1A18;
    }

    .perspective-container { perspective: 2000px; }
    
    @keyframes turnNext {
      0% { opacity: 0; transform: rotateY(15deg) translateX(40px) scale(0.97); }
      100% { opacity: 1; transform: rotateY(0deg) translateX(0) scale(1); }
    }
    @keyframes turnPrev {
      0% { opacity: 0; transform: rotateY(-15deg) translateX(-40px) scale(0.97); }
      100% { opacity: 1; transform: rotateY(0deg) translateX(0) scale(1); }
    }
    
    .page-anim-next {
      animation: turnNext 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      transform-origin: left center;
    }
    .page-anim-prev {
      animation: turnPrev 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      transform-origin: right center;
    }

    /* Ken Burns elegant photo animation */
    @keyframes kenBurns {
      0% { transform: scale(1); }
      100% { transform: scale(1.12); }
    }
    .animate-ken-burns {
      animation: kenBurns 25s ease-in-out infinite alternate;
      will-change: transform;
    }

    /* 10% Zoomed Out Custom Animation */
    @keyframes kenBurnsZoomOut {
      0% { transform: scale(0.9); }
      100% { transform: scale(1.02); }
    }
    .animate-ken-burns-zoom-out {
      animation: kenBurnsZoomOut 25s ease-in-out infinite alternate;
      will-change: transform;
    }

    /* 20% Zoomed Out Custom Animation (An extra 10% for the top photo) */
    @keyframes kenBurnsZoomOutMore {
      0% { transform: scale(0.8); }
      100% { transform: scale(0.92); }
    }
    .animate-ken-burns-zoom-out-more {
      animation: kenBurnsZoomOutMore 25s ease-in-out infinite alternate;
      will-change: transform;
    }

    /* 30% Zoomed Out Custom Animation (An extra 10% for both top and bottom photos) */
    @keyframes kenBurnsZoomOutExtreme {
      0% { transform: scale(0.7); }
      100% { transform: scale(0.82); }
    }
    .animate-ken-burns-zoom-out-extreme {
      animation: kenBurnsZoomOutExtreme 25s ease-in-out infinite alternate;
      will-change: transform;
    }

    /* 35% Zoomed Out Custom Animation (Shows 5% more top and bottom for the top photo) */
    @keyframes kenBurnsZoomOutUltra {
      0% { transform: scale(0.65); }
      100% { transform: scale(0.77); }
    }
    .animate-ken-burns-zoom-out-ultra {
      animation: kenBurnsZoomOutUltra 25s ease-in-out infinite alternate;
      will-change: transform;
    }

    /* Content fade in to simulate paper settling */
    @keyframes contentFade {
      0% { opacity: 0; transform: translateY(4px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .page-content-fade-in {
      animation: contentFade 0.8s ease-out forwards;
      animation-delay: 0.1s;
      opacity: 0;
    }

    /* Highlight Play Button Animation */
    @keyframes playHint {
      0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(74, 64, 54, 0.4); }
      50% { transform: scale(1.1); box-shadow: 0 0 0 8px rgba(74, 64, 54, 0); }
      100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(74, 64, 54, 0); }
    }
    .animate-play-hint {
      animation: playHint 2s infinite;
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    // --- INLINE SVG ICONS ---
    const IconChevronLeft = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="15 18 9 12 15 6"/></svg>;
    const IconChevronRight = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="9 18 15 12 9 6"/></svg>;
    const IconPlay = ({ className }) => <svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="5 3 19 12 5 21 5 3"/></svg>;
    const IconPause = ({ className }) => <svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>;
    const IconMusic = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>;

    const photos = [
      "https://raw.githubusercontent.com/ProtechDynamicSolutions/ProtechDynamicSolutions.github.io/refs/heads/main/Granmum/IMG-20230430-WA0033.jpg", // 0: Cover
      "https://raw.githubusercontent.com/ProtechDynamicSolutions/ProtechDynamicSolutions.github.io/refs/heads/main/Granmum/IMG-20201019-WA0000.jpg", // 1: Memory 1
      "https://raw.githubusercontent.com/ProtechDynamicSolutions/ProtechDynamicSolutions.github.io/refs/heads/main/Granmum/IMG-20260421-WA0026.jpg", // 2: Memory 2
      "https://raw.githubusercontent.com/ProtechDynamicSolutions/ProtechDynamicSolutions.github.io/refs/heads/main/Granmum/IMG-20210330-WA0020-01.jpg", // 3: Portrait
      "https://raw.githubusercontent.com/ProtechDynamicSolutions/ProtechDynamicSolutions.github.io/refs/heads/main/Granmum/IMG-20201226-WA0046.jpg", // 4: Small Accent
      "https://raw.githubusercontent.com/ProtechDynamicSolutions/ProtechDynamicSolutions.github.io/refs/heads/main/Granmum/IMG-20230603-WA0005.jpg", // 5: Portrait 2
      "https://raw.githubusercontent.com/ProtechDynamicSolutions/ProtechDynamicSolutions.github.io/refs/heads/main/Granmum/IMG-20260421-WA0039.jpg", // 6: Meet again 1
      "https://raw.githubusercontent.com/ProtechDynamicSolutions/ProtechDynamicSolutions.github.io/refs/heads/main/Granmum/IMG-20260421-WA0038.jpg", // 7: Meet again 2
      "https://raw.githubusercontent.com/ProtechDynamicSolutions/ProtechDynamicSolutions.github.io/refs/heads/main/Granmum/IMG-20260421-WA0035.jpg", // 8: Legacy Top Wide
      "https://raw.githubusercontent.com/ProtechDynamicSolutions/ProtechDynamicSolutions.github.io/refs/heads/main/Granmum/IMG-20260421-WA0014.jpg", // 9: Legacy Bottom Left
      "https://raw.githubusercontent.com/ProtechDynamicSolutions/ProtechDynamicSolutions.github.io/main/Granmum/IMG-20210830-WA0017.jpg",  // 10: Legacy Bottom Right
      "https://raw.githubusercontent.com/ProtechDynamicSolutions/ProtechDynamicSolutions.github.io/refs/heads/main/Granmum/0.jpg", // 11: Second Reading Circle
      "https://raw.githubusercontent.com/ProtechDynamicSolutions/ProtechDynamicSolutions.github.io/refs/heads/main/Granmum/IMG-20220403-WA0053.jpg", // 12: Meet again 3 (Middle)
      "https://raw.githubusercontent.com/ProtechDynamicSolutions/ProtechDynamicSolutions.github.io/refs/heads/main/Granmum/IMG-20180102-WA0013.jpg"  // 13: Legacy 4th Photo
    ];

    const audioUrl = "https://github.com/ProtechDynamicSolutions/ProtechDynamicSolutions.github.io/raw/refs/heads/main/Granmum/NK.mp3";

    function App() {
      // --- ELEGANT AUDIO PLAYER COMPONENT ---
      const ElegantAudioPlayer = ({ src }) => {
        const audioRef = useRef(null);
        const [isPlaying, setIsPlaying] = useState(false);
        const [error, setError] = useState(false);

        const togglePlay = () => {
          if (!src) return;
          if (isPlaying) {
            audioRef.current.pause();
          } else {
            const playPromise = audioRef.current.play();
            if (playPromise !== undefined) {
              playPromise.catch(err => {
                console.error("Audio playback failed:", err);
                setError(true);
              });
            }
          }
          setIsPlaying(!isPlaying);
        };

        return (
          <div className="flex flex-col items-center justify-center mt-4 sm:mt-8 mb-4">
            <div className="w-full max-w-[200px] sm:max-w-[250px] bg-[#f2efe9] rounded-full p-2 flex items-center gap-3 border border-[#d5cebc] shadow-inner">
              <button 
                onClick={togglePlay}
                disabled={!src}
                className={`w-8 h-8 sm:w-10 sm:h-10 rounded-full flex items-center justify-center shrink-0 transition-all ${
                  src ? 'bg-[#4a4036] hover:bg-[#2c2620] text-[#fdfcfb] shadow-md' : 'bg-[#d5cebc] text-[#a8a090] cursor-not-allowed'
                } ${!isPlaying && src ? 'animate-play-hint' : ''}`}
              >
                {isPlaying ? <IconPause className="w-4 h-4 sm:w-5 sm:h-5" /> : <IconPlay className="w-4 h-4 sm:w-5 sm:h-5" />}
              </button>
              <div className="flex-1 overflow-hidden">
                <p className="text-[9px] sm:text-[11px] font-sans font-semibold tracking-wider text-[#4a4036] uppercase truncate">Nobody Knows</p>
                <p className="text-[8px] sm:text-[9px] font-sans text-[#7a6f62] truncate">The Lumineers</p>
              </div>
              <IconMusic className="w-4 h-4 text-[#a8a090] mr-2 shrink-0" />
            </div>
            {error && (
              <p className="text-[8px] text-red-500 mt-2 italic">Error playing audio. Ensure the link is a valid direct MP3 URL.</p>
            )}
            <audio 
              ref={audioRef} 
              src={src} 
              onEnded={() => setIsPlaying(false)}
              className="hidden"
            />
          </div>
        );
      };

      // --- PREMIUM BOOKLET PAGE COMPONENT ---
      const BookletPage = ({ children, pageNum }) => (
        <div className="relative w-full h-full bg-gradient-to-br from-[#FDFBF7] to-[#F4F1EA] shadow-[0_10px_40px_rgba(0,0,0,0.15)] overflow-hidden flex flex-col font-serif text-[#2c3e50] rounded-r-lg rounded-l-[2px] border-l-[12px] border-[#3E3832] border-r border-y border-[#E8E2D2]">
          {/* Subtle paper texture overlay */}
          <div className="absolute inset-0 opacity-[0.03] mix-blend-multiply pointer-events-none" style={{ backgroundImage: 'url("https://www.transparenttextures.com/patterns/cream-paper.png")' }}></div>
          
          <div className="relative z-10 flex-1 p-6 pb-10 sm:p-10 sm:pb-14 flex flex-col min-h-0 page-content-fade-in">
            {children}
          </div>
          
          {/* Elegant Page Number */}
          <div className="absolute bottom-3 sm:bottom-5 left-0 w-full text-center text-[9px] sm:text-[11px] text-[#A8A090] font-sans tracking-widest z-10">
            — {pageNum} —
          </div>
        </div>
      );

      // --- BOOKLET MODE COMPONENT (Digital Flipbook) ---
      const BookletMode = () => {
        const [currentPage, setCurrentPage] = useState(1);
        const [direction, setDirection] = useState('next');
        const totalPages = 8;

        // Swipe handlers
        const [touchStart, setTouchStart] = useState(null);
        const [touchEnd, setTouchEnd] = useState(null);
        const minSwipeDistance = 50;

        const onTouchStart = (e) => {
          setTouchEnd(null);
          setTouchStart(e.targetTouches[0].clientX);
        };

        const onTouchMove = (e) => {
          setTouchEnd(e.targetTouches[0].clientX);
        };

        const onTouchEndHandler = () => {
          if (!touchStart || !touchEnd) return;
          const distance = touchStart - touchEnd;
          if (distance > minSwipeDistance) nextPage();
          if (distance < -minSwipeDistance) prevPage();
        };

        const nextPage = () => {
          if (currentPage < totalPages) {
            setDirection('next');
            setCurrentPage(p => p + 1);
          }
        };

        const prevPage = () => {
          if (currentPage > 1) {
            setDirection('prev');
            setCurrentPage(p => p - 1);
          }
        };

        const pages = [
          /* PAGE 1: COVER */
          <BookletPage key={1} pageNum={1}>
            <div className="text-center mt-4 sm:mt-8 flex-1 flex flex-col items-center min-h-0 relative">
              <div className="absolute inset-0 border border-[#D5CEBC] m-2 pointer-events-none"></div>
              <div className="absolute inset-0 border border-[#E8E2D2] m-3 pointer-events-none"></div>
              
              <div className="relative z-10 flex flex-col items-center w-full h-full p-4 sm:p-6">
                <p className="text-[10px] sm:text-xs tracking-[0.25em] text-[#8C7B65] uppercase mb-4 sm:mb-6 font-sans">In Loving Memory Of</p>
                <h1 className="text-4xl sm:text-5xl md:text-6xl font-light mb-2 sm:mb-3 text-[#3E3832]" style={{ fontFamily: '"Playfair Display", "Georgia", serif' }}>Catherine Paul</h1>
                <p className="text-[11px] sm:text-sm italic text-[#7A6F62] mb-6 sm:mb-10 font-serif">14th April 1932 – 20th April 2026</p>
                
                <div className="w-full flex-1 min-h-0 flex items-center justify-center rounded-sm overflow-hidden shadow-lg shrink border-4 border-white bg-white">
                  <div className="w-full h-full overflow-hidden">
                    <img 
                      src={photos[0]} 
                      alt="Cover" 
                      className="w-full h-full object-cover animate-ken-burns"
                      onError={(e) => e.target.src = defaultPhotos[0]}
                    />
                  </div>
                </div>
              </div>
            </div>
          </BookletPage>,

          /* PAGE 2: FOND MEMORIES */
          <BookletPage key={2} pageNum={2}>
            <h2 className="text-xl sm:text-3xl text-center mb-4 sm:mb-8 text-[#3E3832] font-light border-b border-[#D5CEBC] pb-3 sm:pb-4 shrink-0 uppercase tracking-widest text-sm">Fond Memories</h2>
            <div className="flex flex-col gap-4 sm:gap-6 flex-1 min-h-0 px-2 sm:px-4">
              <div className="flex-1 min-h-0 rounded-sm shadow-md overflow-hidden bg-white border-4 border-white">
                 <div className="w-full h-full overflow-hidden">
                  <img src={photos[1]} alt="Memory 1" className="w-full h-full object-cover animate-ken-burns" onError={(e) => e.target.src = defaultPhotos[1]}/>
                 </div>
              </div>
              <div className="flex-1 min-h-0 rounded-sm shadow-md overflow-hidden bg-white border-4 border-white">
                 <div className="w-full h-full overflow-hidden">
                  <img src={photos[2]} alt="Memory 2" className="w-full h-full object-cover animate-ken-burns" style={{animationDelay: '-5s'}} onError={(e) => e.target.src = defaultPhotos[2]}/>
                 </div>
              </div>
            </div>
          </BookletPage>,

          /* PAGE 3: A LIFE LIVED FONDLY */
          <BookletPage key={3} pageNum={3}>
            <h2 className="text-xl sm:text-3xl text-center mb-4 sm:mb-8 text-[#3E3832] font-light border-b border-[#D5CEBC] pb-3 sm:pb-4 shrink-0 uppercase tracking-widest text-sm">A Life Lived Fondly</h2>
            <div className="flex-1 min-h-0 p-2 sm:p-4">
              <div className="w-full h-full rounded-sm shadow-lg overflow-hidden bg-white border-8 border-white flex items-center justify-center relative">
                 <div className="absolute inset-0 border border-[#E8E2D2] z-10 pointer-events-none"></div>
                 <div className="w-full h-full overflow-hidden">
                  <img src={photos[3]} alt="Life Portrait" className="w-full h-full object-cover animate-ken-burns" style={{animationDelay: '-10s'}} onError={(e) => e.target.src = defaultPhotos[3]}/>
                 </div>
              </div>
            </div>
          </BookletPage>,

          /* PAGE 4: LITURGY OF THE WORD */
          <BookletPage key={4} pageNum={4}>
            <h2 className="text-base sm:text-xl md:text-2xl text-center mb-3 sm:mb-4 text-[#3E3832] font-light border-b border-[#D5CEBC] pb-2 shrink-0 uppercase tracking-widest">Liturgy of the Word</h2>
            
            <div className="w-28 h-28 sm:w-40 sm:h-40 mx-auto mb-3 sm:mb-4 rounded-full shadow-sm overflow-hidden bg-white border-[4px] border-white shrink-0">
               <div className="w-full h-full overflow-hidden rounded-full">
                <img src={photos[4]} alt="Quiet Moment" className="w-full h-full object-cover animate-ken-burns" style={{animationDelay: '-7s'}} />
               </div>
            </div>
            
            <div className="flex-1 overflow-y-auto no-scrollbar flex flex-col min-h-0 px-2 sm:px-4 space-y-3 sm:space-y-4">
              {/* First Reading */}
              <div>
                <h3 className="font-semibold text-[11px] sm:text-[13px] text-[#4A4036] mb-1 uppercase tracking-wide text-center">First Reading</h3>
                <p className="text-[9px] sm:text-[11px] text-[#7A6F62] italic text-center mb-1.5">A Reading from the first letter of St. Paul to the Corinthians</p>
                <div className="text-[10.5px] sm:text-[12px] md:text-[13px] text-[#5A4F42] leading-relaxed space-y-2 text-justify font-serif">
                  <p>Be ambitious for the higher gifts. And I am going to show you a way that is better than any of them. If I have all the eloquences of men or of angels, but speak without love, I am simply a gong booming or a cymbal clashing. If I have the gift of prophecy, understanding all the mysteries there are, and knowing everything, and if I have faith in all its fullness, to move mountains, but without love, then I am nothing at all. If I give away all that I possess, piece by piece, and I even let them take my body to burn it, but am without love, it will do me no good whatever.</p>
                  <p>Love is always patient and kind; it is never jealous; love is never boastful or conceited; it is never rude or selfish; it does not take offence, and it is not resentful. Love takes no pleasure in other people’s sins but delights in the truth; it is always ready to excuse, to trust, to hope and to endure whatever comes. Love does not come to an end.</p>
                </div>
              </div>
              
              <div className="w-12 h-px bg-[#D5CEBC] mx-auto opacity-50 shrink-0 my-2"></div>
              
              {/* Psalm */}
              <div className="text-center">
                <h3 className="font-semibold text-[11px] sm:text-[13px] text-[#4A4036] mb-0.5 uppercase tracking-wide">Responsorial Psalm</h3>
                <p className="text-[10.5px] sm:text-[12px] md:text-[13px] text-[#5A4F42] italic font-serif">On Eagle’s Wings</p>
              </div>
              
              <div className="w-12 h-px bg-[#D5CEBC] mx-auto opacity-50 shrink-0 my-2"></div>

              {/* Second Reading */}
              <div>
                <h3 className="font-semibold text-[11px] sm:text-[13px] text-[#4A4036] mb-1 uppercase tracking-wide text-center">Second Reading</h3>
                <p className="text-[9px] sm:text-[11px] text-[#7A6F62] italic text-center mb-1.5">A reading from St. Paul to the Philippians</p>
                <div className="text-[10.5px] sm:text-[12px] md:text-[13px] text-[#5A4F42] leading-relaxed space-y-2 text-justify font-serif">
                  <p>There is no need to worry; but if there is anything you need, pray for it, asking God for it with heartfelt prayer and thanksgiving, and the peace of God which is so much greater than we can understand, will guard your hearts and your thoughts in Christ Jesus. Finally, sisters and brothers, fill your minds and hearts with everything that is noble, everything that is good and pure, everything that we love and honour, and everything that can be virtuous and worthy of praise.</p>
                  <p>Keep doing in your life all the things that you learnt from me and have been taught by me and have heard or seen that I do. Then God of peace and love will be forever with you.</p>
                </div>
              </div>
              
              {/* Circle Photo under Second Reading */}
              <div className="w-28 h-28 sm:w-40 sm:h-40 mx-auto mt-4 sm:mt-6 mb-2 rounded-full shadow-sm overflow-hidden bg-white border-[4px] border-white shrink-0">
                 <div className="w-full h-full overflow-hidden rounded-full">
                  <img src={photos[11]} alt="Second Reading Supplement" className="w-full h-full object-cover animate-ken-burns" style={{animationDelay: '-2s'}} />
                 </div>
              </div>
            </div>
          </BookletPage>,

          /* PAGE 5: GOSPEL & REFLECTION */
          <BookletPage key={5} pageNum={5}>
            <h2 className="text-base sm:text-xl md:text-2xl text-center mb-2 sm:mb-3 text-[#3E3832] font-light border-b border-[#D5CEBC] pb-1 sm:pb-2 shrink-0 uppercase tracking-widest">Gospel & Reflection</h2>
            
            {/* 2-Column Text Layout to save vertical space */}
            <div className="grid grid-cols-2 gap-3 sm:gap-4 shrink-0 px-1 sm:px-2 mb-2 sm:mb-3">
              
              {/* Left Column: Gospel */}
              <div className="flex flex-col space-y-2">
                <div className="text-center">
                  <h3 className="font-semibold text-[10px] sm:text-[11px] text-[#4A4036] mb-0.5 uppercase tracking-wide">Gospel Acclamation</h3>
                  <p className="text-[9px] sm:text-[10.5px] text-[#5A4F42] leading-tight italic font-serif">
                    Alleluia, Alleluia<br/>
                    It is my Father’s will, says the Lord<br/>
                    That whoever believes in the Son<br/>
                    Shall have eternal life,<br/>
                    And that I shall raise him up on the last day.<br/>
                    Alleluia!
                  </p>
                </div>

                <div className="w-8 h-px bg-[#D5CEBC] mx-auto opacity-50 shrink-0"></div>

                <div>
                  <h3 className="font-semibold text-[10px] sm:text-[11px] text-[#4A4036] mb-0.5 uppercase tracking-wide text-center">Gospel</h3>
                  <p className="text-[8px] sm:text-[9px] text-[#7A6F62] italic text-center mb-1">A reading from the Holy Gospel according to John</p>
                  <div className="text-[9px] sm:text-[10.5px] text-[#5A4F42] leading-snug space-y-1.5 text-justify font-serif">
                    <p>Jesus said to his disciples, “Do not let your hearts be troubled. Trust in God still, and trust in me. There are many rooms in my Father’s house; If there were not, I should have told you. I am going now to prepare a place for you. And after I have gone and prepared you a place, I shall return to take you with me; So that where I am, you may be too. You know the way to the place where I am going.”</p>
                    <p>Thomas said, “Lord, we do not know where you are going, so how can we know the way?”</p>
                    <p>Jesus said: “I am the Way, the Truth and the Life. No one can come to the Father except through me.”</p>
                  </div>
                </div>
              </div>

              {/* Right Column: Reflection */}
              <div className="flex flex-col space-y-2">
                <div className="text-center">
                  <h3 className="font-semibold text-[10px] sm:text-[11px] text-[#4A4036] uppercase tracking-wide">Prayers of the Faithful</h3>
                </div>

                <div className="w-8 h-px bg-[#D5CEBC] mx-auto opacity-50 shrink-0"></div>

                <div className="text-center">
                  <h3 className="font-semibold text-[10px] sm:text-[11px] text-[#4A4036] mb-0.5 uppercase tracking-wide">Communion Reflection</h3>
                  <p className="text-[8px] sm:text-[9px] text-[#7A6F62] italic mb-1">Her Journey’s Just Begun</p>
                  <div className="text-[9px] sm:text-[10.5px] text-[#5A4F42] leading-tight italic font-serif space-y-1.5">
                    <p>Don’t think of her as gone away, her journey’s just begun<br/>Life holds so many facets, this earth is only one.</p>
                    <p>Just think of her as resting from the sorrows and tears<br/>In a place of warmth and comfort where there are no days or years.</p>
                    <p>Think how she must be wishing that we could know today<br/>How nothing but our sadness can really pass away.</p>
                    <p>And think of her as living in the hearts of those she touched<br/>For nothing loved is ever lost and she was loved so much.</p>
                  </div>
                </div>
              </div>

            </div>

            {/* Photo now dynamically fills remaining space and doesn't get cut off. Reverted to object-cover and object-top to remove white side-bars while keeping face in view. */}
            <div className="flex-1 min-h-0 rounded-sm shadow-md overflow-hidden bg-white border-[3px] border-white mb-2 shrink-0 mx-2 sm:mx-6">
               <div className="w-full h-full overflow-hidden flex items-center justify-center">
                <img src={photos[5]} alt="Reflection Supplement" className="w-full h-full object-cover object-top animate-ken-burns" style={{animationDelay: '-2s'}} />
               </div>
            </div>
          </BookletPage>,

          /* PAGE 6: UNTIL WE MEET AGAIN (Photos) */
          <BookletPage key={6} pageNum={6}>
            <h2 className="text-xl sm:text-3xl text-center mb-4 sm:mb-6 text-[#3E3832] font-light border-b border-[#D5CEBC] pb-2 sm:pb-3 shrink-0 uppercase tracking-widest text-sm">Until We Meet Again</h2>
            <div className="flex flex-col gap-3 sm:gap-4 flex-1 min-h-0 px-2 sm:px-4">
              {/* Photo 1: flex-1 (0% taller), object-contain, and NO animation so faces are never lost */}
              <div className="flex-1 min-h-0 rounded-sm shadow-md overflow-hidden bg-white border-2 border-white">
                 <div className="w-full h-full overflow-hidden flex items-center justify-center bg-[#FDFBF7]">
                  <img src={photos[12]} alt="Until we meet 3" className="w-full h-full object-cover object-center animate-ken-burns" style={{animationDelay: '-4s'}} />
                 </div>
              </div>
              {/* Photo 2: flex-[0.95] (takes 5% off the height) */}
              <div className="flex-[0.95] min-h-0 rounded-sm shadow-md overflow-hidden bg-white border-2 border-white">
                 <div className="w-full h-full overflow-hidden flex items-center justify-center bg-[#FDFBF7]">
                  <img src={photos[6]} alt="Until we meet 1" className="w-full h-full object-contain object-center" />
                 </div>
              </div>
              {/* Photo 3: flex-[0.95] (takes 5% off the height) */}
              <div className="flex-[0.95] min-h-0 rounded-sm shadow-md overflow-hidden bg-white border-2 border-white">
                 <div className="w-full h-full overflow-hidden flex items-center justify-center bg-[#FDFBF7]">
                  <img src={photos[7]} alt="Until we meet 2" className="w-full h-full object-cover object-center animate-ken-burns" style={{animationDelay: '-8s'}} />
                 </div>
              </div>
            </div>
          </BookletPage>,

          /* PAGE 7: GRANMUM'S LEGACY (Was Page 8) */
          <BookletPage key={7} pageNum={7}>
            <div className="flex flex-col h-full min-h-0 relative">
              <div className="shrink-0 pt-2">
                <h2 className="text-lg sm:text-2xl text-center mb-1 sm:mb-2 text-[#3E3832] font-light border-b border-[#D5CEBC] pb-2 sm:pb-3 uppercase tracking-widest text-sm">Granmum's Legacy</h2>
                <p className="text-center text-[9px] sm:text-[11px] md:text-[13px] text-[#5A4F42] mb-2 sm:mb-4 px-2 sm:px-6 leading-relaxed font-serif">
                  A life beautifully lived, leaving behind a loving family, wonderful grandchildren, and great-grandchildren who will forever cherish their beloved Granmum.
                </p>
              </div>

              {/* 4 Photos Collage Grid */}
              <div className="flex-1 min-h-0 grid grid-cols-2 grid-rows-2 gap-2 sm:gap-3 my-1 sm:my-2 mx-1 sm:mx-4">
                <div className="min-h-0 rounded-sm shadow-md overflow-hidden bg-white border-[3px] sm:border-[4px] border-white">
                  <img src={photos[8]} alt="Legacy 1" className="w-full h-full object-cover object-center animate-ken-burns" style={{animationDelay: '-3s'}} />
                </div>
                <div className="min-h-0 rounded-sm shadow-md overflow-hidden bg-white border-[3px] sm:border-[4px] border-white">
                  <img src={photos[9]} alt="Legacy 2" className="w-full h-full object-cover object-center animate-ken-burns" style={{animationDelay: '-11s'}} />
                </div>
                <div className="min-h-0 rounded-sm shadow-md overflow-hidden bg-white border-[3px] sm:border-[4px] border-white">
                  <img src={photos[13]} alt="Legacy 3" className="w-full h-full object-cover object-center animate-ken-burns" style={{animationDelay: '-1s'}} />
                </div>
                <div className="min-h-0 rounded-sm shadow-md overflow-hidden bg-white border-[3px] sm:border-[4px] border-white">
                  <img src={photos[10]} alt="Legacy 4" className="w-full h-full object-cover object-center animate-ken-burns" style={{animationDelay: '-6s'}} />
                </div>
              </div>

              <div className="w-full sm:w-5/6 mx-auto shrink-0 pt-3 sm:pt-4 mt-auto mb-2">
                <p className="text-[9px] sm:text-[11px] italic text-[#7A6F62] leading-relaxed text-center font-serif">
                  Catherine’s family wishes to express their deep appreciation for your love, support, and shared memories during this time.
                </p>
                <div className="w-8 h-px bg-[#D5CEBC] mx-auto mt-3"></div>
              </div>
            </div>
          </BookletPage>,

          /* PAGE 8: A SONG OF FAREWELL (Was Page 7) */
          <BookletPage key={8} pageNum={8}>
             <div className="flex flex-col h-full">
                <h2 className="text-xl sm:text-2xl text-center mb-2 sm:mb-4 text-[#3E3832] font-light shrink-0 uppercase tracking-widest text-sm">A Song of Farewell</h2>
                
                <ElegantAudioPlayer src={audioUrl} />

                <div className="flex-1 overflow-y-auto no-scrollbar flex flex-col justify-center text-[10px] sm:text-[11.5px] md:text-[13px] leading-relaxed sm:leading-loose text-[#5A4F42] px-2 sm:px-6 space-y-3 sm:space-y-4 text-center items-center font-serif italic">
                  <p>
                    Nobody knows how to say goodbye<br/>
                    It seems so easy 'til you try<br/>
                    Then the moments pass you by<br/>
                    Nobody knows how to say goodbye
                  </p>
                  <p>
                    Nobody knows how to get back home<br/>
                    And we set out so long ago<br/>
                    Searched the heavens and the earth below<br/>
                    Nobody knows how to get back home
                  </p>
                  <p>
                    Through the darkness to the dawn<br/>
                    When I looked back you were gone<br/>
                    Heard your voice leading me on<br/>
                    Through the darkness to the dawn
                  </p>
                  <p>
                    Love is deep as the road is long<br/>
                    It moves my feet to carry on<br/>
                    Beats my heart when you are gone<br/>
                    Love is deep as the road is long
                  </p>
                </div>
             </div>
          </BookletPage>
        ];

        return (
          <div className="bg-[#1C1A18] py-8 px-4 min-h-[calc(100vh-60px)] flex flex-col items-center justify-center perspective-container overflow-hidden">
            
            {/* The Current Page */}
            <div 
              key={currentPage} 
              onTouchStart={onTouchStart}
              onTouchMove={onTouchMove}
              onTouchEnd={onTouchEndHandler}
              className={`w-full max-w-[210mm] aspect-[210/297] ${direction === 'next' ? 'page-anim-next' : 'page-anim-prev'}`}
            >
              {pages[currentPage - 1]}
            </div>

            {/* Elegant Page Navigation Controls */}
            <div className="mt-8 flex items-center justify-between gap-6 bg-[#2A2622]/80 backdrop-blur-md px-6 py-3 rounded-full border border-[#3E3832] shadow-xl text-[#FDFBF7] w-full max-w-[210mm]">
              <button 
                onClick={prevPage} 
                disabled={currentPage === 1}
                className={`flex items-center gap-1 p-2 rounded-full transition-all duration-300 ${currentPage === 1 ? 'opacity-30 cursor-not-allowed' : 'hover:bg-[#3E3832] active:scale-95'}`}
                aria-label="Previous Page"
              >
                <IconChevronLeft className="w-5 h-5" />
                <span className="hidden sm:inline text-xs font-medium tracking-widest uppercase pr-2">Prev</span>
              </button>
              
              <span className="text-xs font-serif italic tracking-widest text-[#D5CEBC]">
                Page {currentPage} of {totalPages}
              </span>
              
              <button 
                onClick={nextPage} 
                disabled={currentPage === totalPages}
                className={`flex items-center gap-1 p-2 rounded-full transition-all duration-300 ${currentPage === totalPages ? 'opacity-30 cursor-not-allowed' : 'hover:bg-[#3E3832] active:scale-95'}`}
                aria-label="Next Page"
              >
                <span className="hidden sm:inline text-xs font-medium tracking-widest uppercase pl-2">Next</span>
                <IconChevronRight className="w-5 h-5" />
              </button>
            </div>

            <p className="mt-4 text-[10px] text-[#A8A090] font-sans tracking-widest uppercase sm:hidden opacity-70">Swipe to turn pages</p>
          </div>
        );
      };

      // --- MAIN APP RENDER ---
      return (
        <div className="min-h-screen bg-[#1C1A18] font-sans flex items-center justify-center">
          {/* Main Content Area */}
          <main className="w-full">
            <BookletMode />
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
