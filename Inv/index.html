        const { useState, useEffect, useMemo, useRef, useCallback } = React;

        /* ===================================================================
         * SECURE VAULT  -  AES-GCM + PBKDF2 (Web Crypto)
         * =================================================================== */
        const Vault = {
            enc: new TextEncoder(),
            dec: new TextDecoder(),
            KEY: 'protech_vault',
            b64(buf) { return btoa(String.fromCharCode.apply(null, new Uint8Array(buf))); },
            ub64(str) { return Uint8Array.from(atob(str), function (c) { return c.charCodeAt(0); }); },
            async deriveKey(password, salt) {
                const base = await crypto.subtle.importKey('raw', this.enc.encode(password), 'PBKDF2', false, ['deriveKey']);
                return crypto.subtle.deriveKey(
                    { name: 'PBKDF2', salt: salt, iterations: 310000, hash: 'SHA-256' },
                    base, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']
                );
            },
            async save(password, payload) {
                const salt = crypto.getRandomValues(new Uint8Array(16));
                const iv = crypto.getRandomValues(new Uint8Array(12));
                const key = await this.deriveKey(password, salt);
                const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv: iv }, key, this.enc.encode(JSON.stringify(payload)));
                const blob = { v: 1, salt: this.b64(salt), iv: this.b64(iv), ct: this.b64(ct) };
                localStorage.setItem(this.KEY, JSON.stringify(blob));
            },
            async open(password) {
                const raw = localStorage.getItem(this.KEY);
                if (!raw) throw new Error('No vault');
                const blob = JSON.parse(raw);
                const key = await this.deriveKey(password, this.ub64(blob.salt));
                const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: this.ub64(blob.iv) }, key, this.ub64(blob.ct));
                return JSON.parse(this.dec.decode(pt));
            },
            exists() { return !!localStorage.getItem(this.KEY); },
            wipe() { localStorage.removeItem(this.KEY); }
        };

        /* ===================================================================
         * FINGERPRINT QUICK UNLOCK  (WebAuthn platform authenticator)
         * =================================================================== */
        const Bio = {
            b(buf) { return btoa(String.fromCharCode.apply(null, new Uint8Array(buf))); },
            ub(str) { return Uint8Array.from(atob(str), function (c) { return c.charCodeAt(0); }); },
            enabled() { return !!localStorage.getItem('protech_bio'); },
            async available() { try { return !!(window.PublicKeyCredential && await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable()); } catch (e) { return false; } },
            async enable(password) {
                const cred = await navigator.credentials.create({ publicKey: {
                    challenge: crypto.getRandomValues(new Uint8Array(32)),
                    rp: { name: 'Protech Dynamic Solutions', id: location.hostname },
                    user: { id: crypto.getRandomValues(new Uint8Array(16)), name: 'protech-app', displayName: 'Protech' },
                    pubKeyCredParams: [{ type: 'public-key', alg: -7 }, { type: 'public-key', alg: -257 }],
                    authenticatorSelection: { authenticatorAttachment: 'platform', userVerification: 'required', residentKey: 'preferred' },
                    timeout: 60000, attestation: 'none'
                }});
                const rawId = new Uint8Array(cred.rawId);
                const k = crypto.getRandomValues(new Uint8Array(32));
                const key = await crypto.subtle.importKey('raw', k, { name: 'AES-GCM' }, false, ['encrypt']);
                const iv = crypto.getRandomValues(new Uint8Array(12));
                const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv: iv }, key, new TextEncoder().encode(password));
                localStorage.setItem('protech_bio', JSON.stringify({ id: this.b(rawId), iv: this.b(iv), ct: this.b(ct) }));
                localStorage.setItem('protech_bio_key', this.b(k));
            },
            async unlock() {
                const meta = JSON.parse(localStorage.getItem('protech_bio') || 'null');
                if (!meta) throw new Error('Fingerprint not set up');
                await navigator.credentials.get({ publicKey: {
                    challenge: crypto.getRandomValues(new Uint8Array(32)),
                    allowCredentials: [{ id: this.ub(meta.id), type: 'public-key' }],
                    userVerification: 'required', timeout: 60000, rpId: location.hostname
                }});
                const k = this.ub(localStorage.getItem('protech_bio_key'));
                const key = await crypto.subtle.importKey('raw', k, { name: 'AES-GCM' }, false, ['decrypt']);
                const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: this.ub(meta.iv) }, key, this.ub(meta.ct));
                return new TextDecoder().decode(pt);
            },
            disable() { localStorage.removeItem('protech_bio'); localStorage.removeItem('protech_bio_key'); }
        };

        /* ===================================================================
         * BACKEND CALL
         * =================================================================== */
        async function callBackend(url, payload) {
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload),
                redirect: 'follow'
            });
            if (!res.ok) throw new Error('Server returned ' + res.status);
            return res.json();
        }

        function blobToBase64(blob) {
            return new Promise(function (resolve, reject) {
                const r = new FileReader();
                r.onloadend = function () { resolve(String(r.result).split(',')[1]); };
                r.onerror = reject;
                r.readAsDataURL(blob);
            });
        }

        /* ===================================================================
         * GEMINI
         * =================================================================== */
        async function callGemini(apiKey, model, systemPrompt, userPrompt, jsonMode) {
            if (jsonMode === undefined) jsonMode = true;
            const url = 'https://generativelanguage.googleapis.com/v1beta/models/' + encodeURIComponent(model) + ':generateContent?key=' + encodeURIComponent(apiKey);
            const body = {
                systemInstruction: { parts: [{ text: systemPrompt }] },
                contents: [{ role: 'user', parts: [{ text: userPrompt }] }],
                generationConfig: { temperature: 0.7, responseMimeType: jsonMode ? 'application/json' : 'text/plain' }
            };
            const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
            if (!res.ok) { let t = ''; try { t = await res.text(); } catch (e) {} throw new Error('Gemini ' + res.status + (t ? ': ' + t.slice(0, 160) : '')); }
            const data = await res.json();
            const parts = data && data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts;
            let text = parts ? parts.map(function (p) { return p.text || ''; }).join('') : '';
            text = text.replace(/^```json\s*/i, '').replace(/^```\s*/i, '').replace(/```\s*$/i, '').trim();
            return text;
        }

        async function callGeminiImage(apiKey, model, prompt, imageBase64, mimeType) {
            const url = '[https://generativelanguage.googleapis.com/v1beta/models/](https://generativelanguage.googleapis.com/v1beta/models/)' + encodeURIComponent(model) + ':generateContent?key=' + encodeURIComponent(apiKey);
            const body = { contents: [{ role: 'user', parts: [{ inlineData: { mimeType: mimeType, data: imageBase64 } }, { text: prompt }] }], generationConfig: { temperature: 0.1, responseMimeType: 'application/json' } };
            const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
            if (!res.ok) { let t = ''; try { t = await res.text(); } catch (e) {} throw new Error('Gemini ' + res.status + (t ? ': ' + t.slice(0, 160) : '')); }
            const data = await res.json();
            const parts = data && data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts;
            let text = parts ? parts.map(function (p) { return p.text || ''; }).join('') : '';
            return text.replace(/^```json\s*/i, '').replace(/^```\s*/i, '').replace(/```\s*$/i, '').trim();
        }

        function downscaleImage(base64, mimeType) {
            return new Promise(function (resolve) {
                if (!/^image\//.test(mimeType || '')) { resolve({ data: base64, mimeType: mimeType }); return; }
                const img = new Image();
                img.onload = function () {
                    const max = 1600, scale = Math.min(1, max / Math.max(img.width, img.height));
                    const cw = Math.round(img.width * scale), ch = Math.round(img.height * scale);
                    const c = document.createElement('canvas'); c.width = cw; c.height = ch;
                    c.getContext('2d').drawImage(img, 0, 0, cw, ch);
                    try { resolve({ data: c.toDataURL('image/jpeg', 0.85).split(',')[1], mimeType: 'image/jpeg' }); }
                    catch (e) { resolve({ data: base64, mimeType: mimeType }); }
                };
                img.onerror = function () { resolve({ data: base64, mimeType: mimeType }); };
                img.src = 'data:' + (mimeType || 'image/jpeg') + ';base64,' + base64;
            });
        }

        /* ===================================================================
         * GATE SCREENS: Setup (first run) and Lock (every open after)

        function SetupScreen({ onReady }) {
            const [url, setUrl] = useState('');
            const [pw, setPw] = useState('');
            const [pw2, setPw2] = useState('');
            const [busy, setBusy] = useState(false);
            const [err, setErr] = useState('');
            const [show, setShow] = useState(false);

            const submit = async () => {
                setErr('');
                const cleanUrl = url.trim();
                if (!/^https:\/\/script\.google\.com\/.+\/exec$/.test(cleanUrl)) {
                    setErr('That does not look like an Apps Script web app URL. It should start with https://script.google.com and end with /exec'); return;
                }
                if (pw.length < 4) { setErr('Please choose a password of at least 4 characters.'); return; }
                if (pw !== pw2) { setErr('The two passwords do not match.'); return; }
                setBusy(true);
                try {
                    const res = await callBackend(cleanUrl, { action: 'ping', password: pw });
                    if (!res.ok) { setErr(res.error || 'The backend rejected that password.'); setBusy(false); return; }
                    await Vault.save(pw, { url: cleanUrl, password: pw });
                    onReady({ url: cleanUrl, password: pw });
                } catch (e) {
                    setErr('Could not reach the backend. Check the URL is deployed as a web app with access set to Anyone, then try again.');
                    setBusy(false);
                }
            };

            return (

                            </div>
                            <div>
                                <label className={lbl}>Password</label>
                                <div className="relative">
                                    <input type={show ? 'text' : 'password'} value={pw} onChange={e => setPw(e.target.value)} className={fld + " pr-10"} placeholder="Your private password" />

                            </div>

            const submit = async () => {

                    const creds = await Vault.open(pw);

                } catch (e) {
                    setErr('Incorrect password.'); setBusy(false); setPw('');

            const saveAsTemplate = async () => { const name = (tplName.trim() || job.trim() || 'Template'); const its = items.filter(it => it.desc || it.price).map(it => ({ qty: Number(it.qty) || 1, desc: it.desc, price: Number(it.price) || 0 })); if (!its.length) { flash('Add some line items first.', 'error'); return; } const tpl = { id: Date.now(), name: name, items: its }; const updated = [tpl].concat(templates); setTemplates(updated); localStorage.setItem('protech_templates_cache', JSON.stringify(updated)); setTplName(''); try { await callBackend(creds.url, { action: 'saveTemplate', password: creds.password, template: tpl }); flash('Saved template ' + name, 'ok'); } catch (e) { flash('Saved locally only.', 'error'); } };
            const deleteTemplateNow = async (tpl) => { const updated = templates.filter(x => x.id !== tpl.id); setTemplates(updated); localStorage.setItem('protech_templates_cache', JSON.stringify(updated)); try { await callBackend(creds.url, { action: 'deleteTemplate', password: creds.password, id: tpl.id }); } catch (e) {} };

            // ---- Voice to quote ----
            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
            const toggleListen = () => { if (!SpeechRec) { flash('Voice input is not supported in this browser. You can still type the brief below.', 'error', 5000); return; } if (listening) { try { recogRef.current && recogRef.current.stop(); } catch (e) {} setListening(false); return; } const rec = new SpeechRec(); recogRef.current = rec; rec.lang = 'en-IE'; rec.interimResults = true; rec.continuous = true; let finalText = voiceText ? voiceText + ' ' : ''; rec.onresult = (e) => { let interim = ''; for (let i = e.resultIndex; i < e.results.length; i++) { const tr = e.results[i]; if (tr.isFinal) finalText += tr[0].transcript + ' '; else interim += tr[0].transcript; } setVoiceText((finalText + interim).trim()); }; rec.onerror = () => setListening(false); rec.onend = () => setListening(false); try { rec.start(); setListening(true); } catch (e) { setListening(false); } };
            const buildQuoteFromText = async () => { if (!geminiKey) { flash('Add a Gemini key in Settings to use voice to quote.', 'error'); setActiveTab('settings'); return; } const text = voiceText.trim(); if (!text) { flash('Say or type what the quote is for.', 'error'); return; } setVoiceBusy(true); try { const prompt = 'Turn this spoken instruction from an Irish tradesperson into a structured quote. Return ONLY JSON: { "client": { "name": "", "address": "", "phone": "" }, "job": "", "items": [ { "qty": 1, "desc": "", "price": 0 } ] }. Extract the customer name, any job description, and each line item with its price in euro as a plain number. Interpret spoken numbers, for example two fifty means 250 and twelve hundred means 1200. If something is not given use an empty string or 0. Instruction: ' + text; const raw = await callGemini(geminiKey, geminiModel, 'You convert spoken job notes into structured quote data. Return only valid JSON.', prompt, true); let d; try { d = JSON.parse(raw); } catch (e) { d = null; } if (!d) throw new Error('could not understand that'); setDocumentType('Quote'); setDocNo(getNextDocNo('Quote', savedDocs)); if (d.client) setClient(c => ({ name: d.client.name || c.name, id: c.id, address: d.client.address || c.address, phone: d.client.phone || c.phone })); if (d.job) setJob(d.job); const its = (d.items || []).filter(it => it.desc || it.price).map((it, i) => ({ id: Date.now() + i, qty: Number(it.qty) || 1, desc: it.desc || '', price: (it.price != null && it.price !== '') ? Number(it.price) : '' })); if (its.length) setItems(its); setVoiceOpen(false); setVoiceText(''); setActiveTab('edit'); flash('Quote drafted from your brief. Check it over.', 'ok', 5000); } catch (e) { flash('Voice to quote failed: ' + e.message, 'error', 6000); } finally { setVoiceBusy(false); } };

            // ---- AI emails ----
            const EMAIL_KINDS = { chase: { label: 'Chase payment', tone: 'a polite but clear reminder that this invoice is due or overdue, asking for payment and offering to answer any queries' }, followup: { label: 'Follow up quote', tone: 'a warm, low pressure follow up checking if they had a chance to look at the quote, and offering a quick chat' }, thanks: { label: 'Thank you', tone: 'a short, warm thank you for their business' }, completed: { label: 'Project completed', tone: 'a friendly note that the work is complete, briefly summarising what was done and what happens next' }, review: { label: 'Ask for review', tone: 'a friendly, genuine request for a Google review, with thanks, kept short' }, reminder: { label: 'Appointment reminder', tone: 'a brief, friendly reminder of an upcoming appointment, asking them to confirm it still suits' } };
            const generateEmail = async (kind, doc) => { if (!geminiKey) { setEmailModal(null); flash('Add a Gemini key in Settings to generate emails.', 'error'); setActiveTab('settings'); return; } const spec = EMAIL_KINDS[kind]; const ctx = doc ? ['Document: ' + doc.documentType + ' #' + doc.docNo, 'Client: ' + ((doc.client && doc.client.name) || ''), 'Amount: ' + eur(doc.total), 'Date: ' + doc.date, doc.dueDate ? 'Due date: ' + doc.dueDate : ''].filter(Boolean).join('\n') : ''; const sys = 'You write short, warm, plain Irish business emails for Dave Maher of Protech Dynamic Solutions. First person, friendly, never pushy, no em dashes, euro sign for money. Return ONLY the email body text, no subject line, no markdown.'; const prompt = 'Write ' + spec.tone + '.\n' + (ctx ? ('Context:\n' + ctx + '\n') : '') + 'Keep it brief and genuine.'; try { const raw = await callGemini(geminiKey, geminiModel, sys, prompt, false); setEmailModal(m => m ? { ...m, busy: false, text: raw } : m); } catch (e) { setEmailModal(m => m ? { ...m, busy: false, text: '' } : m); flash('Email generation failed: ' + e.message, 'error', 6000); } };
            const openEmail = (kind, doc) => { setEmailModal({ kind: kind, doc: doc, busy: true, text: '' }); generateEmail(kind, doc); };
            const saveHourlyCost = () => { const n = Number(costDraft) || 0; setHourlyCost(n); localStorage.setItem('protech_hourly_cost', String(n)); flash('Saved', 'ok', 1500); };

            const inputClass = "w-full bg-slate-900 border border-slate-700 rounded-md px-3 py-2.5 text-sm text-slate-200 focus:outline-none focus:border-[#BE875C] focus:ring-1 focus:ring-[#BE875C] transition-all";
            const labelClass = "block text-xs font-semibold text-slate-400 mb-1 uppercase tracking-wider";
            const TABS = [{ key: 'today', label: 'Today', icon: Home }, { key: 'edit', label: 'Create', icon: Edit3 }, { key: 'jobs', label: 'Jobs', icon: Briefcase }, { key: 'receipts', label: 'Receipts', icon: Receipt }, { key: 'history', label: 'History', icon: Archive }, { key: 'analytics', label: 'Insights', icon: Activity }];
            const DESKTOP_TABS = [{ key: 'today', label: 'Today', icon: Home }, { key: 'edit', label: 'Create', icon: Edit3 }, { key: 'jobs', label: 'Jobs', icon: Briefcase }, { key: 'receipts', label: 'Receipts', icon: Receipt }, { key: 'history', label: 'History', icon: Archive }, { key: 'analytics', label: 'Insights', icon: Activity }];

                                        <div className="flex items-center justify-between mb-2"><h3 className="text-sm font-bold text-white flex items-center gap-2"><Clock size={15} className="text-[#BE875C]" /> Due now</h3><span className="text-xs text-slate-500">{dash.dueJobs.length}</span></div>

                                                            <button onClick={() => setExpandedJob(isOpen ? null : j.id)} className="p-1.5 text-slate-400 hover:text-white"><ChevronDown size={18} className={"transition-transform " + (isOpen ? 'rotate-180' : '')} /></button>
                                                        </div>
                                                    </div>
                                                    {(j.dueDate || ttot || prog) ? (
                                                        <div className="mt-3">
                                                            <div className="flex items-center justify-between text-xs mb-1"><span className="text-slate-300 font-medium">{prog}% done{ttot ? ' (' + tdone + '/' + ttot + ')' : ''}</span>{due && <span className="font-medium" style={{ color: due.colour }}>{due.label}</span>}</div>
                                                            <div className="h-2 bg-slate-900 rounded-full overflow-hidden"><div className="h-full rounded-full bg-gradient-to-r from-[#C49066] to-[#BE875C]" style={{ width: prog + '%' }}></div></div>
                                                        </div>
                                                    ) : null}
                                                    <div className="grid grid-cols-4 gap-2 mt-3 text-center">
                                                        <div className="bg-slate-900/60 rounded-lg py-2"><div className="text-sm font-black text-[#F0D0A5]">{fmtDur(st.minutes)}</div><div className="text-[10px] text-slate-500 uppercase tracking-wider">Time</div></div>
                                                        <div className="bg-slate-900/60 rounded-lg py-2"><div className="text-sm font-black text-white">{st.call}</div><div className="text-[10px] text-slate-500 uppercase tracking-wider">Calls</div></div>
                                                        <div className="bg-slate-900/60 rounded-lg py-2"><div className="text-sm font-black text-white">{st.email}</div><div className="text-[10px] text-slate-500 uppercase tracking-wider">Emails</div></div>
                                                        <div className="bg-slate-900/60 rounded-lg py-2"><div className={"text-sm font-black " + (rate == null ? 'text-slate-500' : rate < 25 ? 'text-red-400' : rate < 45 ? 'text-amber-400' : 'text-green-400')}>{rate == null ? 'n/a' : kfmt(rate) + '/h'}</div><div className="text-[10px] text-slate-500 uppercase tracking-wider">Rate</div></div>
                                                    </div>
                                                </div>
                                                {isOpen && (
                                                    <div className="border-t border-slate-700 p-4 space-y-3 bg-slate-900/30">
                                                        <div className="bg-slate-800 border border-slate-700 rounded-lg p-3">
                                                            <div className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Steps to do {ttot ? '· ' + tdone + '/' + ttot : ''}</div>
                                                            {ttot > 0 && (
                                                                <div className="space-y-1 mb-2">{(j.tasks || []).map((t, ti) => (
                                                                    <div key={t.id} className="flex items-center gap-2">
                                                                        <button onClick={() => toggleTask(j, t.id)} className={"w-4 h-4 rounded border flex items-center justify-center shrink-0 " + (t.done ? 'bg-[#BE875C] border-[#BE875C]' : 'border-slate-500 hover:border-[#BE875C]')}>{t.done && <Check size={11} className="text-white" />}</button>
                                                                        <span className={"flex-1 text-xs " + (t.done ? 'text-slate-500 line-through' : 'text-slate-200')}>{t.text}</span>
                                                                        {ti === nextIdx && !t.done && <span className="text-[9px] font-bold uppercase tracking-wider text-[#F0D0A5] bg-[#BE875C]/20 px-1.5 py-0.5 rounded shrink-0">Next</span>}
                                                                        <div className="flex items-center gap-0.5 shrink-0">
                                                                            <button onClick={() => moveTask(j, ti, -1)} className="text-slate-600 hover:text-slate-300 p-0.5"><ChevronDown size={13} className="rotate-180" /></button>
                                                                            <button onClick={() => moveTask(j, ti, 1)} className="text-slate-600 hover:text-slate-300 p-0.5"><ChevronDown size={13} /></button>
                                                                            <button onClick={() => removeTask(j, t.id)} className="text-slate-600 hover:text-red-400 p-0.5"><X size={13} /></button>
                                                                        </div>
                                                                    </div>))}
                                                                </div>
                                                            )}
                                                            <div className="flex gap-2">
                                                                <input value={taskDraft} onChange={e => setTaskDraft(e.target.value)} onKeyDown={e => e.key === 'Enter' && addTask(j)} className={inputClass + " py-2"} placeholder="Add a step, in the order to tackle it" />
                                                                <button onClick={() => addTask(j)} className="bg-slate-700 hover:bg-slate-600 text-white px-3 rounded-lg shrink-0"><Plus size={16} /></button>
                                                            </div>
                                                            {ttot === 0 && (
                                                                <div className="mt-3"><div className="flex items-center justify-between text-[10px] text-slate-500 uppercase tracking-wider mb-1"><span>Or set progress manually</span><span className="text-slate-300 font-bold">{Number(j.percent) || 0}%</span></div><input type="range" min="0" max="100" step="5" value={Number(j.percent) || 0} onChange={e => updateJob(j, { percent: Number(e.target.value) })} className="w-full accent-[#BE875C]" /></div>
                                                            )}
                                                        </div>
                                                        <div className="flex flex-wrap items-center gap-x-4 gap-y-1 text-xs text-slate-400">
                                                            {qv > 0 && <span>Quoted <span className="text-slate-200 font-bold">{eur(qv)}</span>{qRate != null ? ' · ' + eur(qRate) + '/h' : ''}</span>}
                                                            {iv != null && <span>Invoiced <span className="text-slate-200 font-bold">{eur(iv)}</span>{iRate != null ? ' · ' + eur(iRate) + '/h' : ''}</span>}
                                                            <span>Sessions <span className="text-slate-200 font-bold">{st.sessions}</span></span>
                                                        </div>
                                                        {qv > 0 && iv != null && iv !== qv && (<div className="text-xs text-slate-500">Billed vs quoted: <span className={iv >= qv ? 'text-green-400 font-medium' : 'text-red-400 font-medium'}>{(iv >= qv ? '+' : '') + eur(iv - qv)}</span>{iv < qv ? ' (you absorbed extra work)' : ' (you recovered extra work)'}</div>)}
                                                        {(mat > 0 || hourlyCost > 0) && (
                                                            <div className="bg-slate-800 border border-slate-700 rounded-lg p-3 text-xs">
                                                                <div className="text-[10px] uppercase tracking-wider text-slate-500 mb-1.5">Profit estimate</div>
                                                                <div className="flex justify-between mb-0.5"><span className="text-slate-400">Revenue</span><span className="text-slate-200">{eur(prof.rev)}</span></div>
                                                                <div className="flex justify-between mb-0.5"><span className="text-slate-400">Materials</span><span className="text-slate-300">- {eur(prof.mat)}</span></div>
                                                                <div className="flex justify-between mb-0.5"><span className="text-slate-400">Your time ({fmtDur(st.minutes)}{hourlyCost ? ' @ ' + eur(hourlyCost) : ''})</span><span className="text-slate-300">- {eur(prof.labour)}</span></div>
                                                                <div className="flex justify-between font-bold mt-1 pt-1 border-t border-slate-700"><span className="text-white">Profit</span><span style={{ color: prof.profit >= 0 ? '#86efac' : '#f87171' }}>{eur(prof.profit)}</span></div>
                                                            </div>
                                                        )}
                                                        <div className="bg-slate-800 border border-slate-700 rounded-lg p-3">
                                                            <div className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Log activity</div>
                                                            <div className="flex flex-wrap gap-2 mb-2">{[['call', 'Call', PhoneCall], ['email', 'Email', Mail], ['site', 'Site', MapPin], ['admin', 'Admin', FileText]].map(k => { const Ico = k[2]; return (<button key={k[0]} onClick={() => setQuickLog({ ...quickLog, kind: k[0] })} className={"flex items-center gap-1 px-2.5 py-1.5 rounded-lg text-xs font-medium " + (quickLog.kind === k[0] ? 'bg-[#BE875C] text-white' : 'bg-slate-700 text-slate-300 hover:bg-slate-600')}><Ico size={13} /> {k[1]}</button>); })}</div>
                                                            <div className="flex gap-2">
                                                                <div className="relative w-28"><input type="number" value={quickLog.minutes} onChange={e => setQuickLog({ ...quickLog, minutes: e.target.value })} onFocus={selectAll} className={inputClass + " pr-8 py-2"} placeholder="0" /><span className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 text-xs">min</span></div>
                                                                <input value={quickLog.notes} onChange={e => setQuickLog({ ...quickLog, notes: e.target.value })} className={inputClass + " py-2"} placeholder="Note (optional)" />
                                                                <button onClick={() => { logQuick(j.id, quickLog.kind, quickLog.minutes, quickLog.notes); setQuickLog({ kind: quickLog.kind, minutes: '', notes: '' }); }} className="bg-slate-700 hover:bg-slate-600 text-white px-3 rounded-lg text-sm font-bold shrink-0"><Plus size={16} /></button>
                                                            </div>
                                                        </div>
                                                        {acts.length > 0 && (
                                                            <div className="space-y-1.5">{acts.map(a => (
                                                                <div key={a.id} className="flex items-center justify-between text-xs bg-slate-800/60 rounded-lg px-3 py-2">
                                                                    <div className="min-w-0"><span className="text-slate-200 font-medium">{KIND_LABEL[a.kind] || a.kind}</span>{a.notes && <span className="text-slate-500"> · {a.notes}</span>}<div className="text-[10px] text-slate-600">{(a.createdAt || '').slice(0, 10)}</div></div>
                                                                    <div className="flex items-center gap-2 shrink-0"><span className="text-slate-300 font-medium">{a.minutes ? fmtDur(a.minutes) : ''}</span><button onClick={() => deleteActivityNow(a)} className="text-slate-600 hover:text-red-400"><X size={13} /></button></div>
                                                                </div>))}
                                                            </div>
                                                        )}
                                                        <div className="flex items-center justify-between pt-1">
                                                            <button onClick={() => saveJobNow({ ...j, status: j.status === 'done' ? 'active' : 'done' })} className="text-xs text-slate-400 hover:text-green-400 flex items-center gap-1"><Check size={14} /> {j.status === 'done' ? 'Reopen job' : 'Mark as done'}</button>
                                                            <button onClick={() => deleteJobNow(j)} className="text-xs text-slate-500 hover:text-red-400 flex items-center gap-1"><Trash2 size={14} /> Delete</button>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                                <datalist id="customers-list">{uniqueCustomers.map(c => <option key={c.name} value={c.name} />)}</datalist>
                            </div>
                        )}

                        {/* ===== EDIT + PREVIEW SPLIT ===== */}
                        {showSplit && (
                            <div className="flex flex-col lg:flex-row">
                                <div className={"w-full lg:w-[460px] lg:shrink-0 lg:border-r border-slate-700 bg-slate-800 lg:h-[calc(100vh-3.5rem)] overflow-y-auto pb-28 lg:pb-6 " + (activeTab === 'preview' ? 'hidden lg:block' : 'block')}>
                                    <div className="p-5 space-y-7 animate-fade-in">
                                        <div className="grid grid-cols-2 gap-3">
                                            <button onClick={handleSave} className="flex items-center justify-center gap-1.5 bg-gradient-to-r from-[#C49066] to-[#BE875C] text-white px-3 py-3 rounded-lg text-sm font-bold shadow-lg shadow-[#BE875C]/20 hover:opacity-90"><Cloud size={16} /> Save to Cloud</button>
                                            <button onClick={pdfCopy} className="flex items-center justify-center gap-1.5 bg-slate-700 hover:bg-slate-600 text-white px-3 py-3 rounded-lg text-sm font-medium"><Download size={16} /> Save + PDF</button>
                                        </div>

                                        <div className="flex gap-2">
                                            <button onClick={() => setActiveTab('preview')} className="lg:hidden flex-1 flex items-center justify-center gap-1.5 bg-slate-700 hover:bg-slate-600 text-white px-3 py-2 rounded-lg text-xs font-medium"><Eye size={15} /> Preview</button>
                                            <button onClick={() => setShowTemplates(v => !v)} className="flex-1 flex items-center justify-center gap-1.5 bg-slate-700 hover:bg-slate-600 text-white px-3 py-2 rounded-lg text-xs font-medium"><Layers size={15} /> Templates</button>
                                            <button onClick={() => { setVoiceText(''); setVoiceOpen(v => !v); }} className="flex-1 flex items-center justify-center gap-1.5 bg-slate-700 hover:bg-slate-600 text-white px-3 py-2 rounded-lg text-xs font-medium"><Mic size={15} /> Voice</button>
                                        </div>

                                        {showTemplates && (
                                            <div className="bg-slate-900/40 border border-slate-700 rounded-xl p-3 space-y-2 animate-fade-in">
                                                <span className="text-xs font-bold text-slate-300 uppercase tracking-wider">Service templates</span>
                                                {templates.length === 0 ? <p className="text-xs text-slate-500">No templates yet. Build your line items below, then save them here to reuse with one tap.</p> : (
                                                    <div className="space-y-1">{templates.map(t => (
                                                        <div key={t.id} className="flex items-center justify-between bg-slate-800 rounded-lg px-3 py-2">
                                                            <button onClick={() => applyTemplate(t, false)} className="flex-1 text-left text-sm text-slate-200 truncate">{t.name} <span className="text-xs text-slate-500">({(t.items || []).length})</span></button>
                                                            <div className="flex items-center gap-2 shrink-0"><button onClick={() => applyTemplate(t, true)} className="text-[10px] text-slate-400 hover:text-[#BE875C] uppercase tracking-wider">Replace</button><button onClick={() => deleteTemplateNow(t)} className="text-slate-600 hover:text-red-400"><Trash2 size={14} /></button></div>
                                                        </div>
                                                    ))}</div>
                                                )}
                                                <div className="flex gap-2 pt-1"><input value={tplName} onChange={e => setTplName(e.target.value)} className={inputClass + " py-2"} placeholder="Save current items as..." /><button onClick={saveAsTemplate} className="bg-slate-700 hover:bg-slate-600 text-white px-3 rounded-lg shrink-0"><Save size={15} /></button></div>
                                            </div>
                                        )}

                                        {voiceOpen && (
                                            <div id="voice-panel" className="bg-slate-900/40 border border-[#BE875C]/30 rounded-xl p-3 space-y-2 animate-fade-in">
                                                <div className="flex items-center justify-between"><span className="text-xs font-bold text-[#F0D0A5] uppercase tracking-wider flex items-center gap-1.5"><Mic size={14} /> Dictate or generate a quote</span>{SpeechRec && <button onClick={toggleListen} className={"flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-bold " + (listening ? 'bg-red-600 text-white' : 'bg-slate-700 text-slate-200')}>{listening ? <React.Fragment><span className="w-2 h-2 rounded-full bg-white animate-pulse"></span> Listening</React.Fragment> : <React.Fragment><Mic size={12} /> Record</React.Fragment>}</button>}</div>
                                                <p className="text-[11px] text-slate-400">{SpeechRec ? 'Tap Record and say it, or type the brief below. Then Build quote.' : 'Type the brief below, then Build quote.'}</p>
                                                <textarea rows="3" value={voiceText} onChange={e => setVoiceText(e.target.value)} className={inputClass + " resize-none"} placeholder="Quote for John Murphy. Website update. SEO work 250, hosting 180, Google Business 150."></textarea>
                                                <p className="text-[10px] text-slate-500">{geminiKey ? 'I will fill in the customer and line items. Check the prices after.' : 'Add a Gemini key in Settings to use this.'}</p>
                                                <div className="flex gap-2"><button onClick={buildQuoteFromText} disabled={voiceBusy} className={goldBtn}>{voiceBusy ? <Spinner /> : <Sparkles size={16} />} {voiceBusy ? 'Building...' : 'Build quote'}</button><button onClick={() => { setVoiceOpen(false); setVoiceText(''); }} className="px-4 bg-slate-700 hover:bg-slate-600 text-white rounded-lg text-sm">Close</button></div>
                                            </div>
                                        )}

                                        <div className="bg-slate-900/40 border border-[#BE875C]/30 rounded-xl overflow-hidden">
                                            <button onClick={() => setShowAi(v => !v)} className="w-full flex items-center justify-between px-4 py-3">
                                                <span className="flex items-center gap-2 text-sm font-bold text-[#F0D0A5]"><Sparkles size={16} /> AI Quote Assistant</span>
                                                <ChevronDown size={18} className={"text-slate-400 transition-transform " + (showAi ? 'rotate-180' : '')} />
                                            </button>
                                            {showAi && (
                                                <div className="px-4 pb-4 space-y-3 border-t border-slate-700/60 pt-3">
                                                    {!geminiKey ? (
                                                        <div className="text-sm text-slate-400">Add your Gemini API key in <button onClick={() => setActiveTab('settings')} className="text-[#BE875C] underline">Settings</button> to use this.</div>
                                                    ) : (
                                                        <React.Fragment>
                                                            <p className="text-xs text-slate-400">I will use the line items and client above. Add a quick brief: what the job is about, and any options or bundle prices you want offered.</p>
                                                            <textarea rows="3" value={aiBrief} onChange={e => setAiBrief(e.target.value)} className={inputClass + " resize-none"} placeholder="e.g. offer two options, the basics and the full setup with the dashboard bundled, and mention the Jotform subscription is paid to them directly"></textarea>
                                                            <button onClick={runAi} disabled={aiBusy} className={goldBtn}>{aiBusy ? <Spinner /> : <Sparkles size={16} />} {aiBusy ? 'Writing...' : 'Draft the quote'}</button>

                                                                        <div>
                                                                            <div className="flex items-center justify-between mb-1"><span className="text-xs font-semibold text-slate-400 uppercase tracking-wider">PDF cover note</span><button onClick={() => { setIntro(aiResult.note); flash('Added to the quote PDF', 'ok'); }} className="text-xs text-[#BE875C] hover:underline flex items-center gap-1"><Plus size={13} /> Add to PDF</button></div>
                                                                            <textarea rows="3" value={aiResult.note} onChange={e => setAiResult({ ...aiResult, note: e.target.value })} className={inputClass + " resize-y text-xs leading-relaxed"}></textarea>
                                                                        </div>
                                                                    )}
                                                                </div>
                                                            )}
                                                        </React.Fragment>
                                                    )}
                                                </div>
                                            )}
                                        </div>
                                        <section>

                                                <div><label className={labelClass}>Type</label><select value={documentType} onChange={e => { setDocumentType(e.target.value); setDocNo(getNextDocNo(e.target.value, savedDocs)); }} className={inputClass}><option value="Invoice">Invoice</option><option value="Quote">Quote</option></select></div>
                                                <div><label className={labelClass}>Number</label><input value={docNo} onChange={e => setDocNo(e.target.value)} className={inputClass} /></div>
                                            </div>
                                            <div className="grid grid-cols-2 gap-3 mb-3">
                                                <div><label className={labelClass}>Date</label><input type="date" value={date} onChange={e => handleDateChange(e.target.value)} onClick={e => e.target.showPicker && e.target.showPicker()} className={inputClass + " cursor-pointer"} /></div>
                                                <div><label className={labelClass}>Due Date</label><input type="date" value={dueDate} onChange={e => handleDueDateChange(e.target.value)} onClick={e => e.target.showPicker && e.target.showPicker()} className={inputClass + " cursor-pointer"} /></div>
                                            </div>
                                            <div className="grid grid-cols-2 gap-3">
                                                <div><label className={labelClass}>Terms</label><input value={terms} onChange={e => setTerms(e.target.value)} className={inputClass} placeholder="30 Days" /></div>
                                                <div><label className={labelClass}>Job Summary</label><input value={job} onChange={e => setJob(e.target.value)} className={inputClass} placeholder="Brief summary" /></div>
                                            </div>
                                            <div className="mt-3"><label className={labelClass}>Cover Note <span className="text-slate-600 normal-case">(optional, prints at top of PDF)</span></label><textarea rows="2" value={intro} onChange={e => setIntro(e.target.value)} className={inputClass + " resize-none"} placeholder="A short friendly intro, or use the AI assistant above"></textarea></div>
                                        </section>
                                        <section>
                                            <h3 className="text-sm font-bold text-white mb-4 flex items-center gap-2 border-b border-slate-700 pb-2"><User size={16} className="text-[#BE875C]" /> Client Details</h3>
                                            <div className="space-y-3">
                                                <div className="grid grid-cols-3 gap-3">
                                                    <div className="col-span-2"><label className={labelClass}>Client Name</label><input list="customers-list" value={client.name} onChange={handleClientName} onBlur={clientNameBlur} className={inputClass} placeholder="Company or person" /><datalist id="customers-list">{uniqueCustomers.map(c => <option key={c.name} value={c.name} />)}</datalist></div>
                                                    <div><label className={labelClass}>Cust. ID</label><div className="relative"><input value={client.id} onChange={e => changeClient('id', e.target.value)} className={inputClass + " pr-8"} placeholder="CUS-1234" /><button type="button" onClick={() => setClient(p => ({ ...p, id: genId(client.name) }))} className="absolute right-2 top-1/2 -translate-y-1/2 text-slate-500 hover:text-[#BE875C]"><RefreshCw size={14} /></button></div></div>
                                                </div>
                                                <div><label className={labelClass}>Address</label><textarea rows="2" value={client.address} onChange={e => changeClient('address', e.target.value)} className={inputClass + " resize-none"} placeholder="Client address"></textarea></div>
                                                <div><label className={labelClass}>Phone</label><input value={client.phone} onChange={e => changeClient('phone', e.target.value)} className={inputClass} placeholder="Phone number" /></div>
                                                {(() => { const ch = customerHistory(client.name); if (!ch) return null; return (
                                                    <div className="bg-slate-900/40 border border-slate-700 rounded-lg p-3 text-xs animate-fade-in">
                                                        <div className="flex items-center gap-1.5 text-[#F0D0A5] font-semibold mb-2"><User size={13} /> Customer history</div>
                                                        <div className="grid grid-cols-2 gap-y-1 gap-x-3">
                                                            <span className="text-slate-400">Lifetime spend</span><span className="text-slate-200 text-right font-medium">{eur(ch.lifetime)}</span>
                                                            {ch.outstanding > 0 ? <React.Fragment><span className="text-slate-400">Outstanding</span><span className="text-red-400 text-right font-medium">{eur(ch.outstanding)}</span></React.Fragment> : null}
                                                            <span className="text-slate-400">Documents</span><span className="text-slate-200 text-right">{ch.count}</span>
                                                            {ch.lastInv ? <React.Fragment><span className="text-slate-400">Last invoice</span><span className="text-slate-200 text-right">#{ch.lastInv.docNo} · {ch.lastInv.date}</span></React.Fragment> : null}
                                                        </div>
                                                        {ch.common.length > 0 ? <div className="mt-2 text-slate-500">Usual: {ch.common.join(', ')}</div> : null}
                                                    </div>
                                                ); })()}
                                            </div>
                                        </section>
                                        <section>
                                            <h3 className="text-sm font-bold text-white mb-4 flex items-center gap-2 border-b border-slate-700 pb-2"><ListIcon size={16} className="text-[#BE875C]" /> Line Items</h3>
                                            <div className="space-y-3">{items.map((item, index) => (

                const accepted = quotes.filter(d => d.status === 'accepted').length;
                const convRate = quotes.length ? Math.round((accepted / quotes.length) * 100) : null;
                const fu = quotes.map(d => { if (!d.lastContact || !d.date) return null; const t = (new Date(d.lastContact) - new Date(d.date)) / 86400000; return (isNaN(t) || t < 0) ? null : t; }).filter(x => x != null);
                const avgFollowupDays = fu.length ? fu.reduce((s, x) => s + x, 0) / fu.length : null;
                return { total: real.length, repliedCount: replied.length, open: open, avgRespH: avgRespH, fastestH: fastestH, avgOpenAge: avgOpenAge, convRate: convRate, accepted: accepted, quoteCount: quotes.length, avgFollowupDays: avgFollowupDays };
            }, [enquiries, docs]);
            const data = useMemo(() => {
                const invoices = docs.filter(d => d.documentType === 'Invoice');
                const quotes = docs.filter(d => d.documentType === 'Quote');
                const sum = arr => arr.reduce((s, x) => s + (Number(x.total != null ? x.total : x.amount) || 0), 0);
                const totalInvoiced = sum(invoices), totalQuoted = sum(quotes), totalExpenses = receipts.reduce((s, r) => s + (Number(r.amount) || 0), 0);
                const months = monthBuckets();
                const inv = {}, exp = {};
                months.forEach(m => { inv[m.key] = 0; exp[m.key] = 0; });
                invoices.forEach(d => { const k = (d.date || '').slice(0, 7); if (k in inv) inv[k] += Number(d.total) || 0; });
                receipts.forEach(r => { const k = (r.date || '').slice(0, 7); if (k in exp) exp[k] += Number(r.amount) || 0; });
                const clientMap = {};
                invoices.forEach(d => { const n = d.client && d.client.name ? d.client.name : 'Unknown'; clientMap[n] = (clientMap[n] || 0) + (Number(d.total) || 0); });
                const topClients = Object.keys(clientMap).map(k => ({ label: k, value: clientMap[k] })).sort((a, b) => b.value - a.value).slice(0, 6);
                const catMap = {};
                receipts.forEach(r => { const c = r.category || 'Other'; catMap[c] = (catMap[c] || 0) + (Number(r.amount) || 0); });
                const cats = Object.keys(catMap).map(k => ({ label: k, value: catMap[k] })).sort((a, b) => b.value - a.value);
                return {
                    totalInvoiced, totalQuoted, totalExpenses, net: totalInvoiced - totalExpenses,
                    invCount: invoices.length, quoteCount: quotes.length, recCount: receipts.length,
                    avg: invoices.length ? totalInvoiced / invoices.length : 0,
                    months, aInv: months.map(m => inv[m.key]), aExp: months.map(m => exp[m.key]),
                    topClients, cats
                };
            }, [docs, receipts]);

            const time = useMemo(() => {
                const thisMonth = new Date().toISOString().slice(0, 7);
                let totalMin = 0, monthMin = 0;
                (activities || []).forEach(a => { const m = Number(a.minutes) || 0; totalMin += m; if ((a.createdAt || '').slice(0, 7) === thisMonth) monthMin += m; });
                const rows = (jobs || []).map(j => { const st = jobStats[j.id] || { minutes: 0, call: 0, email: 0, sessions: 0 }; const hrs = st.minutes / 60; const rev = jobRevenue(j); return { id: j.id, name: j.name, client: j.client, hrs, rev, sessions: st.sessions, contacts: (st.call || 0) + (st.email || 0), rate: hrs > 0.02 ? rev / hrs : null }; });
                const withRate = rows.filter(r => r.rate != null && r.rev > 0).sort((a, b) => a.rate - b.rate);
                const blendedHrs = withRate.reduce((s, r) => s + r.hrs, 0); const blendedRev = withRate.reduce((s, r) => s + r.rev, 0);
                const blended = blendedHrs > 0 ? blendedRev / blendedHrs : null;
                return { totalMin, monthMin, rows: rows.sort((a, b) => b.hrs - a.hrs), withRate, blended, trackedJobs: rows.filter(r => r.hrs > 0).length };
            }, [jobs, activities, jobStats, docs]);
            const rateColour = (r) => r == null ? '#64748b' : r < 25 ? '#f87171' : r < 45 ? '#fbbf24' : '#86efac';

            const empty = !docs.length && !receipts.length;
            return (
                <div className="space-y-5">
                    <h2 className="text-lg font-bold text-white flex items-center gap-2"><Activity size={20} className="text-[#BE875C]" /> Insights</h2>
                    {empty && <p className="text-slate-500 text-sm bg-slate-800 border border-slate-700 rounded-xl p-6 text-center">Save an invoice or a receipt and your numbers will appear here.</p>}
                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-3">
                        <Kpi label="Invoiced" value={eur(data.totalInvoiced)} sub={data.invCount + ' invoices'} accent="#F0D0A5" />
                        <Kpi label="Expenses" value={eur(data.totalExpenses)} sub={data.recCount + ' receipts'} accent="#fca5a5" />
                        <Kpi label="Net" value={eur(data.net)} sub="invoiced less expenses" accent={data.net >= 0 ? '#86efac' : '#fca5a5'} />
                        <Kpi label="Avg Invoice" value={eur(data.avg)} sub={data.quoteCount + ' quotes out'} accent="#cbd5e1" />
                    </div>
                    <div className="bg-slate-800 border border-slate-700 rounded-xl p-4 lg:p-5">
                        <div className="flex items-center justify-between mb-3">
                            <h3 className="text-sm font-bold text-white flex items-center gap-2"><TrendingUp size={16} className="text-[#BE875C]" /> Last 12 months</h3>
                            <div className="flex items-center gap-4 text-xs">
                                <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded-sm" style={{ background: '#BE875C' }}></span><span className="text-slate-400">Invoiced</span></span>
                                <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded-sm" style={{ background: '#475d70' }}></span><span className="text-slate-400">Expenses</span></span>
                            </div>
                        </div>
                        <GroupedBars months={data.months} a={data.aInv} b={data.aExp} labelA="Invoiced" labelB="Expenses" />
                    </div>
                    <div className="grid lg:grid-cols-2 gap-4">
                        <div className="bg-slate-800 border border-slate-700 rounded-xl p-4 lg:p-5">
                            <h3 className="text-sm font-bold text-white mb-4 flex items-center gap-2"><Users size={16} className="text-[#BE875C]" /> Top Clients</h3>
                            <HBars rows={data.topClients} color="linear-gradient(90deg,#C49066,#BE875C)" />
                        </div>
                        <div className="bg-slate-800 border border-slate-700 rounded-xl p-4 lg:p-5">
                            <h3 className="text-sm font-bold text-white mb-4 flex items-center gap-2"><Tag size={16} className="text-[#BE875C]" /> Expenses by Category</h3>
                            <HBars rows={data.cats} color="linear-gradient(90deg,#5b7387,#344857)" />
                        </div>
                    </div>

                    {/* ===== TIME + PROFITABILITY (pricing insight) ===== */}
                    <div className="pt-2">
                        <h2 className="text-lg font-bold text-white flex items-center gap-2 mb-3"><Clock size={20} className="text-[#BE875C]" /> Time and Profitability</h2>
                        <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-4">
                            <Kpi label="Hours Tracked" value={fmtDur(time.totalMin)} sub="all jobs" accent="#F0D0A5" />
                            <Kpi label="This Month" value={fmtDur(time.monthMin)} sub="logged time" accent="#cbd5e1" />
                            <Kpi label="Blended Rate" value={time.blended == null ? 'n/a' : kfmt(time.blended) + '/h'} sub="revenue per hour" accent={rateColour(time.blended)} />
                            <Kpi label="Tracked Jobs" value={String(time.trackedJobs)} sub="with time logged" accent="#cbd5e1" />
                        </div>
                        {time.blended != null && (
                            <div className="bg-gradient-to-r from-[#BE875C]/15 to-transparent border border-[#BE875C]/30 rounded-xl p-4 mb-4 text-sm text-slate-200 leading-relaxed">
                                You are earning about <span className="font-bold text-[#F0D0A5]">{eur(time.blended)}</span> per hour across tracked jobs.
                                {time.withRate.length > 0 && time.withRate[0].rate < (time.blended || 0) && (<span> Your toughest job, <span className="font-bold text-white">{time.withRate[0].name}</span>, came in at just <span className="font-bold text-red-400">{eur(time.withRate[0].rate)}/h</span> over {fmtDur(time.withRate[0].hrs * 60)}. Worth quoting jobs like that higher.</span>)}
                            </div>
                        )}
                        <div className="bg-slate-800 border border-slate-700 rounded-xl p-4 lg:p-5">
                            <h3 className="text-sm font-bold text-white mb-1 flex items-center gap-2"><TrendingUp size={16} className="text-[#BE875C]" /> Effective rate by job</h3>
                            <p className="text-xs text-slate-500 mb-4">Lowest first. These are the jobs eating your time for the money.</p>
                            {time.withRate.length === 0 ? <p className="text-slate-500 text-sm text-center py-6">Link a job to an invoice or add an estimate, then log time, to see your real rate.</p> : (
                                <div className="space-y-3">{time.withRate.map(r => { const max = Math.max.apply(null, time.withRate.map(x => x.rate).concat([1])); return (
                                    <div key={r.id}>
                                        <div className="flex justify-between text-xs mb-1"><span className="text-slate-300 truncate pr-2">{r.name}<span className="text-slate-500"> · {fmtDur(r.hrs * 60)}{r.contacts ? ' · ' + r.contacts + ' contacts' : ''}</span></span><span className="font-bold shrink-0" style={{ color: rateColour(r.rate) }}>{eur(r.rate)}/h</span></div>
                                        <div className="h-2 bg-slate-900 rounded-full overflow-hidden"><div className="h-full rounded-full" style={{ width: Math.max(3, (r.rate / max) * 100) + '%', background: rateColour(r.rate) }}></div></div>
                                    </div>); })}
                                </div>
                            )}
                        </div>
                        {time.rows.filter(r => r.hrs > 0 && r.rev === 0).length > 0 && (
                            <div className="mt-3 text-xs text-slate-400 bg-slate-800/60 border border-slate-700 rounded-lg p-3">
                                {time.rows.filter(r => r.hrs > 0 && r.rev === 0).length} job(s) have time logged but no linked invoice or estimate, so no rate yet. Add one on the Jobs tab to include them.
                            </div>
                        )}
                    </div>

                    {(leads.total > 0 || leads.quoteCount > 0) && (
                        <div className="pt-2">
                            <h2 className="text-lg font-bold text-white flex items-center gap-2 mb-3"><Mail size={20} className="text-[#BE875C]" /> Enquiries and follow-ups</h2>
                            <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-3">
                                <Kpi label="Enquiries" value={String(leads.total)} sub={leads.open + ' awaiting reply'} accent="#7dd3fc" />
                                <Kpi label="Replied" value={String(leads.repliedCount)} sub={leads.total ? Math.round(leads.repliedCount / leads.total * 100) + '% of enquiries' : 'none yet'} accent="#86efac" />
                                <Kpi label="Avg reply time" value={fmtHours(leads.avgRespH)} sub={leads.fastestH != null ? 'fastest ' + fmtHours(leads.fastestH) : 'mark replies to log'} accent={leads.avgRespH == null ? '#64748b' : leads.avgRespH <= 24 ? '#86efac' : leads.avgRespH <= 72 ? '#fbbf24' : '#f87171'} />
                                <Kpi label="Quote win rate" value={leads.convRate == null ? 'n/a' : leads.convRate + '%'} sub={leads.accepted + ' of ' + leads.quoteCount + ' accepted'} accent="#F0D0A5" />
                            </div>
                            <div className="grid grid-cols-2 lg:grid-cols-4 gap-3">
                                <Kpi label="Open quotes age" value={fmtDays(leads.avgOpenAge)} sub="avg time waiting" accent={leads.avgOpenAge == null ? '#64748b' : leads.avgOpenAge <= 7 ? '#86efac' : leads.avgOpenAge <= 14 ? '#fbbf24' : '#f87171'} />
                                <Kpi label="Time to follow up" value={fmtDays(leads.avgFollowupDays)} sub="avg after sending" accent="#cbd5e1" />
                            </div>
                            {(leads.avgRespH != null || (leads.avgOpenAge != null && leads.open > 0)) && (
                                <div className="bg-gradient-to-r from-[#BE875C]/15 to-transparent border border-[#BE875C]/30 rounded-xl p-4 mt-4 text-sm text-slate-200 leading-relaxed">
                                    {leads.avgRespH != null && <span>You reply to enquiries in about <span className="font-bold text-[#F0D0A5]">{fmtHours(leads.avgRespH)}</span> on average. </span>}
                                    {leads.open > 0 && <span>You have <span className="font-bold text-white">{leads.open}</span> still waiting{leads.avgOpenAge != null && <span> and open quotes are sitting <span className="font-bold text-amber-300">{fmtDays(leads.avgOpenAge)}</span> on average</span>}. Quicker replies tend to win more work.</span>}
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        /* ===================================================================
         * EXCEL EXPORT (#3) - branded workbook via ExcelJS (lazy-loaded)
         * =================================================================== */
        function loadExcelJS() {
            if (window.ExcelJS) return Promise.resolve(window.ExcelJS);
            return new Promise((resolve, reject) => {
                const add = (src, onerr) => { const s = document.createElement('script'); s.src = src; s.onload = () => resolve(window.ExcelJS); s.onerror = onerr; document.head.appendChild(s); };
                add('https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js', () => add('https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js', reject));
            });
        }
        async function fetchLogoBase64() {
            try { const r = await fetch(LOGO_URL); const b = await r.blob(); return await new Promise(res => { const fr = new FileReader(); fr.onloadend = () => res(String(fr.result).split(',')[1]); fr.readAsDataURL(b); }); } catch (e) { return null; }
        }
        async function exportAccountantXlsx({ docs, receipts, from, to }) {
            const ExcelJS = await loadExcelJS();
            const inRange = d => {
                const dateOnly = (d || '').slice(0, 10);
                return (!from || dateOnly >= from) && (!to || dateOnly <= to);
            };
            const invs = docs.filter(d => inRange(d.date)).sort((a, b) => a.date < b.date ? -1 : 1);
            const recs = receipts.filter(r => inRange(r.date)).sort((a, b) => a.date < b.date ? -1 : 1);
            const invoices = invs.filter(d => d.documentType === 'Invoice'), quotes = invs.filter(d => d.documentType === 'Quote');
            const sumInv = invoices.reduce((s, d) => s + (Number(d.total) || 0), 0);
            const sumQuote = quotes.reduce((s, d) => s + (Number(d.total) || 0), 0);
            const sumExp = recs.reduce((s, r) => s + (Number(r.amount) || 0), 0);
            const sumVat = recs.reduce((s, r) => s + (Number(r.vat) || 0), 0);
            const NAVY = 'FF344857', BRONZE = 'FFBE875C', DARK = 'FF233140', LIGHT = 'FFF6EFE7', WHITE = 'FFFFFFFF', GREY = 'FF64748B';
            const money = '"€"#,##0.00';
            const wb = new ExcelJS.Workbook(); wb.creator = 'Protech Dynamic Solutions';
            const periodLabel = (from || 'start') + '  to  ' + (to || 'today');
            const logoB64 = await fetchLogoBase64();
            const headerRow = (row) => { row.eachCell(c => { c.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: NAVY } }; c.font = { color: { argb: WHITE }, bold: true, size: 11 }; c.alignment = { vertical: 'middle' }; c.border = { bottom: { style: 'thin', color: { argb: BRONZE } } }; }); row.height = 22; };

            const s = wb.addWorksheet('Summary', { views: [{ showGridLines: false }] });
            s.columns = [{ width: 3 }, { width: 28 }, { width: 20 }, { width: 20 }, { width: 20 }, { width: 3 }];
            if (logoB64) { const id = wb.addImage({ base64: logoB64, extension: 'png' }); s.addImage(id, { tl: { col: 1, row: 0.4 }, ext: { width: 118, height: 146 } }); }
            s.mergeCells('C2:E2'); s.getCell('C2').value = 'Protech Dynamic Solutions'; s.getCell('C2').font = { size: 20, bold: true, color: { argb: BRONZE } };
            s.mergeCells('C3:E3'); s.getCell('C3').value = 'Accountant Export'; s.getCell('C3').font = { size: 12, bold: true, color: { argb: NAVY } };
            s.mergeCells('C4:E4'); s.getCell('C4').value = 'Period: ' + periodLabel; s.getCell('C4').font = { size: 10, color: { argb: GREY } };
            s.mergeCells('C5:E5'); s.getCell('C5').value = 'Generated: ' + new Date().toLocaleString('en-IE'); s.getCell('C5').font = { size: 9, color: { argb: GREY } };
            let row = 9;
            const kpi = (label, value, accent) => { s.mergeCells('B' + row + ':C' + row); const l = s.getCell('B' + row); l.value = label; l.font = { bold: true, color: { argb: NAVY }, size: 11 }; l.alignment = { vertical: 'middle' }; s.mergeCells('D' + row + ':E' + row); const v = s.getCell('D' + row); v.value = value; v.numFmt = money; v.font = { bold: true, size: 12, color: { argb: accent || DARK } }; v.alignment = { horizontal: 'right', vertical: 'middle' }; [l, v].forEach(c => { c.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: LIGHT } }; c.border = { bottom: { style: 'thin', color: { argb: 'FFE2D5C5' } } }; }); s.getRow(row).height = 20; row++; };
            kpi('Total Invoiced', sumInv, BRONZE); kpi('Total Quoted', sumQuote, NAVY); kpi('Total Expenses (receipts)', sumExp, 'FFB91C1C'); kpi('of which VAT', sumVat, GREY); kpi('Net (Invoiced less Expenses)', sumInv - sumExp, (sumInv - sumExp) >= 0 ? 'FF15803D' : 'FFB91C1C');
            row++;
            const cnt = (label, value) => { s.mergeCells('B' + row + ':C' + row); s.getCell('B' + row).value = label; s.getCell('B' + row).font = { color: { argb: GREY }, size: 10 }; const v = s.getCell('D' + row); v.value = value; v.alignment = { horizontal: 'right' }; v.font = { color: { argb: NAVY }, bold: true }; row++; };
            cnt('Invoices', invoices.length); cnt('Quotes', quotes.length); cnt('Receipts', recs.length);

            const di = wb.addWorksheet('Invoices', { views: [{ showGridLines: false, state: 'frozen', ySplit: 1 }] });
            di.columns = [{ header: 'Date', key: 'date', width: 13 }, { header: 'Type', key: 'type', width: 10 }, { header: 'Number', key: 'no', width: 12 }, { header: 'Client', key: 'client', width: 30 }, { header: 'Customer ID', key: 'cid', width: 14 }, { header: 'Job', key: 'job', width: 34 }, { header: 'Total', key: 'total', width: 15 }];
            headerRow(di.getRow(1));
            invs.forEach((d, i) => { const r = di.addRow({ date: d.date, type: d.documentType, no: '#' + d.docNo, client: d.client.name, cid: d.client.id, job: d.job, total: Number(d.total) || 0 }); r.getCell('total').numFmt = money; if (i % 2) r.eachCell(c => { c.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: LIGHT } }; }); });
            const ti = di.addRow({ client: 'TOTAL', total: sumInv + sumQuote }); ti.eachCell(c => { c.font = { bold: true, color: { argb: WHITE } }; c.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: BRONZE } }; }); ti.getCell('total').numFmt = money;

            const dr = wb.addWorksheet('Receipts', { views: [{ showGridLines: false, state: 'frozen', ySplit: 1 }] });
            dr.columns = [{ header: 'Date & Time', key: 'date', width: 18 }, { header: 'Supplier', key: 'supplier', width: 26 }, { header: 'Category', key: 'cat', width: 15 }, { header: 'Payment', key: 'pay', width: 14 }, { header: 'Notes', key: 'notes', width: 30 }, { header: 'Amount', key: 'amount', width: 14 }, { header: 'VAT', key: 'vat', width: 12 }, { header: 'File', key: 'file', width: 10 }];
            headerRow(dr.getRow(1));
            recs.forEach((rc, i) => { const r = dr.addRow({ date: rc.date, supplier: rc.supplier, cat: rc.category, pay: rc.paymentMethod, notes: rc.notes, amount: Number(rc.amount) || 0, vat: Number(rc.vat) || 0, file: '' }); r.getCell('amount').numFmt = money; r.getCell('vat').numFmt = money; if (i % 2) r.eachCell(c => { c.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: LIGHT } }; }); if (rc.fileUrl) { const fc = r.getCell('file'); fc.value = { text: 'View', hyperlink: rc.fileUrl }; fc.font = { color: { argb: 'FF2563EB' }, underline: true }; } });
            const trr = dr.addRow({ notes: 'TOTAL', amount: sumExp, vat: sumVat }); trr.eachCell(c => { c.font = { bold: true, color: { argb: WHITE } }; c.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: BRONZE } }; }); trr.getCell('amount').numFmt = money; trr.getCell('vat').numFmt = money;

            const buf = await wb.xlsx.writeBuffer();
            const blob = new Blob([buf], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
            const fname = 'Protech_Accountant_Export_' + (from || 'all') + '_to_' + (to || 'now') + '.xlsx';
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = fname; document.body.appendChild(a); a.click(); document.body.removeChild(a); setTimeout(() => URL.revokeObjectURL(a.href), 4000);
        }

        /* ===================================================================
         * ROOT GATE
         * =================================================================== */
        function Root() {
            const [creds, setCreds] = useState(null);
            const [vaultExists, setVaultExists] = useState(Vault.exists());
            if (!creds) {
                return vaultExists
                    ? <LockScreen onUnlock={setCreds} onReset={() => setVaultExists(false)} />
                    : <SetupScreen onReady={(c) => { setVaultExists(true); setCreds(c); }} />;
            }
            return <App creds={creds} onLock={() => setCreds(null)} />;
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
    </script>

    <!-- Register the service worker so the app installs and opens offline -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function () {
                navigator.serviceWorker.register('sw.js').catch(function () {});
            });
        }
    </script>
</body>
</html>
