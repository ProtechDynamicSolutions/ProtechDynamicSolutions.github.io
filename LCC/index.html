<!DOCTYPE html>
<html lang="en-IE">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Liebherr STS Logistics Hub</title>
<style>
  :root{
    --ink:#0B0C0D; --graphite:#1A1D1E; --steel:#2A2F31;
    --yellow:#ECC239; --yellow-6:#D6A81C; --yellow-7:#B78E12;
    --bg:#EEF1F4; --card:#ffffff; --line:#E3E7EB; --line2:#D5DBE1;
    --muted:#64748b; --muted2:#94a3b8; --slate:#334155; --slate9:#0f172a;
    --blue:#1d4ed8; --blueb:#eff6ff; --bluec:#bfdbfe;
    --amber:#b45309; --amberb:#fffbeb; --amberc:#fde68a;
    --emer:#047857; --emerb:#ecfdf5; --emerc:#a7f3d0;
    --red:#dc2626; --redb:#fef2f2; --redc:#fecaca;
  }
  *{box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter','Segoe UI',system-ui,-apple-system,Arial,sans-serif;-webkit-font-smoothing:antialiased;}
  .tnum{font-variant-numeric:tabular-nums;}
  button{font-family:inherit;cursor:pointer;border:0;background:none;}
  input,textarea{font-family:inherit;}
  svg{display:inline-block;vertical-align:middle;flex-shrink:0;}
  :focus-visible{outline:2px solid var(--yellow);outline-offset:2px;border-radius:6px;}
  .wrap{max-width:1120px;margin:0 auto;padding:24px 16px 60px;}
  .disp{font-family:'Archivo','Inter',sans-serif;letter-spacing:-.01em;}

  .nav{position:sticky;top:0;z-index:30;background:var(--graphite);color:#fff;box-shadow:0 4px 14px rgba(0,0,0,.18);}
  .nav-in{max-width:1120px;margin:0 auto;height:64px;padding:0 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .brand{display:flex;align-items:center;gap:12px;min-width:0;}
  .mark{background:var(--yellow);color:var(--ink);padding:5px 9px;border-radius:3px;font-family:'Archivo','Inter',sans-serif;font-weight:800;letter-spacing:-.04em;font-size:15px;line-height:1;}
  .brand-t{border-left:1px solid rgba(255,255,255,.15);padding-left:12px;line-height:1.15;}
  .brand-t .a{font-family:'Archivo',sans-serif;font-weight:700;font-size:15px;}
  .brand-t .b{font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:.18em;}
  @media(max-width:620px){.brand-t{display:none;}}
  .seg{display:flex;gap:2px;background:rgba(0,0,0,.4);border-radius:9px;padding:4px;flex-shrink:0;}
  .seg button{display:flex;align-items:center;gap:8px;padding:7px 13px;border-radius:6px;font-size:14px;font-weight:700;color:#cbd5e1;transition:background .15s,color .15s;}
  .seg button:hover{color:#fff;}
  .seg button.on{background:var(--yellow);color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.2);}
  @media(max-width:620px){.seg button span{display:none;}}

  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:0 1px 2px rgba(15,23,42,.04);}
  .stack{display:flex;flex-direction:column;gap:22px;}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  @media(max-width:760px){.kpis{grid-template-columns:repeat(2,1fr);}}
  .kpi{padding:18px;position:relative;overflow:hidden;}
  .kpi .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .kpi .lab{color:var(--muted);font-size:13px;font-weight:600;}
  .kpi .big{font-family:'Archivo',sans-serif;font-size:30px;font-weight:800;line-height:1;}
  .kpi .u{font-size:13px;color:var(--muted);font-weight:500;margin-left:4px;}
  .kpi .sub{font-size:12px;color:var(--muted2);margin-top:6px;display:block;}
  .bar{width:100%;height:8px;background:#eef1f4;border-radius:99px;margin-top:12px;overflow:hidden;}
  .bar>i{display:block;height:100%;background:var(--yellow);transition:width .7s ease;}
  .kpi .ghost{position:absolute;right:-18px;top:-18px;color:#f1f4f7;}

  .banner{background:var(--redb);border:1px solid var(--redc);border-radius:14px;padding:16px;display:flex;align-items:center;gap:12px;}
  .banner .ic{background:#fee2e2;color:var(--red);width:44px;height:44px;border-radius:99px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .banner h3{margin:0;color:#991b1b;font-size:18px;}
  .banner p{margin:2px 0 0;color:#dc2626;font-size:14px;font-weight:500;}

  .fleet{display:flex;flex-direction:column;overflow:hidden;}
  @media(min-width:760px){.fleet{flex-direction:row;}}
  .fleet.big{position:fixed;inset:14px;z-index:40;flex-direction:column;box-shadow:0 30px 80px rgba(0,0,0,.4);}
  .chart{position:relative;flex:1;min-height:340px;width:100%;}
  @media(min-width:760px){.chart{width:66%;}}
  .fleet.big .chart{min-height:62vh;width:100%;}
  .chart svg.map{position:absolute;inset:0;width:100%;height:100%;}
  .chip{position:absolute;z-index:5;background:rgba(11,12,13,.7);backdrop-filter:blur(4px);color:#fff;border:1px solid rgba(255,255,255,.1);border-radius:9px;font-size:11px;font-weight:700;}
  .chip.tl{top:14px;left:14px;padding:8px;display:flex;}
  .chip.tr{top:14px;right:14px;padding:6px 11px;display:flex;align-items:center;gap:7px;}
  .chip.tr .dot{width:7px;height:7px;border-radius:99px;background:var(--yellow);animation:ping 1.6s cubic-bezier(0,0,.2,1) infinite;}
  .chip.tl:hover{background:var(--ink);}
  .panel{width:100%;background:#F7F9FB;border-top:1px solid var(--line);padding:18px;display:flex;flex-direction:column;justify-content:center;gap:12px;}
  @media(min-width:760px){.panel{width:288px;border-top:0;border-left:1px solid var(--line);}}
  .fleet.big .panel{display:none;}
  .panel h4{margin:0 0 2px;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.14em;}
  .vcard{text-align:left;width:100%;background:#fff;border:1px solid var(--line);border-left-width:4px;border-radius:10px;padding:12px;box-shadow:0 1px 2px rgba(15,23,42,.05);transition:box-shadow .15s;}
  .vcard:hover{box-shadow:0 6px 16px rgba(15,23,42,.1);}
  .vcard.blue{border-color:var(--bluec);border-left-color:var(--blue);}
  .vcard.emer{border-color:var(--emerc);border-left-color:var(--emer);}
  .vcard .r1{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;}
  .vcard .nm{font-weight:700;color:var(--slate9);}
  .tag{font-size:10px;text-transform:uppercase;font-weight:700;padding:2px 6px;border-radius:5px;}
  .tag.blue{background:#dbeafe;color:#1e40af;}
  .tag.emer{background:#d1fae5;color:#065f46;}
  .vcard .r2{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:4px;margin-bottom:8px;}
  .vcard .r3{display:flex;align-items:center;justify-content:space-between;}
  .vcard .wt{font-weight:700;font-size:18px;color:var(--slate9);display:flex;align-items:center;gap:4px;}
  .vcard .eta{font-size:11px;color:var(--muted);font-weight:600;}

  .rhead{padding:16px;border-bottom:1px solid var(--line);background:#F7F9FB;display:flex;flex-direction:column;gap:16px;}
  .rhead .top{display:flex;flex-direction:column;gap:14px;justify-content:space-between;}
  @media(min-width:760px){.rhead .top{flex-direction:row;align-items:center;}}
  .rhead h2{margin:0;font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px;}
  .searchbox{position:relative;width:100%;}
  @media(min-width:760px){.searchbox{width:288px;}}
  .searchbox svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted2);}
  .searchbox input{width:100%;padding:9px 12px 9px 36px;border:1px solid var(--line2);border-radius:9px;font-size:14px;outline:none;}
  .searchbox input:focus{border-color:var(--yellow);box-shadow:0 0 0 2px rgba(236,194,57,.35);}
  .filters{display:flex;flex-wrap:wrap;align-items:center;gap:8px;}
  .filters .lb{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;display:flex;align-items:center;gap:4px;margin-right:2px;}
  .pill{padding:6px 12px;border-radius:9px;font-size:12px;font-weight:700;border:1px solid var(--line2);background:#fff;color:var(--slate);transition:background .12s;}
  .pill:hover{background:#f1f5f9;}
  .pill.on-dark{background:var(--ink);color:#fff;border-color:var(--ink);}
  .pill.on-y{background:var(--yellow);color:var(--ink);border-color:var(--yellow-6);}
  .tbl-scroll{overflow-x:auto;}
  table{min-width:100%;border-collapse:collapse;}
  th{padding:12px 24px;text-align:left;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;background:#F7F9FB;}
  td{padding:16px 24px;border-top:1px solid var(--line);vertical-align:top;}
  tr.issue-row td{background:rgba(254,242,242,.5);}
  .cmp{font-size:14px;font-weight:700;color:var(--slate9);}
  .cmp-s{font-size:12px;color:var(--muted);margin-top:2px;}
  .badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:5px;font-size:12px;font-weight:700;}
  .badge.crane{background:rgba(236,194,57,.16);color:var(--yellow-7);}
  .badge.ves{color:#1e40af;font-size:12px;margin-top:4px;}
  .status{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:99px;font-size:12px;font-weight:700;border:1px solid;}
  .st-PENDING{background:#f1f5f9;color:#475569;border-color:#e2e8f0;}
  .st-ONSITE{background:var(--amberb);color:var(--amber);border-color:var(--amberc);}
  .st-SHIPPED{background:var(--blueb);color:var(--blue);border-color:var(--bluec);}
  .st-OFFLOADED{background:var(--emerb);color:var(--emer);border-color:var(--emerc);}
  .miniss{margin-top:8px;font-size:12px;background:#fee2e2;color:#991b1b;border:1px solid var(--redc);border-radius:6px;padding:5px 8px;max-width:240px;}
  .miniss b{display:flex;align-items:center;gap:4px;}
  .miniss span{display:block;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  .field{max-width:440px;margin:0 auto;display:flex;flex-direction:column;gap:16px;}
  .field .tools{padding:12px;}
  .btn{display:flex;width:100%;align-items:center;justify-content:center;gap:8px;padding:13px;border-radius:9px;font-weight:700;font-size:15px;transition:background .15s,transform .05s;}
  .btn:active{transform:scale(.98);}
  .btn-dark{background:var(--ink);color:#fff;} .btn-dark:hover{background:var(--graphite);}
  .btn-blue{background:var(--blue);color:#fff;} .btn-blue:hover{background:#1e40af;}
  .field .fsearch{position:relative;margin-top:12px;}
  .field .fsearch svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted2);}
  .field .fsearch input{width:100%;background:#eef2f6;border:1px solid transparent;border-radius:9px;padding:9px 12px 9px 36px;font-size:14px;font-weight:500;outline:none;}
  .field .fsearch input:focus{background:#fff;border-color:var(--yellow);box-shadow:0 0 0 2px rgba(236,194,57,.3);}
  .tabs{display:flex;gap:4px;background:#dfe5ec;border-radius:12px;padding:4px;}
  .tabs button{flex:1;padding:10px;border-radius:9px;font-size:14px;font-weight:700;color:var(--muted);transition:background .15s;}
  .tabs button.on{background:#fff;box-shadow:0 1px 3px rgba(15,23,42,.1);}
  .tabs button.on.c-PENDING{color:#475569;} .tabs button.on.c-ONSITE{color:var(--amber);}
  .tabs button.on.c-SHIPPED{color:var(--blue);} .tabs button.on.c-OFFLOADED{color:var(--emer);}
  .fcard{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px;box-shadow:0 1px 2px rgba(15,23,42,.05);animation:slideUp .35s cubic-bezier(.2,.7,.3,1) both;}
  .fcard.heavy{border-left:4px solid var(--yellow);}
  .fcard.flag{border-color:var(--redc);box-shadow:0 0 0 1px #fee2e2;}
  .fialert{background:var(--redb);border:1px solid var(--redc);color:#991b1b;border-radius:9px;padding:9px 11px;margin-bottom:12px;font-size:12px;display:flex;gap:8px;}
  .fialert b{text-transform:uppercase;letter-spacing:.02em;}
  .fcard .r1{display:flex;justify-content:space-between;gap:8px;margin-bottom:8px;}
  .taglist{display:flex;flex-wrap:wrap;gap:6px;}
  .qty{background:#f1f5f9;color:#334155;font-size:12px;font-weight:700;padding:2px 8px;border-radius:5px;flex-shrink:0;}
  .fcard h3{margin:0 0 4px;font-size:15px;font-weight:700;line-height:1.35;}
  .fmeta{font-size:12px;color:var(--muted);margin-bottom:14px;display:flex;gap:12px;}
  .fmeta .w{display:flex;align-items:center;gap:4px;font-weight:700;color:var(--slate);}
  .frow{display:flex;gap:8px;}
  .fadvance{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border-radius:9px;font-weight:700;transition:background .15s,transform .05s;}
  .fadvance:active{transform:scale(.98);}
  .adv-PENDING{background:#fde9c8;color:#92400e;} .adv-PENDING:hover{background:#fcdca6;}
  .adv-ONSITE{background:var(--ink);color:#fff;} .adv-ONSITE:hover{background:var(--graphite);}
  .adv-SHIPPED{background:#c9f0dd;color:#065f46;} .adv-SHIPPED:hover{background:#a7f3d0;}
  .fadvance span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .done{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border-radius:9px;font-weight:700;background:#f8fafc;color:var(--muted2);border:1px solid #eef2f6;}
  .flagbtn{background:var(--redb);color:var(--red);border:1px solid var(--redc);padding:12px;border-radius:9px;} .flagbtn:hover{background:#fee2e2;}
  .empty{background:#fff;border:1px dashed var(--line2);border-radius:12px;padding:32px;text-align:center;}
  .empty svg{color:#cbd5e1;margin-bottom:10px;}
  .empty p{margin:0;color:var(--muted);font-weight:500;font-size:14px;}

  .overlay{position:fixed;inset:0;z-index:50;background:rgba(11,12,13,.6);backdrop-filter:blur(4px);display:flex;justify-content:center;padding:16px;animation:fade .25s ease both;}
  .overlay.bottom{align-items:flex-end;} @media(min-width:640px){.overlay.bottom{align-items:center;}}
  .overlay.center{align-items:center;}
  .sheet{background:#fff;width:100%;max-width:384px;border-radius:18px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.35);animation:slideUp .3s cubic-bezier(.2,.7,.3,1) both;}
  .sheet .hd{background:var(--red);color:#fff;padding:16px;display:flex;justify-content:space-between;align-items:center;}
  .sheet .hd h2{margin:0;font-size:18px;display:flex;align-items:center;gap:8px;}
  .sheet .hd button{color:#fff;padding:4px;border-radius:8px;} .sheet .hd button:hover{background:#b91c1c;}
  .sheet .bd{padding:20px;display:flex;flex-direction:column;gap:18px;}
  .sheet .bd p{margin:0;font-size:14px;color:var(--slate);font-weight:500;}
  .lbl{font-size:14px;font-weight:700;color:var(--slate9);display:block;margin-bottom:8px;}
  .itypes{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .itype{padding:12px;border-radius:9px;font-weight:700;border:2px solid var(--line2);color:var(--muted);background:#fff;}
  .itype.sel[data-type="Damaged"]{border-color:var(--red);background:var(--redb);color:#b91c1c;}
  .itype.sel[data-type="Missing"]{border-color:#f59e0b;background:var(--amberb);color:var(--amber);}
  textarea{width:100%;border:1px solid var(--line2);border-radius:9px;padding:12px;font-size:14px;resize:none;outline:none;}
  textarea:focus{border-color:var(--red);box-shadow:0 0 0 2px rgba(220,38,38,.25);}
  .submit{width:100%;background:var(--red);color:#fff;font-weight:700;padding:14px;border-radius:12px;transition:background .15s,opacity .15s;}
  .submit:hover{background:#b91c1c;} .submit:disabled{opacity:.5;cursor:not-allowed;}

  .mfst{background:#fff;width:100%;max-width:900px;border-radius:18px;overflow:hidden;display:flex;flex-direction:column;max-height:90vh;box-shadow:0 30px 80px rgba(0,0,0,.35);animation:zoom .25s cubic-bezier(.2,.7,.3,1) both;}
  .mfst .hd{background:var(--graphite);color:#fff;padding:20px;display:flex;justify-content:space-between;align-items:center;}
  .mfst .hd .lft{display:flex;align-items:center;gap:16px;}
  .mfst .hd .ic{background:var(--yellow);color:var(--ink);padding:8px;border-radius:10px;}
  .mfst .hd h2{margin:0;font-size:20px;font-family:'Archivo',sans-serif;}
  .mfst .hd p{margin:2px 0 0;color:var(--muted2);font-size:14px;}
  .mfst .hd button{color:#fff;padding:8px;border-radius:10px;} .mfst .hd button:hover{background:var(--steel);}
  .mfst .scr{overflow-y:auto;}
  .mfst table th{position:sticky;top:0;box-shadow:0 1px 0 var(--line);}
  .mfst .ft{background:#F7F9FB;border-top:1px solid var(--line);padding:16px;display:flex;justify-content:space-between;align-items:center;}
  .mfst .ft .t{font-size:14px;font-weight:700;color:var(--slate);}
  .mfst .ft button{background:var(--ink);color:#fff;font-weight:700;padding:8px 24px;border-radius:9px;} .mfst .ft button:hover{background:var(--graphite);}
  .boarded{background:#d1fae5;color:#065f46;border:1px solid var(--emerc);}
  .await{background:#f1f5f9;color:#475569;border:1px solid #e2e8f0;}

  .scan{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;animation:fade .25s ease both;}
  .scan .close{position:absolute;top:24px;right:24px;color:#fff;padding:8px;}
  .scan .lead{color:#fff;text-align:center;margin-bottom:32px;}
  .scan .lead svg{color:var(--yellow);margin-bottom:16px;}
  .scan .lead h2{margin:0;font-size:20px;font-family:'Archivo',sans-serif;}
  .scan .lead p{margin:8px 0 0;color:var(--muted2);font-size:14px;}
  .frame{width:256px;height:256px;border:2px solid var(--yellow);border-radius:18px;position:relative;overflow:hidden;margin-bottom:32px;}
  .frame .line{position:absolute;left:0;width:100%;height:2px;background:var(--yellow);box-shadow:0 0 10px rgba(236,194,57,.9);animation:scan 2.4s ease-in-out infinite;}
  .scan .go{background:var(--yellow);color:var(--ink);font-weight:700;padding:12px 32px;border-radius:99px;} .scan .go:hover{background:#f1ce5a;}

  /* INTRO — crane assembly reveal (real GSAP build) */
  #intro{position:fixed;inset:0;z-index:80;overflow:hidden;background:linear-gradient(to bottom,#eef1f4 0%,#e2e6ea 62%,#cdd3d9 100%);transition:opacity .6s ease;}
  #intro.gone{opacity:0;pointer-events:none;}
  #intro #scene{position:absolute;inset:0;}
  #craneSvg{position:absolute;inset:0;width:100%;height:100%;display:block;}
  #focus-overlay{position:absolute;inset:0;pointer-events:none;opacity:0;background:radial-gradient(circle at 68% 42%, rgba(255,255,255,0) 0%, rgba(42,47,54,.16) 100%);}
  #skipIntro{position:fixed;right:22px;top:20px;z-index:82;display:inline-flex;align-items:center;gap:8px;background:transparent;color:#5a616b;border:1px solid rgba(200,150,0,.55);padding:9px 16px;border-radius:999px;font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:700;transition:background .2s,color .2s;}
  #skipIntro:hover{color:#14181d;background:var(--yellow);border-color:var(--yellow);}
  #enterApp{position:fixed;right:22px;bottom:20px;z-index:83;display:inline-flex;align-items:center;gap:9px;background:var(--yellow);color:var(--ink);border:1px solid var(--yellow-6);padding:11px 22px;border-radius:999px;font-size:12px;letter-spacing:.14em;text-transform:uppercase;font-weight:800;opacity:0;transform:translateY(8px);pointer-events:none;transition:opacity .5s,transform .5s,filter .15s;box-shadow:0 8px 24px rgba(214,168,28,.35);}
  #enterApp.show{opacity:1;transform:none;pointer-events:auto;}
  #enterApp:hover{filter:brightness(1.05);}
  #enterApp svg{width:15px;height:15px;}

  @keyframes fade{from{opacity:0;}to{opacity:1;}}
  @keyframes slideUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  @keyframes zoom{from{opacity:0;transform:scale(.96);}to{opacity:1;transform:scale(1);}}
  @keyframes scan{0%,100%{top:6%;opacity:0;}12%,88%{opacity:1;}50%{top:92%;}}
  @keyframes ping{75%,100%{transform:scale(2);opacity:0;}}
  @keyframes routeflow{to{stroke-dashoffset:-32;}}
  @keyframes halo{0%{transform:scale(.7);opacity:.5;}70%{transform:scale(1.9);opacity:0;}100%{opacity:0;}}
  @keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-2px);}}
  .rflow{animation:routeflow 1.4s linear infinite;}
  .vhalo{transform-box:fill-box;transform-origin:center;animation:halo 2.6s ease-out infinite;}
  .vbob{animation:bob 3.5s ease-in-out infinite;}
  @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none !important;transition:opacity .3s ease !important;}}
</style>
</head>
<body>

function byCrane(){return state.cranes.length===0?state.items:state.items.filter(function(i){return state.cranes.indexOf(i.crane)>-1;});}
function computeStats(){
  var s={total:0,pending:0,onsite:0,shipped:0,offloaded:0,issues:0,damaged:0,missing:0,tonnages:{'MV Atlas':0,'MV Meridian':0}},loadedKg=0,pick=[],load=[];
  byCrane().forEach(function(it){
    s.total++;
    if(it.status==='PENDING')s.pending++;
    if(it.status==='ONSITE')s.onsite++;
    if(it.status==='SHIPPED'){s.shipped++;loadedKg+=it.w*it.qty;}
    if(it.status==='OFFLOADED')s.offloaded++;
    if(it.status==='SHIPPED'||it.status==='OFFLOADED'){if(s.tonnages[it.vessel]!==undefined)s.tonnages[it.vessel]+=it.w*it.qty;}
    if(it.issue){s.issues++;if(it.issue.type==='Damaged')s.damaged++;if(it.issue.type==='Missing')s.missing++;}
    if(it.history.onsite&&it.history.pending)pick.push((new Date(it.history.onsite)-new Date(it.history.pending))/3600e3);
    if(it.history.shipped&&it.history.onsite)load.push((new Date(it.history.shipped)-new Date(it.history.onsite))/3600e3);
  });
  var avg=function(a){return a.length?(a.reduce(function(x,y){return x+y;},0)/a.length).toFixed(1):'0.0';};
  s.loadedTonnes=(loadedKg/1000).toFixed(1);s.avgPick=avg(pick);s.avgLoad=avg(load);
  return s;
}

}
function modalsHTML(s){
  var out='';
  if(state.issueFor){
    out+='<div class="overlay bottom" data-action="close-issue" data-bg="1"><div class="sheet"><div class="hd"><h2>'+ic('octagon',20)+' Report an issue</h2><button data-action="close-issue">'+ic('x',24)+'</button></div>'
      +'<div class="bd"><p>Flagging this item notifies the office dashboard straight away.</p>'
      +'<div><label class="lbl">Issue type</label><div class="itypes"><button class="itype'+(state.issueType==='Damaged'?' sel':'')+'" data-type="Damaged" data-action="issue-type">Damaged</button><button class="itype'+(state.issueType==='Missing'?' sel':'')+'" data-type="Missing" data-action="issue-type">Missing</button></div></div>'
      +'<div><label class="lbl">Details</label><textarea id="issue-notes" rows="3" placeholder="e.g. pallet dropped, casing shattered">'+esc(state.issueNotes)+'</textarea></div>'
      +'<button class="submit" id="submit-issue" data-action="submit-issue"'+(state.issueNotes.trim()?'':' disabled')+'>Submit report</button></div></div></div>';
  }
  if(state.vessel){
    var v=VESSELS[state.vessel];
    var rows=state.items.filter(function(i){return i.vessel===state.vessel;}).map(function(it){
      var boarded=it.status==='SHIPPED'||it.status==='OFFLOADED',w=it.w*it.qty;
      return '<tr'+(boarded?' style="background:rgba(236,253,245,.4)"':'')+'><td><div class="cmp">'+esc(it.description)+'</div><div class="cmp-s tnum">No. '+it.itemNo+'</div></td>'
        +'<td class="tnum"><div style="font-weight:600">Qty '+it.qty+'</div><div class="cmp-s">'+fmtW(w)+'</div></td>'
        +'<td style="color:var(--slate);font-weight:600">'+it.crane+'</td>'
        +'<td>'+(boarded?'<span class="status boarded">'+ic('check',14)+' Boarded</span>':'<span class="status await">'+ic('clock',14)+' Awaiting load</span>')+'</td></tr>';
    }).join('');
    out+='<div class="overlay center" data-action="close-vessel" data-bg="1"><div class="mfst"><div class="hd"><div class="lft"><div class="ic">'+ic('ship',24)+'</div><div><h2>'+state.vessel+' manifest</h2><p>'+v.from+' to '+v.to+' &bull; '+v.eta+'</p></div></div><button data-action="close-vessel">'+ic('x',24)+'</button></div>'
      +'<div class="scr"><table><thead><tr><th>Item</th><th>Qty &amp; weight</th><th>Crane</th><th>Boarding</th></tr></thead><tbody>'+rows+'</tbody></table></div>'
      +'<div class="ft"><span class="t tnum">Loaded tonnage: '+(s.tonnages[state.vessel]/1000).toFixed(1)+'t</span><button data-action="close-vessel">Close</button></div></div></div>';
  }
  if(state.scanning){
    out+='<div class="scan"><button class="close" data-action="close-scan">'+ic('x',32)+'</button><div class="lead">'+ic('camera',48)+'<h2>Scanner active</h2><p>Position the barcode or QR tag within the frame</p></div>'
      +'<div class="frame"><div class="line"></div></div><button class="go" data-action="run-scan">'+(state.view==='SEA'?'Simulate scan (main beam)':'Simulate scan (seaside legs)')+'</button></div>';
  }
  return out;
}
var root=document.getElementById('root');
function viewHTML(s){if(state.view==='DASHBOARD')return dashboardHTML(s);if(state.view==='PACKING')return packingHTML(s);return seaHTML(s);}
function render(){var s=computeStats();root.innerHTML=navHTML()+'<main class="wrap">'+viewHTML(s)+'</main>'+modalsHTML(s);document.body.style.overflow=state.mapBig?'hidden':'';bindInputs();}
function renderResults(){if(state.view==='DASHBOARD'){var tb=document.getElementById('roster-body');if(tb)tb.innerHTML=rosterRows();}else{var fl=document.getElementById('field-list');if(fl)fl.innerHTML=fieldListHTML();}}
function bindInputs(){
  var sb=document.getElementById('search');
  if(sb)sb.addEventListener('input',function(e){state.q=e.target.value;renderResults();});
  var ta=document.getElementById('issue-notes');
  if(ta)ta.addEventListener('input',function(e){state.issueNotes=e.target.value;var btn=document.getElementById('submit-issue');if(btn)btn.disabled=!state.issueNotes.trim();});
}
function advance(id){
  state.items=state.items.map(function(it){
    if(it.id!==id)return it;var next=STATUSES[it.status].next;if(!next)return it;
    var h=Object.assign({},it.history);h[next.toLowerCase()]=new Date().toISOString();
    return Object.assign({},it,{status:next,history:h});
  });
  render();
}
document.addEventListener('click',function(e){
  var el=e.target.closest?e.target.closest('[data-action]'):null;if(!el)return;
  var a=el.getAttribute('data-action'),d=el.dataset;
  switch(a){
    case 'set-view':state.view=d.view;state.q='';render();break;
    case 'toggle-map':state.mapBig=!state.mapBig;render();break;
    case 'toggle-vessels':state.showVessels=!state.showVessels;render();break;
    case 'advance':advance(d.id);break;
    case 'report':state.issueFor=d.id;state.issueType='Damaged';state.issueNotes='';render();break;
    case 'close-issue':if(d.bg&&el!==e.target)return;state.issueFor=null;render();break;
    case 'issue-type':state.issueType=d.type;document.querySelectorAll('.itype').forEach(function(b){b.classList.toggle('sel',b.dataset.type===state.issueType);});break;
    case 'submit-issue':state.items=state.items.map(function(it){return it.id===state.issueFor?Object.assign({},it,{issue:{type:state.issueType,notes:state.issueNotes}}):it;});state.issueFor=null;render();break;
    case 'toggle-crane':var c=d.crane,i=state.cranes.indexOf(c);if(i>-1)state.cranes.splice(i,1);else state.cranes.push(c);render();break;
    case 'all-cranes':state.cranes=[];render();break;
    case 'open-vessel':state.vessel=d.vessel;render();break;
    case 'close-vessel':if(d.bg&&el!==e.target)return;state.vessel=null;render();break;
    case 'open-scan':state.scanning=true;render();break;
    case 'close-scan':state.scanning=false;render();break;
    case 'run-scan':state.q=state.view==='SEA'?'beam':'legs';state.scanning=false;render();break;
  }
});
document.addEventListener('keydown',function(e){
  if(e.key!=='Enter'&&e.key!==' ')return;
  var el=e.target.closest?e.target.closest('[data-action="open-vessel"]'):null;
  if(el){e.preventDefault();state.vessel=el.dataset.vessel;render();}
});
render();

/* Intro crane reveal (real GSAP timeline) */
function runIntro(){
  var intro=document.getElementById('intro');var svg=document.getElementById('craneSvg');
  if(!intro||!svg)return;
  var reduce=false; try{reduce=!!(window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches);}catch(e){}
  function frame(){svg.setAttribute('viewBox','80 30 1120 710');}
  frame();window.addEventListener('resize',frame);
  var done=false;
  function enter(){if(done)return;done=true;intro.classList.add('gone');setTimeout(function(){if(intro.parentNode)intro.parentNode.removeChild(intro);},700);}
  var enterBtn=document.getElementById('enterApp');
  var skip=document.getElementById('skipIntro');
  if(skip)skip.addEventListener('click',function(e){e.stopPropagation();enter();});
  if(enterBtn)enterBtn.addEventListener('click',function(e){e.stopPropagation();enter();});
  function reveal(){if(enterBtn)enterBtn.classList.add('show');}
  var PARTS=["#p-rails","#p-bogies","#p-legs","#p-brace","#p-portal","#p-house","#p-apex","#p-stays","#p-boom","#p-backreach"];
  function showEnd(){
    if(typeof gsap!=='undefined'){try{
      gsap.set(PARTS,{opacity:1,y:0});
      gsap.set("#p-trolley",{opacity:1,x:820,y:226});
      gsap.set("#spreader",{y:80});gsap.set(["#ropeL","#ropeR"],{attr:{y2:80}});
      gsap.set("#hoistContainer",{opacity:1});gsap.set("#quayContainer",{opacity:0});
      gsap.set("#groundShadow",{opacity:0.14});
      gsap.set(["#focus-overlay","#caption"],{opacity:1});gsap.set("#capRule",{scaleX:1});
    }catch(e){}}
    reveal();
  }
  if(typeof gsap==='undefined'){reveal();return;}
  gsap.config({nullTargetWarn:false});
  function initState(){
    gsap.set(PARTS,{opacity:0,y:34});
    gsap.set("#p-trolley",{opacity:0,x:620,y:233});
    gsap.set("#spreader",{y:34});
    gsap.set(["#ropeL","#ropeR"],{attr:{y2:34}});
    gsap.set("#hoistContainer",{opacity:0});
    gsap.set("#quayContainer",{opacity:0});
    gsap.set("#groundShadow",{opacity:0});
    gsap.set(["#caption","#focus-overlay"],{opacity:0});
    gsap.set("#capRule",{scaleX:0,transformOrigin:"50% 50%"});
  }
  if(reduce){initState();showEnd();return;}
  var tl;
  try{
    initState();
    tl=gsap.timeline();
    tl.to("#groundShadow",{opacity:0.14,duration:0.5,ease:"power1.out"},0.1);
    var t=0.15;
    PARTS.forEach(function(p){tl.to(p,{opacity:1,y:0,duration:0.45,ease:"power3.out"},t);t+=0.08;});
    tl.to("#p-trolley",{opacity:1,duration:0.4,ease:"power2.out"},t);
    tl.to("#quayContainer",{opacity:1,duration:0.4,ease:"power2.out"},t-0.2);
    var OUT_START=t+0.2;
    tl.to("#p-trolley",{x:980,y:220,duration:0.7,ease:"power2.inOut"},OUT_START);
    var LOWER_START=OUT_START+0.7;
    tl.to("#spreader",{y:308,duration:0.9,ease:"power2.inOut"},LOWER_START).to(["#ropeL","#ropeR"],{attr:{y2:308},duration:0.9,ease:"power2.inOut"},LOWER_START);
    var LOCK_START=LOWER_START+0.9;
    tl.to("#spreader",{y:"+=3",duration:0.06,yoyo:true,repeat:1},LOCK_START).to("#quayContainer",{opacity:0,duration:0.06},LOCK_START+0.05).to("#hoistContainer",{opacity:1,duration:0.06},LOCK_START+0.05);
    var HOIST_START=LOCK_START+0.1;
    tl.to("#spreader",{y:80,duration:0.6,ease:"power2.out"},HOIST_START).to(["#ropeL","#ropeR"],{attr:{y2:80},duration:0.6,ease:"power2.out"},HOIST_START);
    var RETURN_START=HOIST_START+0.6;
    tl.to("#p-trolley",{x:820,y:226,duration:0.7,ease:"power1.inOut"},RETURN_START);
    var FINISH_START=RETURN_START+0.5;
    tl.to("#focus-overlay",{opacity:1,duration:0.8,ease:"power2.inOut"},FINISH_START);
    tl.to("#caption",{opacity:1,y:0,duration:0.5,ease:"power3.out"},FINISH_START+0.2).to("#capRule",{scaleX:1,duration:0.4,ease:"power2.out"},FINISH_START+0.3);
    tl.call(reveal,null,FINISH_START+0.6);
  }catch(e){showEnd();return;}
  // Safety: if the animation ticker never advances (throttled/paused frame), show the assembled crane anyway
  setTimeout(function(){ if(!done && (!tl || tl.progress()<0.02)){ try{if(tl)tl.pause();}catch(e){} showEnd(); } },1500);
  // Absolute fallback so the Enter button is always reachable
  setTimeout(function(){ if(!done) reveal(); },8000);
}
if(EMBED){var _i=document.getElementById('intro');if(_i&&_i.parentNode)_i.parentNode.removeChild(_i);}
else{runIntro();}
</script>
