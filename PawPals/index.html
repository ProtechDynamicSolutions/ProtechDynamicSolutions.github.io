<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawPals™ | Premium Doggy Day Care & Grooming</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Import Map for React and Lucide Icons -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.292.0"
        }
    }
    </script>

    <!-- Google Fonts: Poppins for a premium feel -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Babel for JSX transformation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#faf5ff',
                            100: '#f3e8ff',
                            200: '#e9d5ff',
                            300: '#d8b4fe',
                            400: '#c084fc',
                            500: '#a855f7',
                            600: '#9333ea',
                            700: '#7e22ce',
                            800: '#6b21a8',
                            900: '#581c87',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Base Styles */
        body {
            background-color: #faf5ff;
            color: #581c87;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Custom Animations */
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.05); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob {
            animation: blob 15s infinite alternate ease-in-out;
            will-change: transform; /* Performance fix for glitchy rendering */
        }
        
        @keyframes popIn {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .animate-pop-in {
            animation: popIn 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            opacity: 0;
            will-change: transform, opacity;
        }

        /* Premium Glassmorphism Classes */
        .glass-panel {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 4px 30px rgba(107, 33, 168, 0.05);
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-top: 1px solid rgba(255, 255, 255, 0.9);
            border-left: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 10px 40px 0 rgba(107, 33, 168, 0.06);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .glass-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 15px 50px 0 rgba(168, 85, 247, 0.12);
            background: rgba(255, 255, 255, 0.65);
        }

        /* Typography */
        .heading-gradient {
            background: linear-gradient(135deg, #581c87, #9333ea, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .text-glow {
            text-shadow: 0 0 30px rgba(168, 85, 247, 0.2);
        }
        
        /* Smooth Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #faf5ff; }
        ::-webkit-scrollbar-thumb { background: #d8b4fe; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a855f7; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
            PawPrint, Star, Heart, Calendar, Sun, Scissors, 
            GraduationCap, ArrowRight, CheckCircle2, Check, Clock, ShieldCheck,
            Moon, Zap, Compass, Users, Sparkles, RefreshCcw, Loader2, CheckCircle,
            User, Mail, Phone, MessageSquare, Send
        } from 'lucide-react';

        // --- Core Components ---

        const AnimatedSplash = ({ color, className, delay = 0 }) => (
            <div 
                className={`absolute rounded-full opacity-40 animate-blob ${className}`}
                style={{ 
                    backgroundColor: color,
                    animationDelay: `${delay}s`,
                    filter: 'blur(60px)' /* Slightly reduced blur for better performance */
                }}
            />
        );

        const FadeInSection = ({ children, delay = 0, className = "" }) => {
            const [isVisible, setIsVisible] = useState(false);
            const domRef = useRef();

            useEffect(() => {
                const observer = new IntersectionObserver(entries => {
                    entries.forEach(entry => {
                        if(entry.isIntersecting) setIsVisible(true);
                    });
                }, { threshold: 0.1, rootMargin: "0px 0px -50px 0px" });
                if (domRef.current) observer.observe(domRef.current);
                return () => observer.disconnect();
            }, []);

            return (
                <div
                    ref={domRef}
                    className={`transition-all duration-700 ease-out transform ${isVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-8'} ${className}`}
                    style={{ transitionDelay: `${delay}ms` }}
                >
                    {children}
                </div>
            );
        };

        // --- Feature Sections ---

        const GroupAssessorSection = () => {
            const [energy, setEnergy] = useState(null); 
            const [social, setSocial] = useState(null);
            const [step, setStep] = useState(1);
            const [isAnalyzing, setIsAnalyzing] = useState(false);

            const getPack = () => {
                if (energy === 'chill' || social === 'shy') return { name: "The Zen Lounge", desc: "A calm, gentle environment perfect for snoozing and quiet snuggles.", icon: Moon, gradient: "from-brand-500 to-brand-700" };
                if (energy === 'high' && social === 'bouncy') return { name: "The Action Yard", desc: "High-energy fun, agility, and non-stop wrestling with best mates!", icon: Zap, gradient: "from-orange-400 to-orange-600" };
                return { name: "The Explorer Club", desc: "Balanced play, moderate activities, and plenty of tail-wagging social time.", icon: Compass, gradient: "from-pink-400 to-pink-600" };
            };

            const handleEnergy = (id) => {
                setEnergy(id);
                setTimeout(() => setStep(2), 350);
            };

            const handleSocial = (id) => {
                setSocial(id);
                setStep(3);
                setIsAnalyzing(true);
                setTimeout(() => setIsAnalyzing(false), 1500);
            };

            const resetAssessor = () => {
                setEnergy(null);
                setSocial(null);
                setStep(1);
            };

            const pack = getPack();

            return (
                <div className="py-24 relative overflow-hidden">
                    {/* Background Glow */}
                    <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-brand-200/40 rounded-full blur-[80px] -z-10"></div>
                    
                    <div className="max-w-7xl mx-auto px-4 md:px-6 grid lg:grid-cols-2 gap-12 items-center">
                        
                        {/* Left Side: Copy & Progress Indicator */}
                        <div className="order-2 lg:order-1">
                            <div className="inline-block px-4 py-1.5 rounded-full bg-white/60 backdrop-blur-md border border-white/60 text-brand-700 font-semibold text-xs uppercase tracking-widest mb-6 shadow-sm">
                                Bespoke Matching
                            </div>
                            <h2 className="text-4xl md:text-5xl lg:text-6xl font-extrabold heading-gradient mb-6 leading-tight">
                                Find Their <br/>Perfect Pack
                            </h2>
                            <p className="text-lg text-brand-800/80 mb-10 font-medium max-w-md">
                                Our expert team tailors every dog's experience. Tell us a bit about your furry friend to reveal their ideal day care lounge.
                            </p>
                            
                            {/* Premium Progress Tracker */}
                            <div className="space-y-4 max-w-xs">
                                {/* Step 1 */}
                                <div className={`flex items-center gap-4 transition-all duration-500 ${step >= 1 ? 'opacity-100' : 'opacity-40'}`}>
                                    <div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold text-sm transition-all duration-500 ${step > 1 ? 'bg-brand-500 text-white shadow-md' : step === 1 ? 'bg-white border border-brand-300 text-brand-600 shadow-lg scale-110' : 'bg-white/40 text-brand-400 border border-brand-200/50'}`}>
                                        {step > 1 ? <Check size={18} strokeWidth={2} /> : '1'}
                                    </div>
                                    <span className={`font-semibold text-lg transition-colors ${step >= 1 ? 'text-brand-900' : 'text-brand-700/50'}`}>Energy Level</span>
                                </div>
                                {/* Line */}
                                <div className={`w-0.5 h-8 ml-5 rounded-full transition-all duration-500 ${step > 1 ? 'bg-brand-500' : 'bg-brand-200/40'}`}></div>
                                
                                {/* Step 2 */}
                                <div className={`flex items-center gap-4 transition-all duration-500 ${step >= 2 ? 'opacity-100' : 'opacity-40'}`}>
                                    <div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold text-sm transition-all duration-500 ${step > 2 ? 'bg-brand-500 text-white shadow-md' : step === 2 ? 'bg-white border border-brand-300 text-brand-600 shadow-lg scale-110' : 'bg-white/40 text-brand-400 border border-brand-200/50'}`}>
                                        {step > 2 ? <Check size={18} strokeWidth={2} /> : '2'}
                                    </div>
                                    <span className={`font-semibold text-lg transition-colors ${step >= 2 ? 'text-brand-900' : 'text-brand-700/50'}`}>Social Style</span>
                                </div>
                                {/* Line */}
                                <div className={`w-0.5 h-8 ml-5 rounded-full transition-all duration-500 ${step > 2 ? 'bg-brand-500' : 'bg-brand-200/40'}`}></div>
                                
                                {/* Step 3 */}
                                <div className={`flex items-center gap-4 transition-all duration-500 ${step >= 3 ? 'opacity-100' : 'opacity-40'}`}>
                                    <div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold text-sm transition-all duration-500 ${step === 3 && !isAnalyzing ? 'bg-gradient-to-br from-brand-400 to-brand-600 text-white shadow-lg scale-110' : 'bg-white/40 text-brand-400 border border-brand-200/50'}`}>
                                        <Sparkles size={18} strokeWidth={1.5} />
                                    </div>
                                    <span className={`font-semibold text-lg transition-colors ${step === 3 ? 'text-brand-900' : 'text-brand-700/50'}`}>Perfect Match</span>
                                </div>
                            </div>
                        </div>

                        {/* Right Side: Interactive Sliding Wizard */}
                        <div className="order-1 lg:order-2 relative h-[520px] md:h-[550px] w-full">
                            <div className="glass-card absolute inset-0 rounded-[3rem] p-6 md:p-10 overflow-hidden shadow-2xl border-white/60 flex flex-col justify-center">
                                
                                {/* Step 1: Energy */}
                                <div className={`absolute inset-0 p-6 md:p-10 flex flex-col justify-center transition-all duration-700 ease-in-out ${step === 1 ? 'opacity-100 translate-x-0 pointer-events-auto' : 'opacity-0 -translate-x-full pointer-events-none'}`}>
                                    <h3 className="text-2xl md:text-3xl font-bold text-brand-900 mb-8 text-center flex flex-col items-center gap-3">
                                        <span className="p-3 bg-gradient-to-br from-brand-100 to-brand-200/50 text-brand-600 rounded-2xl shadow-sm border border-white"><Sun size={28} strokeWidth={1.5} /></span>
                                        What is their ideal day?
                                    </h3>
                                    <div className="grid grid-cols-1 gap-4 w-full max-w-sm mx-auto">
                                        {[
                                            { id: 'chill', label: 'Snooze & Cuddle', desc: 'Loves a quiet, relaxing environment.', icon: Moon },
                                            { id: 'moderate', label: 'Sniff & Explore', desc: 'Enjoys steady, balanced activities.', icon: Compass },
                                            { id: 'high', label: 'Non-stop Play', desc: 'Boundless energy and agility.', icon: Zap }
                                        ].map(opt => (
                                            <button 
                                                key={opt.id}
                                                onClick={() => handleEnergy(opt.id)}
                                                className={`p-4 md:p-5 rounded-2xl flex items-center gap-4 transition-all duration-300 border text-left group hover:-translate-y-1 ${energy === opt.id ? 'bg-gradient-to-r from-brand-500 to-brand-600 text-white shadow-xl border-transparent' : 'bg-white/70 text-brand-900 border-white hover:bg-white shadow-sm'}`}
                                            >
                                                <div className={`p-3 rounded-xl transition-colors shadow-sm ${energy === opt.id ? 'bg-white/20 text-white' : 'bg-brand-50 text-brand-600 group-hover:bg-brand-100'}`}>
                                                    <opt.icon size={24} strokeWidth={1.5} />
                                                </div>
                                                <div>
                                                    <span className="font-semibold text-lg block">{opt.label}</span>
                                                    <span className={`text-xs md:text-sm font-medium ${energy === opt.id ? 'text-brand-100' : 'text-brand-700/70'}`}>{opt.desc}</span>
                                                </div>
                                                <ArrowRight size={20} strokeWidth={1.5} className={`ml-auto transition-all ${energy === opt.id ? 'translate-x-1 opacity-100' : 'opacity-0 -translate-x-4 group-hover:opacity-50 group-hover:translate-x-0'}`} />
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                {/* Step 2: Social */}
                                <div className={`absolute inset-0 p-6 md:p-10 flex flex-col justify-center transition-all duration-700 ease-in-out ${step === 2 ? 'opacity-100 translate-x-0 pointer-events-auto' : step < 2 ? 'opacity-0 translate-x-full pointer-events-none' : 'opacity-0 -translate-x-full pointer-events-none'}`}>
                                    <button onClick={() => setStep(1)} className="absolute top-6 left-6 text-brand-500 hover:text-brand-700 font-medium text-sm flex items-center gap-1 transition-colors px-3 py-1.5 rounded-full bg-white/50 border border-white shadow-sm">
                                        ← Back
                                    </button>
                                    <h3 className="text-2xl md:text-3xl font-bold text-brand-900 mb-8 mt-4 text-center flex flex-col items-center gap-3">
                                        <span className="p-3 bg-gradient-to-br from-brand-100 to-brand-200/50 text-brand-600 rounded-2xl shadow-sm border border-white"><Users size={28} strokeWidth={1.5} /></span>
                                        How are they with dogs?
                                    </h3>
                                    <div className="grid grid-cols-1 gap-4 w-full max-w-sm mx-auto">
                                        {[
                                            { id: 'shy', label: 'Shy & Timid', desc: 'Prefers gentle, slow introductions.', icon: Heart },
                                            { id: 'friendly', label: 'Friendly & Calm', desc: 'Socialises well without overwhelming others.', icon: Users },
                                            { id: 'bouncy', label: 'Bouncy & Vocal', desc: 'Very playful, loud, and enthusiastic.', icon: Sparkles }
                                        ].map(opt => (
                                            <button 
                                                key={opt.id}
                                                onClick={() => handleSocial(opt.id)}
                                                className={`p-4 md:p-5 rounded-2xl flex items-center gap-4 transition-all duration-300 border text-left group hover:-translate-y-1 ${social === opt.id ? 'bg-gradient-to-r from-brand-500 to-brand-600 text-white shadow-xl border-transparent' : 'bg-white/70 text-brand-900 border-white hover:bg-white shadow-sm'}`}
                                            >
                                                <div className={`p-3 rounded-xl transition-colors shadow-sm ${social === opt.id ? 'bg-white/20 text-white' : 'bg-brand-50 text-brand-600 group-hover:bg-brand-100'}`}>
                                                    <opt.icon size={24} strokeWidth={1.5} />
                                                </div>
                                                <div>
                                                    <span className="font-semibold text-lg block">{opt.label}</span>
                                                    <span className={`text-xs md:text-sm font-medium ${social === opt.id ? 'text-brand-100' : 'text-brand-700/70'}`}>{opt.desc}</span>
                                                </div>
                                                <ArrowRight size={20} strokeWidth={1.5} className={`ml-auto transition-all ${social === opt.id ? 'translate-x-1 opacity-100' : 'opacity-0 -translate-x-4 group-hover:opacity-50 group-hover:translate-x-0'}`} />
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                {/* Step 3: Analyzing & Final Result */}
                                <div className={`absolute inset-0 p-6 md:p-10 flex flex-col justify-center transition-all duration-700 ease-in-out ${step === 3 ? 'opacity-100 translate-x-0 pointer-events-auto' : 'opacity-0 translate-x-full pointer-events-none'}`}>
                                    {isAnalyzing ? (
                                        <div className="flex flex-col items-center justify-center text-center space-y-6">
                                            <div className="relative">
                                                <div className="absolute inset-0 bg-brand-400 rounded-full blur-xl opacity-50 animate-pulse"></div>
                                                <Loader2 size={56} strokeWidth={1.5} className="text-brand-600 animate-spin relative z-10" />
                                            </div>
                                            <div>
                                                <h3 className="text-2xl font-bold text-brand-900 mb-2">Curating Experience...</h3>
                                                <p className="text-brand-700/80 font-medium">Analyzing personality profile</p>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="flex flex-col h-full justify-center animate-pop-in">
                                            <div className="text-center mb-6">
                                                <div className="inline-flex items-center justify-center w-14 h-14 rounded-full bg-brand-100/50 text-brand-600 mb-3 border border-white shadow-sm">
                                                    <CheckCircle size={28} strokeWidth={1.5} />
                                                </div>
                                                <h3 className="text-2xl font-bold text-brand-900">Perfect Match Found!</h3>
                                            </div>
                                            
                                            <div className={`p-8 rounded-[2rem] bg-gradient-to-br ${pack.gradient} text-white shadow-2xl relative overflow-hidden group transition-transform duration-500 hover:scale-[1.02]`}>
                                                <AnimatedSplash color="#ffffff" className="w-[200px] h-[200px] top-[-50px] right-[-50px] opacity-10 group-hover:scale-150 transition-transform duration-700" delay={0} />
                                                
                                                <div className="relative z-10 text-center">
                                                    <div className="inline-flex p-4 bg-white/20 rounded-2xl backdrop-blur-sm shadow-inner mb-4 border border-white/20">
                                                        <pack.icon size={40} strokeWidth={1.5} className="text-white drop-shadow-md" />
                                                    </div>
                                                    <h4 className="text-3xl font-bold mb-3 tracking-tight">{pack.name}</h4>
                                                    <p className="text-white/90 font-medium text-base md:text-lg leading-relaxed mb-8">
                                                        {pack.desc}
                                                    </p>
                                                    
                                                    <button className="w-full bg-white text-brand-900 font-semibold py-4 rounded-xl shadow-[0_0_20px_rgba(255,255,255,0.2)] hover:shadow-[0_0_30px_rgba(255,255,255,0.4)] hover:bg-brand-50 transition-all flex items-center justify-center gap-2">
                                                        Enrol in this Pack <ArrowRight size={20} strokeWidth={1.5} />
                                                    </button>
                                                </div>
                                            </div>

                                            <button onClick={resetAssessor} className="mt-6 text-brand-600 hover:text-brand-800 font-medium flex items-center justify-center gap-2 transition-colors mx-auto px-4 py-2 rounded-full hover:bg-white/50">
                                                <RefreshCcw size={16} strokeWidth={1.5} /> Retake Assessor
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const ReviewsSection = () => {
            const reviews = [
                { initials: "MH", name: "Meaghan Holden", date: "Jan 2026", text: "My dogs both get groomed here! They are fast, friendly and do a good job! Plus the dogs love it.", rating: 5 },
                { initials: "IM", name: "Immy Macintosh", date: "Dec 2025", text: "Impressed with how much my messy, grass seed covered little puppy turned into a super handsome little boy. 5 stars from our family! 🥰", rating: 5 },
                { initials: "EZ", name: "Emm Zedd", date: "Dec 2025", text: "Such lovely people, such great service and care. My little Cleo always sleeps so soundly after coming home from her pampering.", rating: 5 }
            ];

            return (
                <div className="py-24 relative z-10">
                    <div className="max-w-7xl mx-auto px-4 md:px-6">
                        <div className="flex flex-col md:flex-row justify-between items-end mb-16 gap-6">
                            <div className="max-w-2xl">
                                <div className="flex items-center gap-3 mb-4">
                                    <div className="flex bg-white/60 backdrop-blur-md px-3 py-1.5 rounded-full border border-white shadow-sm text-yellow-500">
                                        {[...Array(5)].map((_, i) => <Star key={i} size={16} strokeWidth={1.5} className="fill-yellow-500 text-yellow-500" />)}
                                    </div>
                                    <span className="text-xl font-bold text-brand-900">5.00 Average</span>
                                    <span className="text-brand-700/70 font-medium">(226 Reviews)</span>
                                </div>
                                <h2 className="text-4xl md:text-5xl font-extrabold heading-gradient mb-4">Loved by Parents & Pups</h2>
                            </div>
                            <button className="bg-white/70 hover:bg-white border border-white text-brand-800 px-8 py-3 rounded-full font-semibold shadow-sm transition-all hover:shadow-md backdrop-blur-md">
                                Write a Review
                            </button>
                        </div>

                        <div className="grid md:grid-cols-3 gap-8">
                            {reviews.map((rev, i) => (
                                <FadeInSection key={i} delay={i * 150} className="glass-card p-8 rounded-3xl flex flex-col h-full border-white/60">
                                    <div className="flex items-center justify-between mb-6">
                                        <div className="flex text-yellow-500 gap-1">
                                            {[...Array(rev.rating)].map((_, j) => <Star key={j} size={16} strokeWidth={1.5} className="fill-yellow-500 text-yellow-500" />)}
                                        </div>
                                        <span className="text-xs font-semibold tracking-wider text-brand-500 uppercase">{rev.date}</span>
                                    </div>
                                    <p className="text-brand-900 font-medium text-lg leading-relaxed italic mb-8 flex-grow">"{rev.text}"</p>
                                    <div className="flex items-center gap-4 pt-6 border-t border-brand-200/40">
                                        <div className="w-12 h-12 rounded-full bg-gradient-to-br from-white to-brand-100 text-brand-800 flex items-center justify-center font-bold shadow-sm text-lg border border-white">
                                            {rev.initials}
                                        </div>
                                        <h5 className="font-semibold text-brand-900">{rev.name}</h5>
                                    </div>
                                </FadeInSection>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        const ContactFormSection = () => {
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [isSubmitted, setIsSubmitted] = useState(false);

            const handleSubmit = (e) => {
                e.preventDefault();
                setIsSubmitting(true);
                // Simulate network request
                setTimeout(() => {
                    setIsSubmitting(false);
                    setIsSubmitted(true);
                    // Reset form state after a few seconds
                    setTimeout(() => setIsSubmitted(false), 5000);
                }, 1500);
            };

            return (
                <div className="py-24 relative z-10" id="contact">
                    <div className="max-w-7xl mx-auto px-4 md:px-6">
                        <div className="glass-card rounded-[3rem] p-8 md:p-12 lg:p-16 border-white/60 relative overflow-hidden shadow-2xl">
                            {/* Decorative background blurs inside the card */}
                            <AnimatedSplash color="#d8b4fe" className="w-[300px] h-[300px] top-[-100px] right-[-100px] opacity-30" />
                            <AnimatedSplash color="#fbcfe8" className="w-[300px] h-[300px] bottom-[-100px] left-[-100px] opacity-30" />
                            
                            <div className="grid lg:grid-cols-5 gap-12 lg:gap-20 relative z-10 items-center">
                                
                                {/* Left Side: Copy */}
                                <div className="lg:col-span-2 space-y-8">
                                    <div>
                                        <div className="inline-block px-4 py-1.5 rounded-full bg-white/60 backdrop-blur-md border border-white/60 text-brand-700 font-semibold text-xs uppercase tracking-widest mb-6 shadow-sm">
                                            Get In Touch
                                        </div>
