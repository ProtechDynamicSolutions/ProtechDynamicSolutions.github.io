
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Multimodal Live API Test</title>
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Load React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Load Babel for JSX transpilation in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Inline SVG Icons (replacing lucide-react) ---
        const Activity = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
            </svg>
        );
        const Plug = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M12 22v-5"/><path d="M9 8V2"/><path d="M15 8V2"/><path d="M18 8v5a4 4 0 0 1-4 4h-4a4 4 0 0 1-4-4V8Z"/>
            </svg>
        );
        const Mic = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/>
            </svg>
        );
        const MicOff = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <line x1="2" y1="2" x2="22" y2="22"/><path d="M18.89 13.23A7.12 7.12 0 0 0 19 12v-2"/><path d="M5 10v2a7 7 0 0 0 12 5"/><path d="M15 9.34V5a3 3 0 0 0-5.68-1.33"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12"/><line x1="12" x2="12" y1="19" y2="22"/>
            </svg>
        );
        const PowerOff = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" x2="12" y1="2" y2="12"/>
            </svg>
        );

        function App() {
            const [apiKey, setApiKey] = useState('');
            const [isConnected, setIsConnected] = useState(false);
            const [isMicActive, setIsMicActive] = useState(false);
            const [logs, setLogs] = useState([]);
            const [error, setError] = useState('');

            const wsRef = useRef(null);
            const audioCtxRef = useRef(null);
            const streamRef = useRef(null);
            const processorRef = useRef(null);
            const nextPlayTimeRef = useRef(0);
            const activeSourcesRef = useRef([]);

            const addLog = (msg, type = 'info') => {
                setLogs((prev) => [...prev, { time: new Date().toLocaleTimeString(), msg, type }]);
            };

            const floatTo16BitPCM = (input) => {
                const output = new Int16Array(input.length);
                for (let i = 0; i < input.length; i++) {
                    const s = Math.max(-1, Math.min(1, input[i]));
                    output[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                }
                return output;
            };

            const arrayBufferToBase64 = (buffer) => {
                let binary = '';
                const bytes = new Uint8Array(buffer);
                for (let i = 0; i < bytes.byteLength; i++) {
                    binary += String.fromCharCode(bytes[i]);
                }
                return window.btoa(binary);
            };

            const base64ToFloat32Array = (base64) => {
                const binary = window.atob(base64);
                const bytes = new Uint8Array(binary.length);
                for (let i = 0; i < binary.length; i++) {
                    bytes[i] = binary.charCodeAt(i);
                }
                const int16Array = new Int16Array(bytes.buffer);
                const float32Array = new Float32Array(int16Array.length);
                for (let i = 0; i < int16Array.length; i++) {
                    const s = int16Array[i];
                    float32Array[i] = s < 0 ? s / 0x8000 : s / 0x7FFF;
                }
                return float32Array;
            };

            const stopAudioPlayback = () => {
                activeSourcesRef.current.forEach(source => {
                    try { source.stop(); } catch (e) {}
                });
                activeSourcesRef.current = [];
                if (audioCtxRef.current) {
                    nextPlayTimeRef.current = audioCtxRef.current.currentTime;
                }
            };

            const playAudioChunk = (base64Str) => {
                if (!audioCtxRef.current) return;

                try {
                    const float32Data = base64ToFloat32Array(base64Str);
                    const buffer = audioCtxRef.current.createBuffer(1, float32Data.length, 16000);
                    buffer.getChannelData(0).set(float32Data);

                    const source = audioCtxRef.current.createBufferSource();
                    source.buffer = buffer;
                    source.connect(audioCtxRef.current.destination);

                    const currentTime = audioCtxRef.current.currentTime;
                    if (nextPlayTimeRef.current < currentTime) {
                        nextPlayTimeRef.current = currentTime;
                    }

                    source.start(nextPlayTimeRef.current);
                    nextPlayTimeRef.current += buffer.duration;
                    activeSourcesRef.current.push(source);
                    
                    source.onended = () => {
                        activeSourcesRef.current = activeSourcesRef.current.filter(s => s !== source);
                    };
                } catch (err) {
                    console.error("Error playing audio chunk:", err);
                }
            };

            const connect = async () => {
                if (!apiKey) {
                    setError('Please provide an API key first.');
                    return;
                }
                setError('');
                addLog('Requesting microphone access...', 'info');

                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        audio: { sampleRate: 16000, channelCount: 1 }
                    });
                    streamRef.current = stream;

                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                    audioCtxRef.current = audioCtx;
                    nextPlayTimeRef.current = audioCtx.currentTime;

                    const wsUrl = `wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1beta.GenerativeService.BidiGenerateContent?key=${apiKey}`;
                    const ws = new WebSocket(wsUrl);
                    wsRef.current = ws;

                    ws.onopen = () => {
                        setIsConnected(true);
                        addLog('WebSocket connected successfully.', 'success');
                        
                        const setupMessage = {
                            setup: {
                                model: 'models/gemini-3.1-flash-live-preview',
                                generationConfig: {
                                    responseModalities: ["TEXT","AUDIO"]
                                }
                            }
                        };
                        ws.send(JSON.stringify(setupMessage));
                        addLog('Sent setup configuration to model.', 'info');
                    };

                    ws.onmessage = (event) => {
                        try {
                            const data = JSON.parse(event.data);
                            
                            if (data.serverContent) {
                                if (data.serverContent.interrupted) {
                                    addLog('AI Interrupted by user speech.', 'warning');
                                    stopAudioPlayback();
                                }

                                const parts = data.serverContent.modelTurn?.parts;
                                if (parts && parts.length > 0) {
                                    parts.forEach(part => {
                                        if (part.inlineData && part.inlineData.data) {
                                            playAudioChunk(part.inlineData.data);
                                        }
                                    });
                                }
                                
                                if (data.serverContent.turnComplete) {
                                    addLog('AI finished generating response.', 'info');
                                }
                            }
                        } catch (e) {
                            console.error("Failed to parse WS message", e);
                        }
                    };

                    ws.onerror = (err) => {
                        addLog('WebSocket error occurred.', 'error');
                        console.error(err);
                    };

                    ws.onclose = () => {
                        setIsConnected(false);
                        setIsMicActive(false);
                        addLog('WebSocket disconnected.', 'warning');
                        disconnect();
                    };

                    const source = audioCtx.createMediaStreamSource(stream);
                    const processor = audioCtx.createScriptProcessor(4096, 1, 1);
                    processorRef.current = processor;

                    processor.onaudioprocess = (e) => {
                        if (!isMicActive || ws.readyState !== WebSocket.OPEN) return;
                        
                        const float32Data = e.inputBuffer.getChannelData(0);
                        const int16Data = floatTo16BitPCM(float32Data);
                        const base64Data = arrayBufferToBase64(int16Data.buffer);

                        const message = {
                            realtimeInput: {
                                mediaChunks: [{ mimeType: "audio/pcm;rate=16000", data: base64Data }]
                            }
                        };
                        ws.send(JSON.stringify(message));
                    };

                    source.connect(processor);
                    processor.connect(audioCtx.destination);
                    
                } catch (err) {
                    setError('Failed to access microphone or connect.');
                    addLog(`Error: ${err.message}`, 'error');
                }
            };

            const disconnect = () => {
                if (wsRef.current) { wsRef.current.close(); wsRef.current = null; }
                if (processorRef.current) { processorRef.current.disconnect(); processorRef.current = null; }
                if (audioCtxRef.current) { audioCtxRef.current.close(); audioCtxRef.current = null; }
                if (streamRef.current) {
                    streamRef.current.getTracks().forEach(track => track.stop());
                    streamRef.current = null;
                }
                setIsConnected(false);
                setIsMicActive(false);
            };

            useEffect(() => {
                return () => disconnect();
            }, []);

            return (
                <div className="min-h-screen bg-slate-900 text-slate-100 font-sans flex flex-col items-center p-6">
                    <div className="w-full max-w-2xl bg-slate-800 rounded-2xl shadow-xl border border-slate-700 overflow-hidden">
                        
                        <div className="p-6 border-b border-slate-700 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                            <div>
                                <h1 className="text-2xl font-bold flex items-center gap-2">
                                    <Activity className="text-blue-400" /> 
                                    Gemini Live Test
                                </h1>
                                <p className="text-sm text-slate-400 mt-1">Browser-based Multimodal WebSocket connection</p>
                            </div>
                            <div className="flex items-center gap-2">
                                <span className="relative flex h-3 w-3">
                                    {isConnected && <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>}
                                    <span className={`relative inline-flex rounded-full h-3 w-3 ${isConnected ? 'bg-emerald-500' : 'bg-rose-500'}`}></span>
                                </span>
                                <span className="text-sm font-medium text-slate-300">
                                    {isConnected ? 'Connected' : 'Offline'}
                                </span>
                            </div>
                        </div>

                        <div className="p-6 space-y-6">
                            {!isConnected && (
                                <div className="space-y-3">
                                    <label className="block text-sm font-medium text-slate-300">Gemini API Key</label>
                                    <input 
                                        type="password" 
                                        value={apiKey}
                                        onChange={(e) => setApiKey(e.target.value)}
                                        placeholder="AIzaSy..."
                                        className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 text-slate-100 focus:outline-none focus:border-blue-500 transition-colors"
                                    />
                                    {error && <p className="text-rose-400 text-sm">{error}</p>}
                                </div>
                            )}

                            <div className="flex flex-col sm:flex-row gap-4">
                                {!isConnected ? (
                                    <button 
                                        onClick={connect}
                                        className="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-xl flex items-center justify-center gap-2 transition-all active:scale-95"
                                    >
                                        <Plug /> Connect to API
                                    </button>
                                ) : (
                                    <>
                                        <button 
                                            onClick={() => setIsMicActive(!isMicActive)}
                                            className={`flex-1 font-semibold py-3 px-4 rounded-xl flex items-center justify-center gap-2 transition-all active:scale-95 ${
                                                isMicActive 
                                                ? 'bg-rose-500/20 text-rose-400 border border-rose-500/50 hover:bg-rose-500/30' 
                                                : 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/50 hover:bg-emerald-500/30'
                                            }`}
                                        >
                                            {isMicActive ? <><MicOff /> Mute Microphone</> : <><Mic /> Unmute & Speak</>}
                                        </button>
                                        <button 
                                            onClick={disconnect}
                                            className="bg-slate-700 hover:bg-slate-600 text-white font-semibold py-3 px-6 rounded-xl flex items-center justify-center gap-2 transition-all active:scale-95"
                                        >
                                            <PowerOff /> Disconnect
                                        </button>
                                    </>
                                )}
                            </div>
                            
                            {isConnected && isMicActive && (
                                <div className="p-4 bg-blue-500/10 border border-blue-500/20 rounded-lg text-blue-300 text-sm flex items-center gap-3">
                                    <div className="flex space-x-1">
                                        <div className="w-1 h-3 bg-blue-400 animate-bounce" style={{ animationDelay: '0ms' }}></div>
                                        <div className="w-1 h-4 bg-blue-400 animate-bounce" style={{ animationDelay: '150ms' }}></div>
                                        <div className="w-1 h-2 bg-blue-400 animate-bounce" style={{ animationDelay: '300ms' }}></div>
                                    </div>
                                    Streaming audio to Gemini... You can speak naturally and even interrupt the AI.
                                </div>
                            )}
                        </div>

                        <div className="bg-slate-950 p-6 border-t border-slate-700 h-64 overflow-y-auto font-mono text-xs">
                            {logs.length === 0 ? (
                                <div className="text-slate-600 italic">Waiting for connection...</div>
                            ) : (
                                logs.map((log, i) => (
                                    <div key={i} className="mb-2 flex items-start gap-3">
                                        <span className="text-slate-500 whitespace-nowrap">[{log.time}]</span>
                                        <span className={`
                                            ${log.type === 'error' ? 'text-rose-400' : ''}
                                            ${log.type === 'success' ? 'text-emerald-400' : ''}
                                            ${log.type === 'warning' ? 'text-amber-400' : ''}
                                            ${log.type === 'info' ? 'text-slate-300' : ''}
                                        `}>
                                            {log.msg}
                                        </span>
                                    </div>
                                ))
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
